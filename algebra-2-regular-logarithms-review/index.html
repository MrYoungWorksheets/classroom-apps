<!doctype html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Logarithms Full Review</title>
  <style>
    :root {
      --ink: #172033;
      --muted: #5c677d;
      --line: #d9e0ea;
      --paper: #ffffff;
      --soft: #f4f7fb;
      --brand: #2457a6;
      --brand-2: #163b73;
      --green: #207245;
      --red: #b3261e;
      --amber: #8a5a00;
      --shadow: 0 14px 34px rgba(23, 32, 51, 0.12);
      font-family: Arial, Helvetica, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: linear-gradient(180deg, #eef3fa 0%, #f8fafc 46%, #ffffff 100%);
      color: var(--ink);
      font-size: 18px;
      line-height: 1.45;
    }

    button, input, select, textarea { font: inherit; }

    .app-shell {
      max-width: 1080px;
      margin: 0 auto;
      padding: 24px 18px 36px;
    }

    .topbar, .page {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .topbar {
      padding: 18px;
      margin-bottom: 18px;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
    }

    .header-tools {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    h1 {
      font-size: 1.65rem;
      line-height: 1.18;
      margin: 0 0 6px;
      letter-spacing: 0;
    }

    h2 {
      font-size: 1.28rem;
      margin: 0 0 12px;
      letter-spacing: 0;
    }

    h3 {
      font-size: 1.08rem;
      margin: 0 0 8px;
      letter-spacing: 0;
    }

    p { margin: 0 0 10px; }
    p:last-child { margin-bottom: 0; }

    .meta, .small-note, .field-help {
      color: var(--muted);
      font-size: 0.94rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      background: #e8f0fe;
      color: var(--brand-2);
      border: 1px solid #c9dafb;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.92rem;
      white-space: nowrap;
    }

    .progress-wrap { margin-top: 16px; }

    .progress-label {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 7px;
    }

    .progress-track {
      height: 12px;
      background: #e6ebf3;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--brand);
      border-radius: 999px;
      transition: width 160ms ease;
    }

    .page {
      padding: 20px;
      min-height: 540px;
    }

    .short-page {
      max-width: 820px;
      margin: 0 auto;
    }

    .info-grid, .field-grid, .status-list, .review-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .info-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); margin-top: 18px; }
    .field-grid { margin-top: 14px; }
    .field-grid.single { grid-template-columns: 1fr; }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
    }

    input[type='text'], input[type='date'], select, textarea {
      width: 100%;
      border: 1px solid #b8c3d4;
      border-radius: 8px;
      padding: 11px 12px;
      background: #fff;
      color: var(--ink);
      min-height: 48px;
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    .topic-stack {
      display: grid;
      gap: 16px;
    }

    .note-band, .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }

    .note-band {
      background: var(--soft);
      border-left: 6px solid var(--brand);
    }

    .panel { background: #fff; }
    .walkthrough { background: #fbfcff; }
    .you-try { background: #fffdfa; border-color: #e8d9ab; }

    .note-band ul, .walkthrough ol {
      margin: 8px 0 0 22px;
      padding: 0;
    }

    .formula {
      display: block;
      font-weight: 700;
      background: #f3f6fb;
      border: 1px solid #dbe4f2;
      border-radius: 6px;
      padding: 10px 12px;
      margin: 8px 0;
      overflow-x: auto;
    }

    .answer-format {
      background: #eef6ff;
      border: 1px solid #c7dcf6;
      border-radius: 7px;
      padding: 10px 12px;
      color: var(--brand-2);
      font-weight: 700;
      margin: 12px 0;
    }

    .frac {
      display: inline-flex;
      flex-direction: column;
      align-items: stretch;
      text-align: center;
      vertical-align: middle;
      line-height: 1.1;
      min-width: 2.2rem;
      margin: 0 0.12rem;
    }

    .frac span { padding: 0.06rem 0.35rem; }
    .frac .bar { border-top: 2px solid currentColor; padding: 0; margin: 0.08rem 0; }

    sup { font-size: 0.72em; line-height: 0; }
    sub { font-size: 0.72em; line-height: 0; }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .nav-actions {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      margin-top: 16px;
    }

    .btn {
      border: 0;
      border-radius: 8px;
      padding: 12px 18px;
      min-height: 48px;
      cursor: pointer;
      background: var(--brand);
      color: #fff;
      font-weight: 700;
    }

    .btn:hover:not(:disabled) { background: var(--brand-2); }

    .btn.secondary {
      background: #edf2f8;
      color: var(--ink);
      border: 1px solid #cbd5e1;
    }

    .btn.secondary:hover:not(:disabled) { background: #e1e8f2; }
    .btn.print { background: var(--green); }

    .btn.reset {
      background: #fff0ee;
      color: var(--red);
      border: 1px solid #f1b8b3;
    }

    .btn.reset:hover:not(:disabled) { background: #ffe2df; }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .feedback {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #f7f9fc;
      color: var(--ink);
    }

    .feedback.correct {
      background: #edf8f1;
      border-color: #b8dfc5;
      color: #155c34;
    }

    .feedback.hint {
      background: #fff8e7;
      border-color: #f0d28a;
      color: var(--amber);
    }

    .feedback.locked {
      background: #fff0ee;
      border-color: #f1b8b3;
      color: var(--red);
    }

    .feedback.review {
      background: #edf8f1;
      border-color: #b8dfc5;
      color: #155c34;
    }

    .status-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
    }

    .status-card strong {
      display: block;
      margin-bottom: 4px;
    }

    .score-big {
      font-size: 2.25rem;
      font-weight: 800;
      margin: 8px 0;
    }

    .graph-box {
      margin-top: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #ffffff;
      padding: 10px;
      overflow-x: auto;
    }

    .graph-box svg {
      width: 100%;
      max-width: 560px;
      min-width: 320px;
      display: block;
      margin: 0 auto;
    }

    #printReport { display: none; }

    @media (max-width: 820px) {
      body { font-size: 17px; }
      .info-grid, .field-grid, .review-grid, .status-list { grid-template-columns: 1fr; }
      .page { padding: 16px; }
      .pill { white-space: normal; }
      .header-tools { justify-content: flex-start; }
    }

    @media print {
      body { background: #fff; color: #111; font-size: 12pt; }
      .app-shell { display: none !important; }
      #printReport { display: block !important; }
      .print-page { padding: 0.35in; }
      .print-page h1 { font-size: 18pt; margin-bottom: 8pt; }
      .print-page h2 { font-size: 14pt; border-bottom: 1px solid #333; padding-bottom: 3pt; margin-top: 16pt; }
      .print-page p, .print-page li, .print-page td, .print-page th { font-size: 11pt; line-height: 1.35; }
      .print-page table { width: 100%; border-collapse: collapse; margin-top: 8pt; }
      .print-page th, .print-page td { border: 1px solid #777; padding: 5pt; text-align: left; vertical-align: top; }
      .summary-box { border: 1px solid #333; padding: 8pt; margin: 10pt 0; }
      .no-break { break-inside: avoid; }
    }
  </style>
</head>
<body>
  <main class='app-shell'>
    <header class='topbar'>
      <div class='title-row'>
        <div>
          <h1>Logarithms Full Review</h1>
          <p class='meta'>Algebra 2 Regular - Exponential and logarithmic equations, expressions, tables, domain, and range</p>
        </div>
        <div class='header-tools'>
          <div class='pill' id='versionPill'>Version 1.0</div>
          <button class='btn reset' id='resetBtn' type='button'>Start Completely Over</button>
        </div>
      </div>
      <div class='progress-wrap' aria-label='Assignment progress'>
        <div class='progress-label'><span id='pageLabel'>Page 1</span><span id='completionLabel'>0% complete</span></div>
        <div class='progress-track'><div class='progress-fill' id='progressFill'></div></div>
      </div>
    </header>

    <section class='page' id='app' aria-live='polite'></section>

    <nav class='nav-actions' aria-label='Page navigation'>
      <button class='btn secondary' id='backBtn' type='button'>Back</button>
      <button class='btn' id='nextBtn' type='button'>Next</button>
    </nav>
  </main>

  <section id='printReport' aria-hidden='true'></section>

  <script>
    const ASSIGNMENT = {
      course: 'Algebra 2 Regular',
      title: 'Logarithms Full Review',
      version: '1.0',
      storageKey: 'a2r-logarithms-full-review-v1',
      autoPoints: 90,
      teacherReviewPoints: 10
    };

    const EXPRESSION_OPTIONS = ['', '-6xy', '6xy', '4x³', '3w²', '5√z', '4xy', '2x²', '3x²', '5y'];

    const TOPICS = [
      {
        id: 'basic-exp',
        title: 'Solving Basic Exponential Equations',
        skill: 'solving basic exponential equations',
        notes: [
          'If both sides can be written with the same base, rewrite them and set the exponents equal.',
          'If the right side is not a clean power, use a logarithm and round as directed.',
          'For common log problems, remember that log means base 10.'
        ],
        walkthrough: `
          <p><span class='formula'>Solve 2<sup>x</sup> = 16.</span></p>
          <ol>
            <li>Rewrite 16 as a power of 2: 16 = 2<sup>4</sup>.</li>
            <li>Now 2<sup>x</sup> = 2<sup>4</sup>, so x = 4.</li>
            <li>For a decimal example like 10<sup>x</sup> = 8, use x = log(8) and get x &asymp; 0.90.</li>
          </ol>
        `,
        question: {
          id: 'q1',
          max: 18,
          prompt: 'Solve each basic exponential equation.',
          format: 'Answer format: x = 4 or x &asymp; 2.35',
          fields: [
            { key: 'a', label: '4<sup>x</sup> = 64', kind: 'number', answer: 3, tolerance: 0.001, answerText: 'x = 3' },
            { key: 'b', label: '10<sup>x</sup> = 51', kind: 'number', answer: 1.71, tolerance: 0.01, answerText: 'x &asymp; 1.71' }
          ],
          hint: 'For 4<sup>x</sup> = 64, rewrite 64 as a power of 4. For 10<sup>x</sup> = 51, use log(51) and round to the nearest hundredth.',
          correctFeedback: 'Correct. You rewrote the clean power and used a logarithm for the decimal answer.',
          solution: '4<sup>x</sup> = 64 gives x = 3 because 4<sup>3</sup> = 64. For 10<sup>x</sup> = 51, x = log(51) &asymp; 1.71.'
        }
      },
      {
        id: 'coeff-exp',
        title: 'Solving Exponential Equations with Coefficients',
        skill: 'solving exponential equations with coefficients',
        notes: [
          'Undo multiplication before solving the exponential part.',
          'After dividing by the coefficient, decide whether the result is a clean power or needs logs.',
          'For a base e equation, use natural log ln.'
        ],
        walkthrough: `
          <p><span class='formula'>Solve 47 &middot; 2<sup>x</sup> = 94.</span></p>
          <ol>
            <li>Divide both sides by 47: 2<sup>x</sup> = 2.</li>
            <li>Rewrite 2 as 2<sup>1</sup>.</li>
            <li>So x = 1.</li>
          </ol>
          <p><span class='formula'>For 38e<sup>x</sup> = 54, divide first: e<sup>x</sup> = <span class='frac'><span>54</span><span class='bar'></span><span>38</span></span>. Then x = ln(<span class='frac'><span>54</span><span class='bar'></span><span>38</span></span>) &asymp; 0.35.</span></p>
        `,
        question: {
          id: 'q2',
          max: 18,
          prompt: 'Solve each exponential equation with a coefficient. Round to the nearest hundredth.',
          format: 'Answer format: x &asymp; 0.70',
          fields: [
            { key: 'a', label: '16 &middot; 10<sup>x</sup> = 80', kind: 'number', answer: 0.70, tolerance: 0.01, answerText: 'x &asymp; 0.70' },
            { key: 'b', label: '45 &middot; 3<sup>x</sup> = 54', kind: 'number', answer: 0.17, tolerance: 0.01, answerText: 'x &asymp; 0.17' }
          ],
          hint: 'Divide by the coefficient first. Then use a logarithm if the result is not an easy power.',
          correctFeedback: 'Correct. You isolated the exponential expression before using logs.',
          solution: 'For 16 &middot; 10<sup>x</sup> = 80, divide by 16 to get 10<sup>x</sup> = 5, so x = log(5) &asymp; 0.70. For 45 &middot; 3<sup>x</sup> = 54, divide by 45 to get 3<sup>x</sup> = 1.2, so x = <span class="frac"><span>log(1.2)</span><span class="bar"></span><span>log(3)</span></span> &asymp; 0.17.'
        }
      },
      {
        id: 'exact-logs',
        title: 'Solving Logarithmic Equations Exactly',
        skill: 'solving logarithmic equations exactly',
        notes: [
          'Isolate the logarithm before changing form.',
          'The equation log<sub>b</sub>(x) = y means b<sup>y</sup> = x.',
          'Exact answers should not be rounded when the value is a clean power.'
        ],
        walkthrough: `
          <p><span class='formula'>Solve 14log<sub>2</sub>(x) - 15 = 13.</span></p>
          <ol>
            <li>Add 15 to both sides: 14log<sub>2</sub>(x) = 28.</li>
            <li>Divide by 14: log<sub>2</sub>(x) = 2.</li>
            <li>Rewrite in exponential form: 2<sup>2</sup> = x.</li>
            <li>So x = 4.</li>
          </ol>
        `,
        question: {
          id: 'q3',
          max: 18,
          prompt: 'Solve each logarithmic equation exactly.',
          format: 'Answer format: x = 9',
          fields: [
            { key: 'a', label: '-12log<sub>3</sub>(x) + 7 = -17', kind: 'number', answer: 9, tolerance: 0.001, answerText: 'x = 9' },
            { key: 'b', label: '3log<sub>2</sub>(x) - 6 = -3', kind: 'number', answer: 2, tolerance: 0.001, answerText: 'x = 2' }
          ],
          hint: 'Move the constant first, divide by the coefficient, then convert from logarithmic form to exponential form.',
          correctFeedback: 'Correct. You isolated the log and rewrote it in exponential form.',
          solution: 'For -12log<sub>3</sub>(x) + 7 = -17, log<sub>3</sub>(x) = 2, so x = 3<sup>2</sup> = 9. For 3log<sub>2</sub>(x) - 6 = -3, log<sub>2</sub>(x) = 1, so x = 2<sup>1</sup> = 2.'
        }
      },
      {
        id: 'without-logs',
        title: 'Writing Expressions Without Logs',
        skill: 'rewriting expressions without logarithms',
        notes: [
          'Logarithms and exponentials undo each other when the bases match.',
          'log(10<sup>A</sup>) = A because common log has base 10.',
          'log<sub>b</sub>(b<sup>A</sup>) = A and b<sup>log<sub>b</sub>(A)</sup> = A.'
        ],
        walkthrough: `
          <p><span class='formula'>log<sub>3</sub>(3<sup>2x²</sup>) = 2x²</span></p>
          <p>The base 3 logarithm and the base 3 exponential undo each other.</p>
          <p><span class='formula'>11<sup>log<sub>11</sub>(3w²)</sup> = 3w²</span></p>
          <p>The base 11 exponential and base 11 logarithm undo each other.</p>
        `,
        question: {
          id: 'q4',
          max: 18,
          prompt: 'Choose the equivalent expression without logarithms.',
          format: 'Answer format: choose an expression like 3w² or 5√z',
          fields: [
            { key: 'a', label: 'log(10<sup>-6xy</sup>)', kind: 'select', answer: '-6xy', answerText: '-6xy', options: EXPRESSION_OPTIONS },
            { key: 'b', label: 'e<sup>ln(4x³)</sup>', kind: 'select', answer: '4x³', answerText: '4x³', options: EXPRESSION_OPTIONS },
            { key: 'c', label: '11<sup>log<sub>11</sub>(3w²)</sup>', kind: 'select', answer: '3w²', answerText: '3w²', options: EXPRESSION_OPTIONS },
            { key: 'd', label: 'log<sub>2</sub>(2<sup>5√z</sup>)', kind: 'select', answer: '5√z', answerText: '5√z', options: EXPRESSION_OPTIONS }
          ],
          hint: 'Look for matching bases. When the bases match, the log and exponential undo each other.',
          correctFeedback: 'Correct. Each expression uses an inverse relationship to remove the logarithm.',
          solution: 'The simplified expressions are -6xy, 4x³, 3w², and 5√z. Matching log and exponential bases undo each other.'
        }
      },
      {
        id: 'log-tables',
        title: 'Logarithm Tables, Graph Features, Domain, and Range',
        skill: 'logarithm graph tables, asymptotes, domain, and range',
        notes: [
          'For y = log<sub>b</sub>(x - h) + k, the vertical asymptote is x = h.',
          'The domain starts to the right of the vertical asymptote, so it uses x &gt; h.',
          'Basic logarithmic functions have range: all real numbers.'
        ],
        walkthrough: `
          <p><span class='formula'>Use y = log<sub>4</sub>(x - 3).</span></p>
          <ol>
            <li>The vertical asymptote is x = 3.</li>
            <li>Choose x-values that make x - 3 equal 1, 4, and 16.</li>
            <li>If x = 4, then y = log<sub>4</sub>(1) = 0.</li>
            <li>If x = 7, then y = log<sub>4</sub>(4) = 1.</li>
            <li>If x = 19, then y = log<sub>4</sub>(16) = 2.</li>
            <li>Domain: x &gt; 3. Range: all real numbers.</li>
          </ol>
        `,
        graph: true,
        question: {
          id: 'q5',
          max: 18,
          prompt: 'For y = log<sub>4</sub>(x - 2), complete the table and graph features.',
          format: 'Answer format: ordered pair (3, 0), vertical asymptote x = 2, Domain: x &gt; 2, Range: all real numbers',
          fields: [
            { key: 'y1', label: 'When x = 3, y =', kind: 'number', answer: 0, tolerance: 0.001, answerText: '(3, 0)' },
            { key: 'y2', label: 'When x = 6, y =', kind: 'number', answer: 1, tolerance: 0.001, answerText: '(6, 1)' },
            { key: 'y3', label: 'When x = 18, y =', kind: 'number', answer: 2, tolerance: 0.001, answerText: '(18, 2)' },
            { key: 'va', label: 'Vertical asymptote x =', kind: 'number', answer: 2, tolerance: 0.001, answerText: 'x = 2' },
            { key: 'domain', label: 'Domain', kind: 'select', answer: 'x > 2', answerText: 'Domain: x > 2', options: ['', 'x > 2', 'x > 0', 'x < 2', 'all real numbers'] },
            { key: 'range', label: 'Range', kind: 'select', answer: 'all real numbers', answerText: 'Range: all real numbers', options: ['', 'all real numbers', 'y > 2', 'y > 0', 'y < 2'] }
          ],
          hint: 'The inside expression is x - 2. Choose values that make x - 2 equal 1, 4, and 16. The vertical asymptote occurs where x - 2 = 0.',
          correctFeedback: 'Correct. The table values follow powers of 4, and the graph starts to the right of x = 2.',
          solution: 'For y = log<sub>4</sub>(x - 2), the table points are (3, 0), (6, 1), and (18, 2). The vertical asymptote is x = 2, the domain is x &gt; 2, and the range is all real numbers.'
        }
      }
    ];

    const REFLECTION = {
      prompt: 'Which logarithm skill from this assignment do you need to practice again, and what is one step you can remember next time?',
      minLength: 20
    };

    const PAGES = [
      { type: 'student' },
      ...TOPICS.map((topic, index) => ({ type: 'topic', topicIndex: index })),
      { type: 'reflection' },
      { type: 'review' }
    ];

    function todayInput() {
      const date = new Date();
      date.setMinutes(date.getMinutes() - date.getTimezoneOffset());
      return date.toISOString().slice(0, 10);
    }

    function defaultState() {
      return {
        page: 0,
        student: { name: '', period: '', date: todayInput() },
        answers: {},
        teacherReview: { reflection: '' },
        pdfCreated: false
      };
    }

    let state = loadState();

    function loadState() {
      try {
        const saved = localStorage.getItem(ASSIGNMENT.storageKey);
        return saved ? { ...defaultState(), ...JSON.parse(saved) } : defaultState();
      } catch (error) {
        return defaultState();
      }
    }

    function saveState() {
      localStorage.setItem(ASSIGNMENT.storageKey, JSON.stringify(state));
    }

    function startCompletelyOver() {
      const ok = window.confirm('Start completely over? This will erase all entered answers for this assignment in this browser.');
      if (!ok) return;
      localStorage.removeItem(ASSIGNMENT.storageKey);
      state = defaultState();
      renderApp();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>']/g, character => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '\'': '&#39;'
      }[character]));
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    function formatDate(dateText) {
      if (!dateText) return '';
      const parts = dateText.split('-').map(Number);
      const date = new Date(parts[0], parts[1] - 1, parts[2]);
      return date.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function renderApp() {
      if (state.page < 0 || state.page >= PAGES.length) state.page = 0;
      const page = PAGES[state.page];
      const app = document.getElementById('app');
      if (page.type === 'student') app.innerHTML = renderStudentPage();
      if (page.type === 'topic') app.innerHTML = renderTopicPage(TOPICS[page.topicIndex], page.topicIndex);
      if (page.type === 'reflection') app.innerHTML = renderReflectionPage();
      if (page.type === 'review') app.innerHTML = renderReviewPage();
      renderNav();
      if (page.type === 'reflection') updateTeacherStatus();
    }

    function renderStudentPage() {
      return `
        <div class='short-page'>
          <h2>Student Information</h2>
          <p class='meta'>Enter your information first. Your work saves automatically in this browser.</p>
          <div class='info-grid'>
            <div>
              <label for='studentName'>Student name</label>
              <input id='studentName' type='text' autocomplete='name' value='${escapeAttr(state.student.name)}' oninput='updateStudent(&apos;name&apos;, this.value)'>
            </div>
            <div>
              <label for='classPeriod'>Class period</label>
              <input id='classPeriod' type='text' value='${escapeAttr(state.student.period)}' oninput='updateStudent(&apos;period&apos;, this.value)'>
            </div>
            <div>
              <label for='studentDate'>Date</label>
              <input id='studentDate' type='date' value='${escapeAttr(state.student.date)}' oninput='updateStudent(&apos;date&apos;, this.value)'>
            </div>
          </div>
          <div class='note-band' style='margin-top:18px;'>
            <h3>What You Will Review</h3>
            <ul>
              <li>Solving exponential equations by rewriting or using logs</li>
              <li>Solving exponential equations after dividing by a coefficient</li>
              <li>Solving logarithmic equations exactly</li>
              <li>Rewriting expressions without logarithms</li>
              <li>Completing logarithm tables and identifying domain, range, and vertical asymptotes</li>
            </ul>
          </div>
          <p class='small-note'>The Save as PDF button appears only after every required part is complete.</p>
        </div>
      `;
    }

    function renderTopicPage(topic, index) {
      const q = topic.question;
      const rec = getQuestionRecord(q);
      return `
        <article class='topic-stack'>
          <section class='note-band'>
            <h2>${index + 1}. ${topic.title}</h2>
            <ul>${topic.notes.map(note => `<li>${note}</li>`).join('')}</ul>
          </section>
          <section class='panel walkthrough'>
            <h3>Guided Walkthrough</h3>
            ${topic.walkthrough}
            ${topic.graph ? renderGraphPreview('walkthrough') : ''}
          </section>
          <section class='panel you-try'>
            <h3>You Try</h3>
            <p>${q.prompt}</p>
            <div class='answer-format'>${q.format}</div>
            ${topic.graph ? renderGraphPreview('try') : ''}
            ${renderQuestionFields(q, rec)}
            <div class='actions'>
              <div class='small-note'>Attempts used: ${rec.attempts} of 2</div>
              ${rec.locked ? '' : `<button class='btn' type='button' onclick='checkQuestion(&apos;${q.id}&apos;)'>Check Answer</button>`}
            </div>
            ${rec.feedback ? `<div class='feedback ${rec.feedbackType}'>${rec.feedback}</div>` : ''}
          </section>
        </article>
      `;
    }

    function renderGraphPreview(kind) {
      const title = kind === 'try' ? 'Coordinate preview for y = log base 4 of x minus 2' : 'Coordinate preview for y = log base 4 of x minus 3';
      const asymptoteX = kind === 'try' ? 82 : 98;
      const points = kind === 'try'
        ? [{ x: 112, y: 150, label: '(3, 0)' }, { x: 178, y: 112, label: '(6, 1)' }, { x: 386, y: 74, label: '(18, 2)' }]
        : [{ x: 112, y: 150, label: '(4, 0)' }, { x: 178, y: 112, label: '(7, 1)' }, { x: 386, y: 74, label: '(19, 2)' }];
      return `
        <div class='graph-box'>
          <svg viewBox='0 0 460 230' role='img' aria-label='${title}'>
            <rect x='0' y='0' width='460' height='230' fill='#ffffff'></rect>
            <line x1='40' y1='150' x2='430' y2='150' stroke='#516070' stroke-width='2'></line>
            <line x1='82' y1='25' x2='82' y2='200' stroke='#516070' stroke-width='2'></line>
            <line x1='${asymptoteX}' y1='25' x2='${asymptoteX}' y2='200' stroke='#b3261e' stroke-width='2' stroke-dasharray='7 6'></line>
            <path d='M 94 196 C 112 150, 170 115, 250 94 S 360 75, 420 65' fill='none' stroke='#2457a6' stroke-width='4' stroke-linecap='round'></path>
            ${points.map(point => `<circle cx='${point.x}' cy='${point.y}' r='6' fill='#207245'></circle><text x='${point.x + 8}' y='${point.y - 8}' font-size='14' fill='#172033'>${point.label}</text>`).join('')}
            <text x='${asymptoteX + 7}' y='38' font-size='14' fill='#b3261e'>vertical asymptote</text>
            <text x='415' y='169' font-size='14' fill='#172033'>x</text>
            <text x='62' y='36' font-size='14' fill='#172033'>y</text>
          </svg>
        </div>
      `;
    }

    function renderQuestionFields(q, rec) {
      const single = q.fields.length === 1 ? ' single' : '';
      return `<div class='field-grid${single}'>${q.fields.map((field, index) => renderField(q, field, index, rec)).join('')}</div>`;
    }

    function renderField(q, field, index, rec) {
      const key = field.key || `field${index}`;
      const value = rec.values[key] || '';
      const disabled = rec.locked ? 'disabled' : '';
      if (field.kind === 'select') {
        return `
          <div>
            <label for='${q.id}-${key}'>${field.label}</label>
            <select id='${q.id}-${key}' ${disabled} onchange='setQuestionValue(&apos;${q.id}&apos;, &apos;${key}&apos;, this.value)'>
              ${field.options.map(option => `<option value='${escapeAttr(option)}' ${option === value ? 'selected' : ''}>${option ? escapeHtml(option) : 'Choose one'}</option>`).join('')}
            </select>
            <div class='field-help'>Use the answer format shown above.</div>
          </div>
        `;
      }
      const help = field.tolerance === 0.01 ? 'Round to the nearest hundredth. A difference of 0.01 is accepted.' : 'Use the exact value unless the format asks for a decimal.';
      return `
        <div>
          <label for='${q.id}-${key}'>${field.label}</label>
          <input id='${q.id}-${key}' type='text' inputmode='decimal' ${disabled} value='${escapeAttr(value)}' placeholder='x =' oninput='setQuestionValue(&apos;${q.id}&apos;, &apos;${key}&apos;, this.value)'>
          <div class='field-help'>${help}</div>
        </div>
      `;
    }

    function renderReflectionPage() {
      return `
        <div class='short-page'>
          <h2>Final Reflection</h2>
          <p>${REFLECTION.prompt}</p>
          <label for='reflectionText'>Teacher-review response</label>
          <textarea id='reflectionText' oninput='updateTeacherReview(this.value)'>${escapeHtml(state.teacherReview.reflection)}</textarea>
          <div id='teacherStatus' class='feedback hint'>Please write a complete response before continuing.</div>
          <p class='small-note'>This response is not auto-graded right or wrong. It is included in the PDF for teacher review.</p>
        </div>
      `;
    }

    function renderReviewPage() {
      const scores = calculateScores();
      const complete = allComplete();
      return `
        <div>
          <h2>Final Review</h2>
          <p class='meta'>Review your score and make sure your information is correct before saving as PDF.</p>
          <div class='review-grid'>
            <section class='panel'>
              <h3>Current Score</h3>
              <div class='score-big'>${scores.finalScore}/100</div>
              <p>Auto-graded: ${formatPoints(scores.autoEarned)} / ${ASSIGNMENT.autoPoints}</p>
              <p>Teacher-review completion: ${scores.teacherEarned} / ${ASSIGNMENT.teacherReviewPoints}</p>
            </section>
            <section class='panel'>
              <h3>Student</h3>
              <p><strong>Name:</strong> ${escapeHtml(state.student.name || 'Not entered')}</p>
              <p><strong>Period:</strong> ${escapeHtml(state.student.period || 'Not entered')}</p>
              <p><strong>Date:</strong> ${escapeHtml(formatDate(state.student.date) || 'Not entered')}</p>
            </section>
          </div>
          <div class='status-list' style='margin-top:16px;'>
            ${scores.sections.map(section => `
              <div class='status-card'>
                <strong>${section.title}</strong>
                <span>${formatPoints(section.earned)} / ${section.max}</span>
              </div>
            `).join('')}
          </div>
          <div class='note-band' style='margin-top:16px;'>
            <h3>Study Summary</h3>
            <p>${escapeHtml(studySummary(scores.missedSkills))}</p>
          </div>
          <div class='actions'>
            <p class='small-note'>${complete ? 'Ready for PDF. Choose Save as PDF, then use the browser print window to save.' : 'Complete every required page before saving as PDF.'}</p>
            ${complete ? `<button class='btn print' type='button' onclick='saveAsPdf()'>Save as PDF</button>` : ''}
          </div>
        </div>
      `;
    }

    function getQuestionRecord(q) {
      if (!state.answers[q.id]) {
        state.answers[q.id] = { values: {}, attempts: 0, locked: false, correct: false, score: 0, feedback: '', feedbackType: '' };
      }
      return state.answers[q.id];
    }

    function updateStudent(field, value) {
      state.student[field] = value;
      saveState();
      renderNav();
    }

    function setQuestionValue(qid, key, value) {
      const q = findQuestion(qid);
      const rec = getQuestionRecord(q);
      if (rec.locked) return;
      rec.values[key] = value;
      saveState();
      renderNav();
    }

    function checkQuestion(qid) {
      const q = findQuestion(qid);
      const rec = getQuestionRecord(q);
      if (rec.locked) return;
      if (!allFieldsFilled(q, rec.values)) {
        rec.feedback = 'Complete each blank before checking your answer.';
        rec.feedbackType = 'hint';
        saveState();
        renderApp();
        return;
      }

      const grade = gradeQuestion(q, rec.values);
      rec.attempts += 1;
      if (grade.full) {
        rec.locked = true;
        rec.correct = true;
        rec.score = q.max;
        rec.feedback = q.correctFeedback;
        rec.feedbackType = 'correct';
      } else if (rec.attempts < 2) {
        rec.feedback = grade.correctCount > 0 ? `Some of your work is on track. Hint: ${q.hint}` : q.hint;
        rec.feedbackType = 'hint';
      } else {
        rec.locked = true;
        rec.correct = false;
        rec.score = roundPoints(q.max * grade.ratio);
        rec.feedback = `Not quite. ${q.solution}`;
        rec.feedbackType = 'locked';
      }
      saveState();
      renderApp();
    }

    function findQuestion(qid) {
      const topic = TOPICS.find(item => item.question.id === qid);
      if (!topic) throw new Error('Question not found: ' + qid);
      return topic.question;
    }

    function allFieldsFilled(q, values) {
      return q.fields.every((field, index) => {
        const key = field.key || `field${index}`;
        return String(values[key] || '').trim().length > 0;
      });
    }

    function parseMathNumber(value) {
      let text = String(value || '').trim().toLowerCase();
      text = text.replaceAll(' ', '').replaceAll('−', '-').replaceAll('–', '-').replaceAll(',', '');
      ['x=', 'y=', 'k='].forEach(prefix => {
        if (text.startsWith(prefix)) text = text.slice(prefix.length);
      });
      if (text.includes('/')) {
        const parts = text.split('/').map(Number);
        if (parts.length === 2 && Number.isFinite(parts[0]) && Number.isFinite(parts[1]) && parts[1] !== 0) return parts[0] / parts[1];
      }
      const number = Number(text);
      return Number.isFinite(number) ? number : NaN;
    }

    function nearlyEqual(a, b, tolerance) {
      return Number.isFinite(a) && Math.abs(a - b) <= tolerance;
    }

    function gradeQuestion(q, values) {
      let correctCount = 0;
      q.fields.forEach((field, index) => {
        const key = field.key || `field${index}`;
        const value = values[key];
        if (field.kind === 'number' && nearlyEqual(parseMathNumber(value), field.answer, field.tolerance || 0.001)) correctCount += 1;
        if (field.kind === 'select' && value === field.answer) correctCount += 1;
      });
      return { correctCount, total: q.fields.length, ratio: correctCount / q.fields.length, full: correctCount === q.fields.length };
    }

    function updateTeacherReview(value) {
      state.teacherReview.reflection = value;
      saveState();
      updateTeacherStatus();
      renderNav();
    }

    function updateTeacherStatus() {
      const box = document.getElementById('teacherStatus');
      if (!box) return;
      if (teacherReviewComplete()) {
        box.className = 'feedback review';
        box.textContent = 'Teacher review needed. This response will be included in the PDF.';
      } else {
        box.className = 'feedback hint';
        box.textContent = 'Please write a complete response before continuing.';
      }
    }

    function teacherReviewComplete() {
      return String(state.teacherReview.reflection || '').trim().length >= REFLECTION.minLength;
    }

    function questionComplete(topic) {
      const rec = getQuestionRecord(topic.question);
      return rec.locked && (rec.correct || rec.attempts >= 2);
    }

    function studentInfoComplete() {
      return Boolean(String(state.student.name || '').trim() && String(state.student.period || '').trim() && String(state.student.date || '').trim());
    }

    function allComplete() {
      return studentInfoComplete() && TOPICS.every(questionComplete) && teacherReviewComplete();
    }

    function canAdvance() {
      const page = PAGES[state.page];
      if (page.type === 'student') return studentInfoComplete();
      if (page.type === 'topic') return questionComplete(TOPICS[page.topicIndex]);
      if (page.type === 'reflection') return teacherReviewComplete();
      return false;
    }

    function renderNav() {
      const backBtn = document.getElementById('backBtn');
      const nextBtn = document.getElementById('nextBtn');
      const pageLabel = document.getElementById('pageLabel');
      const completionLabel = document.getElementById('completionLabel');
      const progressFill = document.getElementById('progressFill');
      const progress = Math.round((state.page / (PAGES.length - 1)) * 100);
      pageLabel.textContent = `Page ${state.page + 1} of ${PAGES.length}`;
      completionLabel.textContent = `${progress}% complete`;
      progressFill.style.width = `${progress}%`;
      backBtn.disabled = state.page === 0;
      nextBtn.style.visibility = PAGES[state.page].type === 'review' ? 'hidden' : 'visible';
      nextBtn.disabled = !canAdvance();
    }

    function goBack() {
      if (state.page > 0) {
        state.page -= 1;
        saveState();
        renderApp();
      }
    }

    function goNext() {
      if (!canAdvance()) return;
      if (state.page < PAGES.length - 1) {
        state.page += 1;
        saveState();
        renderApp();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    function calculateScores() {
      const sections = TOPICS.map(topic => {
        const rec = getQuestionRecord(topic.question);
        return { title: topic.title, skill: topic.skill, earned: Number(rec.score || 0), max: topic.question.max };
      });
      const autoEarned = roundPoints(sections.reduce((sum, section) => sum + section.earned, 0));
      const teacherEarned = teacherReviewComplete() ? ASSIGNMENT.teacherReviewPoints : 0;
      const finalScore = Math.round(autoEarned + teacherEarned);
      const missedSkills = sections.filter(section => section.earned < section.max).map(section => section.skill);
      return { sections, autoEarned, teacherEarned, finalScore, missedSkills };
    }

    function roundPoints(value) {
      return Math.round(value * 10) / 10;
    }

    function formatPoints(value) {
      return Number.isInteger(value) ? String(value) : value.toFixed(1);
    }

    function joinList(items) {
      if (items.length === 0) return '';
      if (items.length === 1) return items[0];
      if (items.length === 2) return `${items[0]} and ${items[1]}`;
      return `${items.slice(0, -1).join(', ')}, and ${items[items.length - 1]}`;
    }

    function studySummary(missedSkills) {
      if (!missedSkills.length) return 'This student is showing strong readiness with solving exponential equations, logarithmic equations, equivalent expressions, and logarithm graph features.';
      return `This student should review ${joinList(missedSkills)}. A helpful next step is to redo those walkthroughs, write the answer format before solving, and check whether the problem asks for an exact value or a decimal rounded to the nearest hundredth.`;
    }

    function studentAnswerText(q) {
      const rec = getQuestionRecord(q);
      return q.fields.map((field, index) => {
        const key = field.key || `field${index}`;
        return `${field.label}: ${escapeHtml(rec.values[key] || 'blank')}`;
      }).join('; ');
    }

    function correctAnswerText(q) {
      return q.fields.map(field => field.answerText || String(field.answer)).join('; ');
    }

    function saveAsPdf() {
      if (!allComplete()) return;
      buildPrintReport();
      state.pdfCreated = true;
      saveState();
      setTimeout(() => window.print(), 100);
    }

    function buildPrintReport() {
      const scores = calculateScores();
      const report = document.getElementById('printReport');
      report.innerHTML = `
        <div class='print-page'>
          <h1>${ASSIGNMENT.title}</h1>
          <div class='summary-box'><strong>Study Summary:</strong> ${escapeHtml(studySummary(scores.missedSkills))}</div>
          <p><strong>Course:</strong> ${escapeHtml(ASSIGNMENT.course)}</p>
          <p><strong>Student:</strong> ${escapeHtml(state.student.name)} &nbsp; <strong>Period:</strong> ${escapeHtml(state.student.period)} &nbsp; <strong>Date:</strong> ${escapeHtml(formatDate(state.student.date))}</p>
          <p><strong>Version:</strong> ${escapeHtml(ASSIGNMENT.version)} &nbsp; <strong>Final Score:</strong> ${scores.finalScore}/100 &nbsp; <strong>Auto-graded:</strong> ${formatPoints(scores.autoEarned)} / ${ASSIGNMENT.autoPoints}</p>

          <h2>Score Breakdown</h2>
          <table>
            <thead><tr><th>Section</th><th>Score</th><th>Skill</th></tr></thead>
            <tbody>
              ${scores.sections.map(section => `<tr><td>${section.title}</td><td>${formatPoints(section.earned)} / ${section.max}</td><td>${escapeHtml(section.skill)}</td></tr>`).join('')}
              <tr><td>Teacher-Review Reflection</td><td>${scores.teacherEarned} / ${ASSIGNMENT.teacherReviewPoints}</td><td>study planning and explanation</td></tr>
            </tbody>
          </table>

          <h2>Missed Skills</h2>
          <p>${scores.missedSkills.length ? escapeHtml(joinList(scores.missedSkills)) : 'No missed auto-graded skills.'}</p>

          <h2>All Student Answers</h2>
          <table>
            <thead><tr><th>Topic</th><th>Student Answer</th><th>Score</th><th>Correct Answer When Needed</th></tr></thead>
            <tbody>
              ${TOPICS.map(topic => {
                const rec = getQuestionRecord(topic.question);
                const needsAnswer = rec.score < topic.question.max;
                return `<tr><td>${topic.title}</td><td>${studentAnswerText(topic.question)}</td><td>${formatPoints(rec.score)} / ${topic.question.max}</td><td>${needsAnswer ? correctAnswerText(topic.question) : 'Correct'}</td></tr>`;
              }).join('')}
            </tbody>
          </table>

          <h2>Guided Work</h2>
          ${TOPICS.map(topic => `
            <div class='no-break'>
              <p><strong>${topic.title}</strong></p>
              ${topic.walkthrough}
            </div>
          `).join('')}

          <h2>Teacher-Review Response</h2>
          <p><strong>Prompt:</strong> ${escapeHtml(REFLECTION.prompt)}</p>
          <p>${escapeHtml(state.teacherReview.reflection)}</p>
        </div>
      `;
      report.setAttribute('aria-hidden', 'false');
    }

    document.getElementById('backBtn').addEventListener('click', goBack);
    document.getElementById('nextBtn').addEventListener('click', goNext);
    document.getElementById('resetBtn').addEventListener('click', startCompletelyOver);
    document.getElementById('versionPill').textContent = `Version ${ASSIGNMENT.version}`;
    renderApp();
  </script>
</body>
</html>
