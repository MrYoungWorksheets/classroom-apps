(--ink);border:1px solid #cbd5e1}.btn.print{background:var(--green)}.btn.reset{background:#fff0ee;color:var(--red);border:1px solid #f1b8b3}.btn:disabled{opacity:.45;cursor:not-allowed}.feedback{margin-top:12px;padding:12px;border-radius:8px;border:1px solid var(--line);background:#f7f9fc}.feedback.correct{background:#edf8f1;border-color:#b8dfc5;color:#155c34}.feedback.hint{background:#fff8e7;border-color:#f0d28a;color:var(--amber)}.feedback.locked{background:#fff0ee;border-color:#f1b8b3;color:var(--red)}.feedback.review{background:#edf8f1;border-color:#b8dfc5;color:#155c34}.status-card{border:1px solid var(--line);border-radius:8px;padding:12px;background:#fff}.status-card strong{display:block;margin-bottom:4px}.score-big{font-size:2.25rem;font-weight:800;margin:8px 0}.graph-box{margin-top:12px;border:1px solid #cbd5e1;border-radius:8px;background:#fff;padding:10px;overflow-x:auto}.graph-box svg{width:100%;max-width:560px;min-width:320px;display:block;margin:0 auto}#printReport{display:none}

<body>
  <main class='app-shell'>
    <header class='topbar'>
      <div class='title-row'><div><h1>Logarithms Full Review</h1><p class='meta'>Algebra 2 Regular - exponential equations, logarithmic equations, equivalent expressions, expansions, and graph features</p></div><div class='header-tools'><div class='pill' id='versionPill'></div><button class='btn reset' id='resetBtn' type='button'>Start Completely Over</button></div></div>
      <details class='log-helper'><summary>Show Log Helper</summary><div class='log-helper-body'><div class='formula'>log_b(x) = ln(x) / ln(b)</div><div class='helper-fields'><div><label for='logHelperValue'>Value x</label><input id='logHelperValue' type='number' inputmode='decimal' step='any' placeholder='Example: 51'></div><div><label for='logHelperBase'>Base b</label><input id='logHelperBase' type='number' inputmode='decimal' step='any' placeholder='Example: 10'></div><button class='btn' id='logHelperBtn' type='button'>Calculate</button></div><div class='feedback' id='logHelperResult'>Enter x and b to calculate a logarithm.</div></div></details>
      <div class='progress-wrap' aria-label='Assignment progress'><div class='progress-label'><span id='pageLabel'>Page 1</span><span id='completionLabel'>0% complete</span></div><div class='progress-track'><div class='progress-fill' id='progressFill'></div></div></div>
    </header>
    <section class='page' id='app' aria-live='polite'></section>
    <nav class='nav-actions' aria-label='Page navigation'><button class='btn secondary' id='backBtn' type='button'>Back</button><button class='btn' id='nextBtn' type='button'>Next</button></nav>

  <script>
    // Teacher edit area: update topic notes, questions, answers, hints, and explanations here.
    const ASSIGNMENT={course:`Algebra 2 Regular`,title:`Logarithms Full Review`,version:`1.2`,storageKey:`a2r-logarithms-full-review-v2`,teacherReviewPoints:1};
    const EXPRESSION_OPTIONS=[``,`-6xy`,`6xy`,`4x^3`,`3w^2`,`5sqrt(z)`,`4xy`,`2x^2`,`3x^2`,`5y`];
    const TOPICS=[
      {title:`Solving Basic Exponential Equations`,skill:`basic exponential equations`,notes:[`Rewrite both sides with the same base when possible.`,`If the answer is not a clean power, use a logarithm and round as directed.`],walk:`<p><span class='formula'>Solve 2^x = 16.</span></p><ol><li>Rewrite 16 as 2^4.</li><li>Since 2^x = 2^4, x = 4.</li><li>For 10^x = 8, use x = log(8).</li></ol>`,question:{id:`q1`,prompt:`Solve each basic exponential equation.`,format:`Type numbers only. Round decimals to the nearest hundredth.`,fields:[{key:`a`,label:`3^x = 81`,kind:`number`,answer:4,tolerance:.001,answerText:`x = 4`},{key:`b`,label:`10^x = 51`,kind:`number`,answer:1.71,tolerance:.01,answerText:`x is about 1.71`}],hint:`Rewrite 81 as a power of 3. For 10^x = 51, use log(51).`,correctFeedback:`Correct.`,solution:`3^4 = 81, and log(51) is about 1.71.`}},
      {title:`Solving Exponential Equations with Coefficients`,skill:`exponential equations with coefficients`,notes:[`Undo multiplication before solving the exponential part.`,`Use logarithms after the exponential expression is isolated.`],walk:`<p><span class='formula'>Solve 47*2^x = 94.</span></p><ol><li>Divide by 47 to get 2^x = 2.</li><li>Rewrite 2 as 2^1.</li><li>x = 1.</li></ol>`,question:{id:`q2`,prompt:`Solve each exponential equation with a coefficient.`,format:`Type numbers only. Round to the nearest hundredth.`,fields:[{key:`a`,label:`16*10^x = 80`,kind:`number`,answer:.70,tolerance:.01,answerText:`x is about 0.70`},{key:`b`,label:`45*3^x = 54`,kind:`number`,answer:.17,tolerance:.01,answerText:`x is about 0.17`}],hint:`Divide by the coefficient first, then use logs.`,correctFeedback:`Correct.`,solution:`10^x = 5 gives x about 0.70. 3^x = 1.2 gives x about 0.17.`}},
      {title:`Solving Logarithmic Equations Exactly`,skill:`exact logarithmic equations`,notes:[`Isolate the logarithm before rewriting.`,`log_b(x)=y means b^y=x.`],walk:`<p><span class='formula'>14log_2(x) - 15 = 13</span></p><ol><li>Add 15 and divide by 14.</li><li>log_2(x)=2.</li><li>2^2=x, so x=4.</li></ol>`,question:{id:`q3`,prompt:`Solve each logarithmic equation exactly.`,format:`Type the exact x-value only.`,fields:[{key:`a`,label:`-12log_3(x) + 7 = -17`,kind:`number`,answer:9,tolerance:.001,answerText:`x = 9`},{key:`b`,label:`3log_2(x) - 6 = -3`,kind:`number`,answer:2,tolerance:.001,answerText:`x = 2`}],hint:`Move the constant, divide by the coefficient, then rewrite in exponential form.`,correctFeedback:`Correct.`,solution:`The equations simplify to log_3(x)=2 and log_2(x)=1, so x=9 and x=2.`}},
      {title:`Writing Expressions Without Logs`,skill:`inverse properties of logarithms`,notes:[`Logs and exponentials undo each other when the bases match.`,`log(10^A)=A because common log has base 10.`],walk:`<p><span class='formula'>log_3(3^(2x^2)) = 2x^2</span></p><p>The matching base 3 log and exponential undo each other.</p>`,question:{id:`q4`,prompt:`Choose the equivalent expression without logarithms.`,format:`Use each matching inverse property.`,fields:[{key:`a`,label:`log(10^(-6xy))`,kind:`select`,answer:`-6xy`,answerText:`-6xy`,options:EXPRESSION_OPTIONS},{key:`b`,label:`e^(ln(4x^3))`,kind:`select`,answer:`4x^3`,answerText:`4x^3`,options:EXPRESSION_OPTIONS},{key:`c`,label:`11^(log_11(3w^2))`,kind:`select`,answer:`3w^2`,answerText:`3w^2`,options:EXPRESSION_OPTIONS},{key:`d`,label:`log_2(2^(5sqrt(z)))`,kind:`select`,answer:`5sqrt(z)`,answerText:`5sqrt(z)`,options:EXPRESSION_OPTIONS}],hint:`Look for matching bases.`,correctFeedback:`Correct.`,solution:`The simplified expressions are -6xy, 4x^3, 3w^2, and 5sqrt(z).`}},
      {title:`Expanding Logarithms`,skill:`product, quotient, and power rules`,notes:[`Product rule: log(MN)=log(M)+log(N).`,`Quotient rule: log(M/N)=log(M)-log(N).`,`Power rule: log(M^p)=p log(M).`],walk:`<p><span class='formula'>log(5x^3/y)=log(5)+3log(x)-log(y)</span></p><p>Use product, power, then quotient rules.</p>`,question:{id:`q5`,prompt:`Choose the correct expanded form.`,format:`Choose the expression that uses product, quotient, and power rules correctly.`,fields:[{key:`a`,label:`log(5x^3/y)`,kind:`select`,answer:`log(5)+3log(x)-log(y)`,answerText:`log(5)+3log(x)-log(y)`,options:[``,`log(5)+3log(x)-log(y)`,`log(5)+log(x^3/y)`,`log(5)-3log(x)+log(y)`,`5log(x)-3log(y)`]},{key:`b`,label:`log_b((m*n)^4)`,kind:`select`,answer:`4log_b(m)+4log_b(n)`,answerText:`4log_b(m)+4log_b(n)`,options:[``,`4log_b(m)+4log_b(n)`,`log_b(m)+4log_b(n)`,`log_b(4m)+log_b(4n)`,`4log_b(mn)`]}],hint:`Break multiplication into addition, division into subtraction, and move exponents to the front.`,correctFeedback:`Correct.`,solution:`log(5x^3/y)=log(5)+3log(x)-log(y), and log_b((mn)^4)=4log_b(m)+4log_b(n).`}},
      {title:`Logarithm Graph Features`,skill:`logarithm graph tables, asymptotes, domain, and range`,notes:[`For y=log_b(x-h)+k, the vertical asymptote is x=h.`,`The domain starts to the right of the vertical asymptote.`,`Basic logarithmic functions have range all real numbers.`],walk:`<p><span class='formula'>For y=log_4(x-3), the vertical asymptote is x=3.</span></p><ol><li>x=4 gives y=0.</li><li>x=7 gives y=1.</li><li>x=19 gives y=2.</li></ol>`,graph:true,question:{id:`q6`,prompt:`For y = log_4(x - 2), complete the table and graph features.`,format:`Use numbers for y-values and asymptote. Use dropdowns for domain and range.`,fields:[{key:`y1`,label:`When x = 3, y =`,kind:`number`,answer:0,tolerance:.001,answerText:`(3,0)`},{key:`y2`,label:`When x = 6, y =`,kind:`number`,answer:1,tolerance:.001,answerText:`(6,1)`},{key:`y3`,label:`When x = 18, y =`,kind:`number`,answer:2,tolerance:.001,answerText:`(18,2)`},{key:`va`,label:`Vertical asymptote x =`,kind:`number`,answer:2,tolerance:.001,answerText:`x=2`},{key:`domain`,label:`Domain`,kind:`select`,answer:`x > 2`,answerText:`x > 2`,options:[``,`x > 2`,`x > 0`,`x < 2`,`all real numbers`]},{key:`range`,label:`Range`,kind:`select`,answer:`all real numbers`,answerText:`all real numbers`,options:[``,`all real numbers`,`y > 2`,`y > 0`,`y < 2`]}],hint:`x-2 equals 1, 4, and 16 at x=3, 6, and 18. The asymptote is where x-2=0.`,correctFeedback:`Correct.`,solution:`The table values are 0, 1, 2; vertical asymptote x=2; domain x>2; range all real numbers.`}},
      {title:`Evaluating Logarithms`,skill:`evaluating logarithmic expressions`,notes:[`Ask: the base raised to what exponent equals the value?`,`A logarithm is undefined if the input is 0 or negative.`],walk:`<p><span class='formula'>log_2(32)=5 because 2^5=32.</span></p><p>log_3(-9) is undefined because the input is negative.</p>`,question:{id:`q7`,prompt:`Evaluate each logarithm.`,format:`Type a number, or type Undefined when the logarithm has no real value.`,fields:[{key:`a`,label:`log_2(32)`,kind:`text`,answer:`5`,answerText:`5`},{key:`b`,label:`log_5(1/25)`,kind:`text`,answer:`-2`,answerText:`-2`},{key:`c`,label:`log_3(-9)`,kind:`text`,answer:`undefined`,answerText:`Undefined`}],hint:`Rewrite each as an exponent equation. Negative log inputs are undefined.`,correctFeedback:`Correct.`,solution:`2^5=32, 5^-2=1/25, and log_3(-9) is undefined.`}}
    ];
    const REFLECTION={prompt:`Choose one missed or difficult topic and explain what step you will check first next time.`,minLength:20};
    // End teacher edit area.

    const PAGES=[{type:`student`}].concat(TOPICS.map((_,i)=>({type:`topic`,topicIndex:i})),[{type:`reflection`},{type:`review`}]);
    let state=loadState();
    function freshState(){return{appVersion:ASSIGNMENT.version,page:0,student:{name:``,period:``,date:new Date().toISOString().slice(0,10)},answers:{},teacherReview:{reflection:``},pdfCreated:false};}
    function loadState(){const fresh=freshState();try{const saved=JSON.parse(localStorage.getItem(ASSIGNMENT.storageKey));if(!saved||saved.appVersion!==ASSIGNMENT.version)return fresh;return Object.assign(fresh,saved,{student:Object.assign(fresh.student,saved.student||{}),answers:Object.assign({},saved.answers||{}),teacherReview:Object.assign(fresh.teacherReview,saved.teacherReview||{})});}catch(e){return fresh;}}
    function saveState(){localStorage.setItem(ASSIGNMENT.storageKey,JSON.stringify(state));}
    function escapeHtml(value){return String(value??``).replace(/[&<>']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;"}[ch]));}
    function escapeAttr(value){return escapeHtml(value).replace(/"/g,`&quot;`);}
    function formatDate(dateText){if(!dateText)return``;const p=dateText.split(`-`).map(Number);return new Date(p[0],p[1]-1,p[2]).toLocaleDateString(undefined,{year:`numeric`,month:`long`,day:`numeric`});}
    function getQuestionRecord(q){if(!state.answers[q.id])state.answers[q.id]={values:{},attempts:0,locked:false,correct:false,score:0,feedback:``,feedbackType:``};return state.answers[q.id];}
    function renderApp(){if(state.page<0||state.page>=PAGES.length)state.page=0;const page=PAGES[state.page],app=document.getElementById(`app`);if(page.type===`student`)app.innerHTML=renderStudentPage();if(page.type===`topic`)app.innerHTML=renderTopicPage(TOPICS[page.topicIndex],page.topicIndex);if(page.type===`reflection`)app.innerHTML=renderReflectionPage();if(page.type===`review`)app.innerHTML=renderReviewPage();renderNav();if(page.type===`reflection`)updateTeacherStatus();}
    function renderStudentPage(){return`<div class='short-page'><h2>Student Information</h2><p class='meta'>Progress saves in this browser. Each auto-graded topic locks after two checked attempts. A locked problem earns no credit unless it was correct.</p><div class='info-grid'><div><label for='studentName'>Student name</label><input id='studentName' type='text' autocomplete='name' value='${escapeAttr(state.student.name)}' oninput='updateStudent(&quot;name&quot;,this.value)'></div><div><label for='classPeriod'>Class period</label><input id='classPeriod' type='text' value='${escapeAttr(state.student.period)}' oninput='updateStudent(&quot;period&quot;,this.value)'></div><div><label for='studentDate'>Date</label><input id='studentDate' type='date' value='${escapeAttr(state.student.date)}' oninput='updateStudent(&quot;date&quot;,this.value)'></div></div><div class='tool-grid'><div class='tool-card'><strong>Use the format box</strong><span>It tells you whether to round, choose, or type Undefined.</span></div><div class='tool-card'><strong>Use the hint</strong><span>After one miss, review the hint before the final try.</span></div><div class='tool-card'><strong>Report tools</strong><span>Final review includes Copy Answers and Save as PDF.</span></div></div></div>`;}
    function renderTopicPage(topic,index){const q=topic.question,rec=getQuestionRecord(q);return`<article class='topic-stack'><section class='note-band'><h2>${index+1}. ${topic.title}</h2><ul>${topic.notes.map(note=>`<li>${note}</li>`).join(``)}</ul></section><section class='panel walkthrough'><h3>Guided Walkthrough</h3>${topic.walk}${topic.graph?renderGraphPreview():``}</section><section class='panel you-try'><h3>You Try</h3><p>${q.prompt}</p><div class='answer-format'>${q.format}</div>${topic.graph?renderGraphPreview():``}${renderQuestionFields(q,rec)}${supportPanel(q,rec)}<div class='actions'><div class='small-note'>Attempts used: ${rec.attempts} of 2</div>${rec.locked?``:`<button class='btn' type='button' onclick='checkQuestion(&quot;${q.id}&quot;)'>Check Answer</button>`}</div>${rec.feedback?`<div class='feedback ${rec.feedbackType}'>${rec.feedback}</div>`:``}</section></article>`;}
    function supportPanel(q,rec){const warning=!rec.locked&&rec.attempts===1?`<div class='final-warning'>Final graded try: review the hint before checking again. A second incorrect check locks the whole problem as wrong.</div>`:``;const solution=rec.locked?`<p><strong>Worked explanation:</strong> ${q.solution}</p>`:``;return`${warning}<details class='support-box'><summary>I'm stuck - show a hint</summary><div><p><strong>Hint:</strong> ${q.hint}</p>${solution}</div></details>`;}
    function renderGraphPreview(){return`<div class='graph-box'><svg viewBox='0 0 460 230' role='img' aria-label='Logarithm graph preview'><rect x='0' y='0' width='460' height='230' fill='#fff'></rect><line x1='40' y1='150' x2='430' y2='150' stroke='#516070' stroke-width='2'></line><line x1='82' y1='25' x2='82' y2='200' stroke='#516070' stroke-width='2'></line><line x1='82' y1='25' x2='82' y2='200' stroke='#b3261e' stroke-width='2' stroke-dasharray='7 6'></line><path d='M 94 196 C 112 150, 170 115, 250 94 S 360 75, 420 65' fill='none' stroke='#2457a6' stroke-width='4' stroke-linecap='round'></path><circle cx='112' cy='150' r='6' fill='#207245'></circle><text x='120' y='142' font-size='14' fill='#172033'>(3,0)</text><circle cx='178' cy='112' r='6' fill='#207245'></circle><text x='186' y='104' font-size='14' fill='#172033'>(6,1)</text><circle cx='386' cy='74' r='6' fill='#207245'></circle><text x='394' y='66' font-size='14' fill='#172033'>(18,2)</text><text x='92' y='38' font-size='14' fill='#b3261e'>x = 2</text></svg></div>`;}
    function renderQuestionFields(q,rec){const single=q.fields.length===1?` single`:``;return`<div class='field-grid${single}'>${q.fields.map((field,index)=>renderField(q,field,index,rec)).join(``)}</div>`;}
    function renderField(q,field,index,rec){const key=field.key||`field${index}`,value=rec.values[key]||``,disabled=rec.locked?`disabled`:``;if(field.kind===`select`)return`<div><label for='${q.id}-${key}'>${field.label}</label><select id='${q.id}-${key}' ${disabled} onchange='setQuestionValue(&quot;${q.id}&quot;,&quot;${key}&quot;,this.value)'>${field.options.map(option=>`<option value='${escapeAttr(option)}' ${option===value?`selected`:``}>${option?escapeHtml(option):`Choose one`}</option>`).join(``)}</select><div class='field-help'>Use the answer format shown above.</div></div>`;return`<div><label for='${q.id}-${key}'>${field.label}</label><input id='${q.id}-${key}' type='text' inputmode='decimal' ${disabled} value='${escapeAttr(value)}' placeholder='answer' oninput='setQuestionValue(&quot;${q.id}&quot;,&quot;${key}&quot;,this.value)'><div class='field-help'>Use exact values unless the prompt asks for rounding.</div></div>`;}
    function renderReflectionPage(){return`<div class='short-page'><h2>Final Reflection</h2><p>${REFLECTION.prompt}</p><label for='reflectionText'>Teacher-review response</label><textarea id='reflectionText' oninput='updateTeacherReview(this.value)'>${escapeHtml(state.teacherReview.reflection)}</textarea><div id='teacherStatus' class='feedback hint'>Please write a complete response before continuing.</div><p class='small-note'>This is completion credit and is included in the PDF for teacher review.</p></div>`;}
    function renderReviewPage(){const scores=calculateScores(),complete=allComplete();return`<div><h2>Final Review</h2><p class='meta'>Review your score and information before saving or copying answers.</p><div class='review-grid'><section class='panel'><h3>Current Score</h3><div class='score-big'>${scores.finalScore}/100</div><p>Auto-graded: ${scores.autoEarned} / ${TOPICS.length}</p><p>Teacher-review completion: ${scores.teacherEarned} / ${ASSIGNMENT.teacherReviewPoints}</p></section><section class='panel'><h3>Student</h3><p><strong>Name:</strong> ${escapeHtml(state.student.name||`Not entered`)}</p><p><strong>Period:</strong> ${escapeHtml(state.student.period||`Not entered`)}</p><p><strong>Date:</strong> ${escapeHtml(formatDate(state.student.date)||`Not entered`)}</p></section></div><div class='status-list' style='margin-top:16px;'>${scores.sections.map(s=>`<div class='status-card'><strong>${s.title}</strong><span>${s.earned} / 1</span></div>`).join(``)}</div><div class='note-band' style='margin-top:16px;'><h3>Study Summary</h3><p>${escapeHtml(studySummary(scores.missedSkills))}</p></div><div class='actions'><p class='small-note'>${complete?`Ready for Copy Answers or PDF.`:`Complete every required page before final tools appear.`}</p>${complete?`<button class='btn secondary' type='button' onclick='copyAnswers()'>Copy Answers</button><button class='btn print' type='button' onclick='saveAsPdf()'>Save as PDF</button>`:``}</div></div>`;}
    function updateStudent(field,value){state.student[field]=value;saveState();renderNav();}
    function setQuestionValue(qid,key,value){const q=findQuestion(qid),rec=getQuestionRecord(q);if(rec.locked)return;rec.values[key]=value;saveState();renderNav();}
    function allFieldsFilled(q,values){return q.fields.every((field,index)=>String(values[field.key||`field${index}`]||``).trim().length>0);}
    function parseMathNumber(value){let text=String(value||``).trim().toLowerCase().replaceAll(` `,``).replaceAll(`,`,``).replaceAll(`~`,``);[`x=`,`y=`,`k=`].forEach(prefix=>{if(text.startsWith(prefix))text=text.slice(prefix.length);});if(text.includes(`/`)){const parts=text.split(`/`).map(Number);if(parts.length===2&&Number.isFinite(parts[0])&&Number.isFinite(parts[1])&&parts[1]!==0)return parts[0]/parts[1];}const n=Number(text);return Number.isFinite(n)?n:NaN;}
    function normalizeText(value){return String(value||``).trim().toLowerCase().replace(/\s+/g,``);}
    function nearlyEqual(a,b,tolerance){return Number.isFinite(a)&&Math.abs(a-b)<=tolerance;}
    function checkQuestion(qid){const q=findQuestion(qid),rec=getQuestionRecord(q);if(rec.locked)return;if(!allFieldsFilled(q,rec.values)){rec.feedback=`Complete each blank before checking your answer.`;rec.feedbackType=`hint`;saveState();renderApp();return;}const grade=gradeQuestion(q,rec.values);rec.attempts+=1;if(grade.full){rec.locked=true;rec.correct=true;rec.score=1;rec.feedback=q.correctFeedback;rec.feedbackType=`correct`;}else if(rec.attempts<2){rec.feedback=grade.correctCount>0?`Some parts are on track. Hint: ${q.hint}`:q.hint;rec.feedbackType=`hint`;}else{rec.locked=true;rec.correct=false;rec.score=0;rec.feedback=`Not quite. This problem is now locked as wrong. ${q.solution}`;rec.feedbackType=`locked`;}saveState();renderApp();}
    function gradeQuestion(q,values){let correctCount=0;q.fields.forEach((field,index)=>{const key=field.key||`field${index}`,value=values[key];if(field.kind===`number`&&nearlyEqual(parseMathNumber(value),field.answer,field.tolerance||.001))correctCount+=1;if(field.kind===`select`&&value===field.answer)correctCount+=1;if(field.kind===`text`&&normalizeText(value)===normalizeText(field.answer))correctCount+=1;});return{correctCount,total:q.fields.length,full:correctCount===q.fields.length};}
    function findQuestion(qid){const topic=TOPICS.find(t=>t.question.id===qid);if(!topic)throw new Error(`Question not found: `+qid);return topic.question;}
    function updateTeacherReview(value){state.teacherReview.reflection=value;saveState();updateTeacherStatus();renderNav();}
    function teacherReviewComplete(){return String(state.teacherReview.reflection||``).trim().length>=REFLECTION.minLength;}
    function updateTeacherStatus(){const box=document.getElementById(`teacherStatus`);if(!box)return;if(teacherReviewComplete()){box.className=`feedback review`;box.textContent=`Teacher review needed. This response will be included in the PDF.`;}else{box.className=`feedback hint`;box.textContent=`Please write a complete response before continuing.`;}}
    function questionComplete(topic){const rec=getQuestionRecord(topic.question);return rec.locked;}
    function studentInfoComplete(){return Boolean(String(state.student.name||``).trim()&&String(state.student.period||``).trim()&&String(state.student.date||``).trim());}
    function allComplete(){return studentInfoComplete()&&TOPICS.every(questionComplete)&&teacherReviewComplete();}
    function canAdvance(){const page=PAGES[state.page];if(page.type===`student`)return studentInfoComplete();if(page.type===`topic`)return questionComplete(TOPICS[page.topicIndex]);if(page.type===`reflection`)return teacherReviewComplete();return false;}
    function renderNav(){const backBtn=document.getElementById(`backBtn`),nextBtn=document.getElementById(`nextBtn`),pageLabel=document.getElementById(`pageLabel`),completionLabel=document.getElementById(`completionLabel`),progressFill=document.getElementById(`progressFill`);const progress=Math.round((state.page/(PAGES.length-1))*100);pageLabel.textContent=`Page ${state.page+1} of ${PAGES.length}`;completionLabel.textContent=`${progress}% complete`;progressFill.style.width=`${progress}%`;backBtn.disabled=state.page===0;nextBtn.style.visibility=PAGES[state.page].type===`review`?`hidden`:`visible`;nextBtn.disabled=!canAdvance();document.getElementById(`versionPill`).textContent=`Version ${ASSIGNMENT.version}`;}
    function goBack(){if(state.page>0){state.page-=1;saveState();renderApp();}}
    function goNext(){if(!canAdvance())return;if(state.page<PAGES.length-1){state.page+=1;saveState();renderApp();window.scrollTo({top:0,behavior:`smooth`});}}
    function calculateScores(){const sections=TOPICS.map(topic=>{const rec=getQuestionRecord(topic.question);return{title:topic.title,skill:topic.skill,earned:Number(rec.score||0),max:1};});const autoEarned=sections.reduce((sum,s)=>sum+s.earned,0);const teacherEarned=teacherReviewComplete()?ASSIGNMENT.teacherReviewPoints:0;const finalScore=Math.round(((autoEarned+teacherEarned)/(TOPICS.length+ASSIGNMENT.teacherReviewPoints))*100);const missedSkills=sections.filter(s=>s.earned<s.max).map(s=>s.skill);return{sections,autoEarned,teacherEarned,finalScore,missedSkills};}
    function joinList(items){if(!items.length)return``;if(items.length===1)return items[0];if(items.length===2)return`${items[0]} and ${items[1]}`;return`${items.slice(0,-1).join(`, `)}, and ${items[items.length-1]}`;}
    function studySummary(missedSkills){if(!missedSkills.length)return`This student is showing strong readiness with exponential equations, logarithmic equations, expansions, equivalent expressions, and logarithm graph features.`;return`This student should review ${joinList(missedSkills)}. A helpful next step is to redo those walkthroughs and check the answer format before submitting.`;}
    function studentAnswerText(q){const rec=getQuestionRecord(q);return q.fields.map((field,index)=>`${field.label}: ${escapeHtml(rec.values[field.key||`field${index}`]||`blank`)}`).join(`; `);}
    function correctAnswerText(q){return q.fields.map(f=>f.answerText||String(f.answer)).join(`; `);}
    function answerReport(){const scores=calculateScores();return`${ASSIGNMENT.title}\nStudent: ${state.student.name}\nPeriod: ${state.student.period}\nDate: ${state.student.date}\nFinal Score: ${scores.finalScore}/100\n\n`+TOPICS.map(topic=>{const q=topic.question,rec=getQuestionRecord(q);return`${topic.title}\nStudent answer: ${studentAnswerText(q)}\nResult: ${rec.score?`Correct`:`Incorrect`}\nCorrect/guide: ${correctAnswerText(q)}\n`;}).join(`\n`)+`\nReflection: ${state.teacherReview.reflection}`;}
    async function copyAnswers(){const text=answerReport();try{await navigator.clipboard.writeText(text);alert(`Answers copied.`);}catch(e){const box=document.createElement(`textarea`);box.value=text;document.body.appendChild(box);box.select();document.execCommand(`copy`);box.remove();alert(`Answers copied.`);}}
    function saveAsPdf(){if(!allComplete())return;buildPrintReport();state.pdfCreated=true;saveState();setTimeout(()=>window.print(),100);}
    function buildPrintReport(){const scores=calculateScores();document.getElementById(`printReport`).innerHTML=`<div class='print-page'><h1>${ASSIGNMENT.title}</h1><div class='summary-box'><strong>Study Summary:</strong> ${escapeHtml(studySummary(scores.missedSkills))}</div><p><strong>Course:</strong> ${escapeHtml(ASSIGNMENT.course)}</p><p><strong>Student:</strong> ${escapeHtml(state.student.name)} &nbsp; <strong>Period:</strong> ${escapeHtml(state.student.period)} &nbsp; <strong>Date:</strong> ${escapeHtml(formatDate(state.student.date))}</p><p><strong>Version:</strong> ${escapeHtml(ASSIGNMENT.version)} &nbsp; <strong>Final Score:</strong> ${scores.finalScore}/100</p><h2>Score Breakdown</h2><table><thead><tr><th>Section</th><th>Score</th><th>Skill</th></tr></thead><tbody>${scores.sections.map(s=>`<tr><td>${s.title}</td><td>${s.earned} / ${s.max}</td><td>${escapeHtml(s.skill)}</td></tr>`).join(``)}<tr><td>Teacher-Review Reflection</td><td>${scores.teacherEarned} / ${ASSIGNMENT.teacherReviewPoints}</td><td>study planning and explanation</td></tr></tbody></table><h2>Missed Skills</h2><p>${scores.missedSkills.length?escapeHtml(joinList(scores.missedSkills)):`No missed auto-graded skills.`}</p><h2>All Student Answers</h2><table><thead><tr><th>Topic</th><th>Student Answer</th><th>Score</th><th>Correct Answer When Needed</th></tr></thead><tbody>${TOPICS.map(topic=>{const rec=getQuestionRecord(topic.question),needsAnswer=rec.score<1;return`<tr><td>${topic.title}</td><td>${studentAnswerText(topic.question)}</td><td>${rec.score} / 1</td><td>${needsAnswer?correctAnswerText(topic.question):`Correct`}</td></tr>`;}).join(``)}</tbody></table><h2>Teacher-Review Response</h2><p><strong>Prompt:</strong> ${escapeHtml(REFLECTION.prompt)}</p><p>${escapeHtml(state.teacherReview.reflection)}</p></div>`;document.getElementById(`printReport`).setAttribute(`aria-hidden`,`false`);}
    function calculateLogHelper(){const x=Number(document.getElementById(`logHelperValue`).value),b=Number(document.getElementById(`logHelperBase`).value),box=document.getElementById(`logHelperResult`);if(!Number.isFinite(x)||x<=0){box.textContent=`Enter x greater than 0.`;return;}if(!Number.isFinite(b)||b<=0||b===1){box.textContent=`Enter a base greater than 0 and not equal to 1.`;return;}box.textContent=`log base ${b} of ${x} is about ${(Math.log(x)/Math.log(b)).toFixed(4)}.`;}
    function startCompletelyOver(){if(state.pdfCreated)return;const ok=window.confirm(`Start completely over? This erases saved work in this browser.`);if(!ok)return;localStorage.removeItem(ASSIGNMENT.storageKey);state=freshState();renderApp();}
    document.getElementById(`backBtn`).addEventListener(`click`,goBack);document.getElementById(`nextBtn`).addEventListener(`click`,goNext);document.getElementById(`resetBtn`).addEventListener(`click`,startCompletelyOver);document.getElementById(`logHelperBtn`).addEventListener(`click`,calculateLogHelper);renderApp();
  </script>
</body>
</html>
