<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chapter 11 Housing Assignment</title>
  <style>
    :root {
      --ink:#17202a; --muted:#607080; --paper:#fff; --bg:#eef3f8; --line:#d6e0ea;
      --blue:#2457a6; --blue2:#dce9ff; --green:#21805b; --green2:#ddf4ea;
      --gold:#946200; --gold2:#fff1c7; --red:#b23b3b; --red2:#ffe2e2; --soft:#f7f9fc;
      --shadow:0 12px 30px rgba(24,44,68,.12);
    }
    *{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--ink);background:linear-gradient(180deg,#f7fbff,var(--bg));font-size:18px;line-height:1.45}
    button,input,select,textarea{font:inherit} .shell{width:min(1080px,calc(100% - 28px));margin:auto;padding:20px 0 28px}
    header,.card{background:var(--paper);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)} header{padding:18px;display:grid;gap:12px}
    .title{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap}.eyebrow{color:var(--blue);font-weight:700;text-transform:uppercase;font-size:.8rem;letter-spacing:.08em;margin:0 0 4px}
    h1,h2,h3{margin:0;line-height:1.18;letter-spacing:0}h1{font-size:clamp(1.45rem,2vw,2rem)}h2{font-size:clamp(1.25rem,1.7vw,1.65rem)}h3{font-size:1.05rem}.version,.muted{color:var(--muted)}
    .progress-meta{display:flex;justify-content:space-between;gap:12px;color:var(--muted);font-size:.94rem}.track{height:12px;border-radius:99px;background:#e7edf4;overflow:hidden;border:1px solid var(--line)}#bar{height:100%;width:0;background:linear-gradient(90deg,var(--blue),var(--green));transition:width .18s}
    .card{margin-top:18px;overflow:hidden}.head{padding:18px;border-bottom:1px solid var(--line);background:#fbfdff}.body{padding:18px;display:grid;gap:16px}.nav{display:flex;justify-content:space-between;gap:12px;padding:16px 18px;border-top:1px solid var(--line);background:#fbfdff}
    .grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.formulas{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    label{display:grid;gap:7px;font-weight:700}input,select,textarea{width:100%;border:1px solid #b9c8d8;border-radius:7px;padding:11px 12px;background:#fff;color:var(--ink);min-height:48px}textarea{min-height:120px;resize:vertical}input:disabled,select:disabled,textarea:disabled{background:#edf2f7;color:#526170;opacity:1}
    .note{background:var(--blue2);border:1px solid #bdd2f4;border-radius:8px;padding:14px;display:grid;gap:8px}.mini,.q,.practice,.review{border:1px solid var(--line);border-radius:8px;background:var(--soft);padding:15px;display:grid;gap:12px}.formula{border:1px solid var(--line);border-left:5px solid var(--green);border-radius:8px;background:#fff;padding:13px;display:grid;gap:5px;min-height:112px}.formula strong,.mini strong{color:#153f7d}
    .q.correct{border-color:#8acaae;background:#f5fff9}.q.incorrect{border-color:#efaaa7;background:#fff7f7}.qtop{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}.num{color:var(--muted);font-weight:700;font-size:.95rem}.pill{display:inline-flex;align-items:center;min-height:30px;border-radius:99px;padding:4px 10px;background:#eaf0f6;color:#314558;font-size:.84rem;font-weight:700}.good{background:var(--green2);color:#14573d}.warn{background:var(--gold2);color:#604000}.bad{background:var(--red2);color:#7b2525}
    .actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}button{border:0;border-radius:7px;min-height:46px;padding:10px 15px;color:#fff;background:var(--blue);font-weight:700;cursor:pointer}button.secondary{background:#526170}button.success{background:var(--green)}button:disabled{background:#a8b4c0;cursor:not-allowed}
    .feedback{border-radius:7px;padding:11px 12px;border:1px solid transparent;font-size:.96rem}.feedback.hint{background:var(--gold2);border-color:#efce75;color:#604000}.feedback.correct{background:var(--green2);border-color:#9fd8bd;color:#14573d}.feedback.incorrect{background:var(--red2);border-color:#efa6a6;color:#742323}
    .checks{display:grid;gap:8px}.checks label{display:flex;align-items:flex-start;gap:10px;font-weight:500;padding:10px;border:1px solid var(--line);border-radius:7px;background:#fff}.checks input{width:22px;min-height:22px;margin-top:2px;flex:0 0 22px}
    .row{display:grid;grid-template-columns:1.2fr .8fr;gap:12px;border-bottom:1px solid var(--line);padding-bottom:10px}.remaining{margin:0;padding-left:22px}#printReport{display:none}
    @media(max-width:780px){body{font-size:17px}.grid2,.grid3,.formulas,.row{grid-template-columns:1fr}header,.head,.body,.nav{padding:14px}}
    @media print{@page{margin:.55in}body{background:#fff;font-size:12pt;color:#111}.shell{display:none!important}#printReport{display:block!important}.print-doc{display:grid;gap:14px}.print-title{border-bottom:2px solid #111;padding-bottom:8px}.print-title h1{font-size:18pt;margin-bottom:4px}.print-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px 18px}.print-section{break-inside:avoid}.print-section h2{font-size:14pt;border-bottom:1px solid #999;padding-bottom:4px;margin-bottom:6px}.print-table{width:100%;border-collapse:collapse}.print-table th,.print-table td{border:1px solid #999;padding:5px;text-align:left;vertical-align:top}.small{font-size:10.5pt}}
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="title"><div><p class="eyebrow">Foundations in Personal Finance</p><h1>Chapter 11 Housing Assignment</h1></div><div class="version">Version 1.0</div></div>
      <div><div class="progress-meta"><span id="pageLabel">Student Information</span><span id="progressText">0% complete</span></div><div class="track"><div id="bar"></div></div></div>
    </header>
    <main class="card" id="app"></main>
  </div>
  <section id="printReport" aria-hidden="true"></section>

  <script>
    const APP={title:'Chapter 11 Housing Assignment',version:'1.0',storageKey:'chapter11HousingAssignmentV1'};
    const today=new Date().toISOString().slice(0,10);
    const reminders={Foundations:'Good money habits come before big housing decisions: save, budget, avoid debt, live on less than you make, and be generous.',Renting:'Renting can be wise. Keep rent at or below 25% of take-home pay and compare more than the nicest amenities.',Living:'Living on your own includes setup costs, monthly bills, transportation, food, supplies, and renter\'s insurance.',Leasing:'A lease is a legal document. Read it before signing because it is enforceable by law.',Mortgages:'A 15-year fixed-rate conventional mortgage keeps the rate set and usually costs much less interest than a 30-year mortgage.',Ownership:'Homeownership can build equity, but buying before you are ready can create stress and crowd out other goals.',Roommates:'Roommates can lower costs when everyone communicates, respects shared space, and acts considerately.'};
    const questions=[
      {id:'q1',skill:'Foundations',type:'text',prompt:'Complete the reminder: It is best to develop good ____ now instead of waiting until you are on your own.',answer:'money habits',answerText:'money habits',hint:'Think about habits you build before rent, utilities, and groceries are your responsibility.',explanation:'The key identifies money habits as the habit area to build now.'},
      {id:'q2',skill:'Renting',type:'select',prompt:'Renting is a great option for many people.',options:['True','False'],answer:'True',answerText:'True',hint:'The chapter does not treat renting as failure. It can be wise in the right season.',explanation:'The answer key marks this statement true.'},
      {id:'q3',skill:'Renting',type:'number',prompt:'Your rent payment should total no more than what percent of your take-home pay?',answer:25,tolerance:0,answerText:'25%',hint:'The rent guideline is one quarter of take-home pay.',explanation:'The key gives 25% as the rent limit.'},
      {id:'q4',skill:'Mortgages',type:'select',prompt:'When you are ready to buy a house, which mortgage option does the worksheet recommend?',options:['15-year fixed-rate conventional mortgage','20-year VA loan','30-year fixed-rate mortgage','30-year equity loan'],answer:'15-year fixed-rate conventional mortgage',answerText:'15-year fixed-rate conventional mortgage',hint:'Look for the option with a shorter payoff time and a rate that does not change.',explanation:'The key recommends a 15-year fixed-rate conventional mortgage.'},
      {id:'q5',skill:'Living',type:'keywords',prompt:'In your own words, define cost of living.',answerText:'The average cost of the basic goods and services needed to maintain a certain standard of living.',keywordGroups:[['average'],['basic'],['goods','services'],['standard','living']],minMatches:3,hint:'Include the idea of average basic costs needed for a normal standard of living.',explanation:'Cost of living is the average cost of basic goods and services for a standard of living.'},
      {id:'q6',skill:'Renting',type:'select',prompt:'Making periodic payments to a landlord for the use of property is called what?',options:['Down payment','Buying','Renting or leasing','Security deposit'],answer:'Renting or leasing',answerText:'Renting or leasing',hint:'This is the housing option where someone else owns the property.',explanation:'The key gives renting or leasing.'},
      {id:'q7',skill:'Ownership',type:'select',prompt:'Buying a house while you are in debt puts what at risk?',options:['Your home purchase','Your diet plan','Your school schedule','Your favorite amenities'],answer:'Your home purchase',answerText:'Your home purchase',hint:'Debt makes the house purchase less stable.',explanation:'The key phrase is in debt; home purchase.'},
      {id:'q8',skill:'Living',type:'select',prompt:'Living on campus can help you ____ living on your own while off-campus living requires paying rent, utilities, and groceries.',options:['ease into','dive into','avoid','ignore'],answer:'ease into',answerText:'ease into',hint:'Campus living is presented as a gradual step.',explanation:'The key says ease into; pay for rent, utilities, and groceries.'},
      {id:'q9',skill:'Ownership',type:'select',prompt:'Your decision to rent or buy depends most on your ____.',options:['friends\' opinions','financial situation','income tax bracket','feelings about paint colors'],answer:'financial situation',answerText:'financial situation',hint:'The worksheet points to readiness and money, not pressure from other people.',explanation:'The key gives financial situation.'},
      {id:'q10',skill:'Renting',type:'select',prompt:'Paying extra rent for what is not worth it if it keeps you from reaching financial goals?',options:['Amenities','Mortgages','Security deposits','Tax brackets'],answer:'Amenities',answerText:'Amenities',hint:'These are nice features, but they can cost extra each month.',explanation:'The key identifies amenities.'},
      {id:'q11',skill:'Ownership',type:'select',prompt:'A house is an asset that typically will ____ in value over time.',options:['stay the same','decrease','disappear','increase'],answer:'increase',answerText:'increase in value',hint:'The worksheet describes a common long-term ownership advantage.',explanation:'The key gives increase in value.'},
      {id:'q12',skill:'Ownership',type:'select',prompt:'You should buy a home even if you cannot afford it yet because renting is a waste of money.',options:['True','False'],answer:'False',answerText:'False',hint:'The chapter treats renting as a valid option and warns against buying too early.',explanation:'The key marks the statement false.'},
      {id:'q13',skill:'Mortgages',type:'select',prompt:'The only time it is okay to borrow money if you cannot pay 100% in cash is for what?',options:['A car lease','Home improvement projects','Buying a home with a mortgage','Renting a home'],answer:'Buying a home with a mortgage',answerText:'Buying a home with a mortgage',hint:'This exception is tied to buying a home.',explanation:'The key gives buying a home with a mortgage.'},
      {id:'q14',skill:'Leasing',type:'keywords',prompt:'What is a leasing contract?',answerText:'A legal document that allows the renter or tenant to use the property for a period of time.',keywordGroups:[['legal'],['renter','tenant'],['property'],['period','time']],minMatches:3,hint:'Use the words legal, renter or tenant, property, and period of time.',explanation:'A lease is a legal document allowing the renter to use property for a period of time.'},
      {id:'q15',skill:'Foundations',type:'keywords',prompt:'List the money principles that stay the same after high school.',answerText:'Save, budget, stay out of debt, live on less than you make, and be generous.',keywordGroups:[['save'],['budget'],['debt'],['less'],['generous']],minMatches:5,hint:'There are five ideas: save, budget, debt, living on less, and generosity.',explanation:'The key lists save, budget, stay out of debt, live on less than you make, and be generous.'},
      {id:'q16',skill:'Ownership',type:'select',prompt:'When you look at long-term costs, which is usually the better deal?',options:['Homeownership','Renting','Leasing','Maintaining'],answer:'Homeownership',answerText:'Homeownership',hint:'Think long-term wealth building and equity.',explanation:'The key gives homeownership.'},
      {id:'q17',skill:'Leasing',type:'select',prompt:'Once you sign a leasing contract, it is enforceable by law.',options:['True','False'],answer:'True',answerText:'True',hint:'A lease is a legal document.',explanation:'The key marks this statement true.'},
      {id:'q18',skill:'Mortgages',type:'select',prompt:'What type of interest rate is locked in and will not change for the life of the loan?',options:['15-year','Fixed-rate','Adjustable rate','Equity rate'],answer:'Fixed-rate',answerText:'Fixed-rate',hint:'The name tells you that the rate stays set.',explanation:'The key gives fixed-rate.'},
      {id:'q19',skill:'Ownership',type:'select',prompt:'When someone spends so much income on homeownership costs that other goals suffer, they are ____.',options:['wealthy','house poor','wise homeowners','rent poor'],answer:'house poor',answerText:'House poor',hint:'This phrase describes owning a home that crowds out the rest of the budget.',explanation:'The key gives house poor.'},
      {id:'q20',skill:'Mortgages',type:'select',prompt:'A fixed-rate mortgage has which kind of mortgage rate?',options:['A set rate for a set number of years','A high rate for a large amount of years','A good rate for 15 days','A 12% rate for 30 years'],answer:'A set rate for a set number of years',answerText:'A set rate for a set number of years',hint:'Fixed means set.',explanation:'The key says set; a set number of years.'},
      {id:'q21',skill:'Leasing',type:'checkbox',prompt:'Select the items a lease should contain.',options:['Property address','Rental term','Security deposit terms','Pet fees','Closest shopping malls','Your credit card only','Restaurant list'],answer:['Property address','Rental term','Security deposit terms','Pet fees'],answerText:'Property address, rental term, security deposit terms, and pet fees',hint:'Choose the legal and payment details, not nearby entertainment or payment-only rules.',explanation:'The key lists property address, rental term, security deposit terms, and pet fees.'},
      {id:'q22',skill:'Mortgages',type:'select',prompt:'Which type of loan is not secured by a government entity and usually has the best rate and term?',options:['FHA loan','VA loan','Family loan','Conventional loan'],answer:'Conventional loan',answerText:'Conventional loan',hint:'This is the standard non-government-backed mortgage type named in the key.',explanation:'The key gives conventional loan.'},
      {id:'q23',skill:'Foundations',type:'select',prompt:'Learning about living costs before you need to cover them and creating good money habits are examples of what?',options:['Taking personal responsibility','Poor money management','Being a consumer','Waiting to budget'],answer:'Taking personal responsibility',answerText:'Taking personal responsibility',hint:'This is the responsible action before independence.',explanation:'The key gives taking personal responsibility.'},
      {id:'q24',skill:'Mortgages',type:'keywords',prompt:'What is your mortgage principal?',answerText:'The amount borrowed that must be repaid to purchase a home.',keywordGroups:[['amount'],['borrowed'],['repaid','paid'],['home','house']],minMatches:3,hint:'Principal is the borrowed amount, not interest or the first payment.',explanation:'Principal is the amount borrowed that must be repaid to purchase a home.'},
      {id:'q25',skill:'Roommates',type:'keywords',prompt:'How can you make living with a roommate more peaceful while saving money?',answerText:'Communicate, be respectful, and be considerate.',keywordGroups:[['communicate','communication'],['respect','respectful'],['considerate','consideration']],minMatches:2,hint:'The key focuses on communication, respect, and consideration.',explanation:'The key gives communicate, be respectful, and be considerate.'},
      {id:'q26',skill:'Ownership',type:'select',prompt:'After you hire a real estate agent, what is the next step in the home buying process?',options:['Close on your new home','Get a home inspection','Start looking at homes within your budget','Make an offer on a home'],answer:'Start looking at homes within your budget',answerText:'Start looking at homes within your budget',hint:'Before inspections and offers, you need homes that fit the budget.',explanation:'The key gives start looking at homes within your budget.'},
      {id:'q27',skill:'Mortgages',type:'select',prompt:'It is impossible to get a mortgage without a credit score.',options:['True','False'],answer:'False',answerText:'False',hint:'The worksheet does not say a missing credit score makes a mortgage impossible.',explanation:'The key marks this statement false.'},
      {id:'q28',skill:'Ownership',type:'select',prompt:'Equity is the difference between what you still owe on your home and what it is worth.',options:['True','False'],answer:'True',answerText:'True',hint:'Equity compares value with the remaining loan balance.',explanation:'The key marks this statement true.'},
      {id:'q29',skill:'Living',type:'keywords',prompt:'Name at least three costs of living on your own.',answerText:'Examples include security deposit, sheets and towels, kitchen supplies, cleaning supplies, groceries, transportation, furniture, renter\'s insurance, utilities setup, and first month\'s rent.',keywordGroups:[['security deposit'],['sheets','towels'],['kitchen'],['cleaning'],['groceries','food'],['transportation'],['furniture'],['insurance'],['utilities'],['rent']],minMatches:3,hint:'Think about move-in costs, household supplies, food, transportation, insurance, utilities, and rent.',explanation:'The key accepts several move-in and monthly living costs.'},
      {id:'q30',skill:'Renting',type:'keywords',prompt:'Name at least three ways someone can save money on rent or living costs.',answerText:'Examples include comparing locations, researching amenities, getting a long-term lease, looking at older properties, finding a roommate, checking internet options, conserving utilities, and shopping secondhand.',keywordGroups:[['location','locations'],['amenities'],['lease'],['older'],['roommate'],['internet'],['utilities','water','energy'],['secondhand','used']],minMatches:3,hint:'Think about location, amenities, lease length, older properties, roommates, internet, utilities, and secondhand supplies.',explanation:'The key lists comparison shopping and cost-saving habits such as roommates and conserving utilities.'},
      {id:'q31',skill:'Mortgages',type:'keywords',prompt:'Why is a 15-year fixed-rate mortgage better than a 30-year mortgage?',answerText:'With a 30-year mortgage, you pay much more over time because of interest. A fixed rate means the rate will not change.',keywordGroups:[['interest'],['30','thirty','twice','more'],['fixed','rate'],['change','fluctuate','locked']],minMatches:3,hint:'Mention interest over time and the rate staying fixed.',explanation:'The key says a 30-year mortgage can cost almost twice as much because of interest, while a fixed rate will not fluctuate.'},
      {id:'q32',skill:'Ownership',type:'teacher',prompt:'Explain how renting or buying a home is connected with someone\'s ability to be generous.',minLength:40,answerText:'Teacher review: look for budget readiness, financial goals, generosity, and avoiding buying too quickly.'},
      {id:'q33',skill:'Ownership',type:'teacher',prompt:'Give advantages and disadvantages of renting and owning a home. Use examples from the chapter.',minLength:60,answerText:'Teacher review: look for examples from both renting and owning, including costs, maintenance, equity, flexibility, and responsibility.'},
      {id:'q34',skill:'Foundations',type:'teacher',prompt:'Why is it important to do The Five Foundations in order?',minLength:45,answerText:'Teacher review: look for purpose, emergency fund, avoiding debt, generosity, building wealth, and readiness for future housing decisions.'}
    ];
    const practiceItems=[
      {id:'p1',type:'number',prompt:'Take-home pay is $3,200 per month. What is the maximum rent using the 25% guideline?',answer:800,hint:'Multiply 3,200 by 0.25.',explanation:'$3,200 x 0.25 = $800.'},
      {id:'p2',type:'select',prompt:'Which student is more ready to rent?',options:['Student A: rent is 40% of take-home pay and no emergency fund','Student B: rent is 22% of take-home pay and has a budget'],answer:'Student B: rent is 22% of take-home pay and has a budget',hint:'Look for a lower rent percentage and a plan.',explanation:'Student B keeps rent under 25% and has a budget.'},
      {id:'p3',type:'select',prompt:'Which term means home value minus what is still owed?',options:['Equity','Principal','Lease','Amenity'],answer:'Equity',hint:'This term grows as value rises or the loan balance falls.',explanation:'Equity is the difference between value and what is owed.'},
      {id:'p4',type:'select',prompt:'Which document should be read before signing because it is enforceable by law?',options:['Lease','Restaurant list','Shopping map','Paint sample'],answer:'Lease',hint:'This is the legal rental contract.',explanation:'A lease is a legal contract.'}
    ];
    const qMap=Object.fromEntries(questions.map(q=>[q.id,q])); const pMap=Object.fromEntries(practiceItems.map(p=>[p.id,p]));
    const pages=[{kind:'info',section:'Start',title:'Student Information'},{kind:'learn',section:'Learn',title:'Housing Choices and Budget Reminders',page:1},{kind:'learn',section:'Learn',title:'Leases, Mortgages, and Ownership Terms',page:2},{kind:'practice',section:'Guided Practice',title:'Budget and Readiness Check',ids:['p1','p2']},{kind:'practice',section:'Guided Practice',title:'Terms You Need Before the Assignment',ids:['p3','p4']}];
    for(let i=0;i<questions.length;i+=2){pages.push({kind:'assignment',section:'Assignment',title:'Assignment Questions '+(i+1)+'-'+Math.min(i+2,questions.length),qids:questions.slice(i,i+2).map(q=>q.id)});} pages.push({kind:'review',section:'Final Review',title:'Final Review'});
    let state=loadState();
    function loadState(){const fresh={page:0,student:{name:'',period:'',date:today},answers:{},records:{},practice:{}};try{const saved=JSON.parse(localStorage.getItem(APP.storageKey));return Object.assign(fresh,saved||{},{student:Object.assign(fresh.student,saved&&saved.student?saved.student:{}),answers:Object.assign({},saved&&saved.answers?saved.answers:{}),records:Object.assign({},saved&&saved.records?saved.records:{}),practice:Object.assign({},saved&&saved.practice?saved.practice:{})});}catch(e){return fresh;}}
    function saveState(){localStorage.setItem(APP.storageKey,JSON.stringify(state));}
    function normalize(v){return String(v==null?'':v).toLowerCase().replace(/[^a-z0-9% ]+/g,' ').replace(/\s+/g,' ').trim();}
    const htmlMap={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}; function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,ch=>htmlMap[ch]);}
    function rec(id){if(!state.records[id])state.records[id]={attempts:0,locked:false,correct:false,feedback:'',message:''};return state.records[id];}
    function ans(id){return state.answers[id]==null?'':state.answers[id];}
    function setAns(id,v){state.answers[id]=v;saveState();updateHeader();updateNav();}
    function infoDone(){return normalize(state.student.name)&&normalize(state.student.period)&&normalize(state.student.date);} function qDone(q){return q.type==='teacher'?normalize(ans(q.id)).length>=(q.minLength||30):rec(q.id).locked;} function allDone(){return infoDone()&&questions.every(qDone);}
    function completion(){const required=3+questions.length;let done=0;if(normalize(state.student.name))done++;if(normalize(state.student.period))done++;if(normalize(state.student.date))done++;questions.forEach(q=>{if(qDone(q))done++;});return{done,required,percent:Math.round(done/required*100)};}
    function autoQs(){return questions.filter(q=>q.type!=='teacher');}
    function scores(){const auto=autoQs();const correct=auto.filter(q=>rec(q.id).correct).length;const sections={};auto.forEach(q=>{sections[q.skill]||(sections[q.skill]={skill:q.skill,correct:0,total:0});sections[q.skill].total++;if(rec(q.id).correct)sections[q.skill].correct++;});const arr=Object.values(sections);arr.forEach(s=>s.percent=Math.round(s.correct/s.total*100));return{correct,total:auto.length,score:Math.round(correct/auto.length*100),sections:arr};}
    function weak(){return scores().sections.filter(s=>s.percent<80).sort((a,b)=>a.percent-b.percent);}
    function render(){state.page=Math.max(0,Math.min(state.page||0,pages.length-1));const page=pages[state.page];document.getElementById('app').innerHTML=`<section><div class="head"><p class="eyebrow">${esc(page.section)}</p><h2>${esc(page.title)}</h2></div><div class="body">${body(page)}</div><div class="nav"><button class="secondary" data-prev ${state.page===0?'disabled':''}>Back</button><button data-next ${state.page===pages.length-1?'disabled':''}>Next</button></div></section>`;handlers();updateHeader();updateNav();}
    function body(page){if(page.kind==='info')return infoPage();if(page.kind==='learn')return learn(page.page);if(page.kind==='practice')return practicePage(page);if(page.kind==='assignment')return assignmentPage(page);return reviewPage();}
    function infoPage(){return `<div class="note"><strong>Before you begin</strong><span>This assignment saves your work on this Chromebook browser. Fill in the fields below, then move through the learning, practice, assignment, and review pages.</span></div><div class="grid3"><label>Student name<input data-student="name" value="${esc(state.student.name)}" autocomplete="name"></label><label>Class period<input data-student="period" value="${esc(state.student.period)}"></label><label>Date<input type="date" data-student="date" value="${esc(state.student.date||today)}"></label></div>`;}
    function learn(which){return which===1?`<div class="note"><strong>Big idea</strong><span>Housing choices are financial choices. The goal is to make the wise choice for your current money situation.</span></div><div class="formulas"><div class="formula"><strong>Rent guideline</strong><span>Monthly rent should be no more than 25% of take-home pay.</span></div><div class="formula"><strong>Cost of living</strong><span>The average cost of basic goods and services needed for a standard of living.</span></div><div class="formula"><strong>Living on your own</strong><span>Plan for deposits, supplies, groceries, transportation, utilities, insurance, and first month\'s rent.</span></div></div><div class="grid2"><div class="mini"><h3>Example</h3><p>If take-home pay is $2,800, the rent guideline is $2,800 x 0.25 = $700 or less.</p></div><div class="mini"><h3>Reminder</h3><p>Amenities are nice, but paying extra for them is not worth it if they block your financial goals.</p></div></div>`:`<div class="note"><strong>Terms that matter</strong><span>Read contracts carefully, compare long-term costs, and know the mortgage terms before you buy.</span></div><div class="formulas"><div class="formula"><strong>Lease</strong><span>A legal document that allows a renter to use property for a period of time.</span></div><div class="formula"><strong>Principal</strong><span>The amount borrowed that must be repaid to purchase a home.</span></div><div class="formula"><strong>Equity</strong><span>Home value minus what is still owed on the home.</span></div></div><div class="grid2"><div class="mini"><h3>Mortgage reminder</h3><p>A 15-year fixed-rate conventional mortgage is recommended because the rate stays set and the shorter loan usually means much less interest.</p></div><div class="mini"><h3>Ownership reminder</h3><p>Homeownership can build wealth, but buying before you are ready can make someone house poor.</p></div></div>`;}
    function practicePage(page){return `<div class="note"><strong>Guided practice</strong><span>Try these warmups before the graded assignment. They do not affect the final score.</span></div><div class="grid2">${page.ids.map(id=>practiceItem(pMap[id])).join('')}</div>`;}
    function practiceItem(item){const saved=state.practice[item.id]||{answer:'',message:'',status:''};const control=item.type==='number'?`<input type="number" data-practice-answer="${item.id}" value="${esc(saved.answer)}">`:`<select data-practice-answer="${item.id}"><option value="">Choose...</option>${item.options.map(o=>`<option value="${esc(o)}" ${saved.answer===o?'selected':''}>${esc(o)}</option>`).join('')}</select>`;return `<article class="practice"><h3>${esc(item.prompt)}</h3>${control}<div class="actions"><button data-practice-check="${item.id}">Check practice</button></div>${saved.message?`<div class="feedback ${esc(saved.status)}">${esc(saved.message)}</div>`:''}</article>`;}
    function assignmentPage(page){const skill=qMap[page.qids[0]].skill;return `<div class="note"><strong>Reminder</strong><span>${esc(reminders[skill]||reminders.Foundations)}</span></div><div class="grid2">${page.qids.map(id=>question(qMap[id])).join('')}</div>`;}
    function question(q){if(q.type==='teacher')return teacherQ(q);const r=rec(q.id);const cls=r.locked?(r.correct?'correct':'incorrect'):'';const text=r.locked?(r.correct?'Correct':'Locked'):(r.attempts?'1 attempt used':'2 attempts');const pill=r.locked?(r.correct?'good':'bad'):(r.attempts?'warn':'');return `<article class="q ${cls}"><div class="qtop"><span class="num">${esc(q.id.toUpperCase())}</span><span class="pill">${esc(q.skill)}</span></div><h3>${esc(q.prompt)}</h3>${control(q,r)}<div class="actions"><button data-check="${q.id}" ${r.locked?'disabled':''}>Check answer</button><span class="pill ${pill}">${esc(text)}</span></div>${r.message?`<div class="feedback ${esc(r.feedback)}">${esc(r.message)}</div>`:''}</article>`;}
    function teacherQ(q){const a=ans(q.id);const complete=normalize(a).length>=(q.minLength||30);return `<article class="q"><div class="qtop"><span class="num">${esc(q.id.toUpperCase())}</span><span class="pill">${esc(q.skill)}</span></div><h3>${esc(q.prompt)}</h3><textarea data-teacher="${q.id}">${esc(a)}</textarea><div class="actions"><span class="pill ${complete?'warn':''}">Teacher review needed</span></div><div class="feedback hint">This response will be included in the PDF for teacher review.</div></article>`;}
    function control(q,r){const v=ans(q.id),disabled=r.locked?'disabled':'';if(q.type==='select')return `<select data-answer="${q.id}" ${disabled}><option value="">Choose...</option>${q.options.map(o=>`<option value="${esc(o)}" ${v===o?'selected':''}>${esc(o)}</option>`).join('')}</select>`;if(q.type==='number')return `<input type="number" data-answer="${q.id}" value="${esc(v)}" ${disabled}>`;if(q.type==='checkbox'){const sel=Array.isArray(v)?v:[];return `<div class="checks">${q.options.map(o=>`<label><input type="checkbox" data-choice="${q.id}" value="${esc(o)}" ${sel.includes(o)?'checked':''} ${disabled}> <span>${esc(o)}</span></label>`).join('')}</div>`;}return `<textarea data-answer="${q.id}" ${disabled}>${esc(v)}</textarea>`;}
    function reviewPage(){const complete=allDone(),score=scores(),missed=autoQs().filter(q=>rec(q.id).locked&&!rec(q.id).correct),w=weak();if(!complete)return `<div class="note"><strong>Almost there</strong><span>Finish the required items below before the Save as PDF button appears.</span></div><ul class="remaining">${remaining().map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`;return `<div class="review"><h3>Final Score</h3><p><strong>${score.score}/100</strong> auto-graded score (${score.correct} of ${score.total} auto-graded questions correct).</p><p class="muted">Teacher-review responses are included in the PDF for your teacher to score separately if needed.</p><div class="actions"><button class="success" data-print>Save as PDF</button></div></div><div class="grid2"><div class="review"><h3>Section Performance</h3>${score.sections.map(s=>`<div class="row"><span>${esc(s.skill)}</span><strong>${s.correct}/${s.total} (${s.percent}%)</strong></div>`).join('')}</div><div class="review"><h3>Study Focus</h3><p>${w.length?esc(w.map(x=>x.skill).join(', ')):'No weak auto-graded skill areas appeared. Keep reviewing the written-response topics.'}</p></div></div><div class="review"><h3>Missed Questions</h3>${missed.length?missed.map(q=>`<p><strong>${esc(q.id.toUpperCase())}:</strong> ${esc(q.prompt)}<br><span class="muted">Correct answer: ${esc(q.answerText)}</span></p>`).join(''):'<p>No missed auto-graded questions.</p>'}</div>`;}
    function remaining(){const list=[];if(!normalize(state.student.name))list.push('Student name');if(!normalize(state.student.period))list.push('Class period');if(!normalize(state.student.date))list.push('Date');questions.forEach(q=>{if(!qDone(q))list.push(q.id.toUpperCase()+': '+q.prompt);});return list;}
    function handlers(){document.querySelector('[data-prev]')?.addEventListener('click',()=>move(-1));document.querySelector('[data-next]')?.addEventListener('click',()=>move(1));document.querySelector('[data-print]')?.addEventListener('click',savePdf);document.querySelectorAll('[data-student]').forEach(i=>i.addEventListener('input',e=>{state.student[e.target.dataset.student]=e.target.value;saveState();updateHeader();updateNav();}));document.querySelectorAll('[data-answer]').forEach(i=>i.addEventListener(i.tagName==='SELECT'?'change':'input',e=>setAns(e.target.dataset.answer,e.target.value)));document.querySelectorAll('[data-choice]').forEach(b=>b.addEventListener('change',e=>{const id=e.target.dataset.choice;const cur=Array.isArray(state.answers[id])?state.answers[id]:[];state.answers[id]=e.target.checked?[...cur,e.target.value]:cur.filter(v=>v!==e.target.value);saveState();updateHeader();updateNav();}));document.querySelectorAll('[data-teacher]').forEach(a=>a.addEventListener('input',e=>setAns(e.target.dataset.teacher,e.target.value)));document.querySelectorAll('[data-check]').forEach(b=>b.addEventListener('click',e=>checkQuestion(e.target.dataset.check)));document.querySelectorAll('[data-practice-answer]').forEach(i=>i.addEventListener(i.tagName==='SELECT'?'change':'input',e=>{const id=e.target.dataset.practiceAnswer;state.practice[id]=Object.assign(state.practice[id]||{},{answer:e.target.value});saveState();}));document.querySelectorAll('[data-practice-check]').forEach(b=>b.addEventListener('click',e=>checkPractice(e.target.dataset.practiceCheck)));}
    function move(d){const next=state.page+d;if(next<0||next>=pages.length)return;state.page=next;saveState();render();window.scrollTo({top:0,behavior:'smooth'});} function updateHeader(){const page=pages[state.page],c=completion();document.getElementById('pageLabel').textContent=page.section+': '+page.title;document.getElementById('progressText').textContent=c.percent+'% complete';document.getElementById('bar').style.width=c.percent+'%';}
    function updateNav(){const page=pages[state.page],btn=document.querySelector('[data-next]');if(!btn)return;let disabled=state.page===pages.length-1;if(page.kind==='info'&&!infoDone())disabled=true;if(page.kind==='assignment'&&!page.qids.every(id=>qDone(qMap[id])))disabled=true;btn.disabled=disabled;}
    function hasAnswer(q){const a=ans(q.id);return q.type==='checkbox'?Array.isArray(a)&&a.length>0:normalize(a).length>0;}
    function checkQuestion(id){const q=qMap[id],r=rec(id);if(!q||r.locked)return;if(!hasAnswer(q)){r.feedback='hint';r.message='Add an answer before checking.';saveState();render();return;}const correct=grade(q);r.attempts++;if(correct){r.correct=true;r.locked=true;r.feedback='correct';r.message='Correct. '+q.explanation;}else if(r.attempts>=2){r.correct=false;r.locked=true;r.feedback='incorrect';r.message='Incorrect. Correct answer: '+q.answerText+' '+q.explanation;}else{r.correct=false;r.feedback='hint';r.message='Hint: '+q.hint;}saveState();render();}
    function grade(q){const a=ans(q.id);if(q.type==='select')return a===q.answer;if(q.type==='number')return Math.abs(Number(a)-q.answer)<=(q.tolerance||0);if(q.type==='text')return normalize(a)===normalize(q.answer);if(q.type==='checkbox'){const picked=Array.isArray(a)?[...a].sort():[],correct=[...q.answer].sort();return picked.length===correct.length&&picked.every((v,i)=>v===correct[i]);}if(q.type==='keywords'){const text=normalize(a);return q.keywordGroups.filter(g=>g.some(t=>text.includes(normalize(t)))).length>=q.minMatches;}return false;}
    function checkPractice(id){const item=pMap[id],saved=state.practice[id]||{answer:''},a=saved.answer;let correct=false;if(item.type==='number')correct=Math.abs(Number(a)-item.answer)<=0;if(item.type==='select')correct=a===item.answer;if(!normalize(a)){saved.status='hint';saved.message='Try an answer first.';}else if(correct){saved.status='correct';saved.message='Correct. '+item.explanation;}else{saved.status='hint';saved.message='Hint: '+item.hint;}state.practice[id]=saved;saveState();render();}
    function displayAnswer(q){const a=ans(q.id);return Array.isArray(a)?a.join(', '):(a||'No response');}
    function studySummary(missed){const w=weak();if(!missed.length)return 'The auto-graded work shows strong readiness across the Chapter 11 housing topics. Keep reviewing the written responses about generosity, renting versus owning, and the Five Foundations so your explanations stay specific.';const names=w.length?w.map(x=>x.skill).join(', '):[...new Set(missed.map(q=>q.skill))].join(', ');return 'Focus your next study time on '+names+'. The missed questions show where to review the Chapter 11 reminders, especially the definitions, formulas, and decision rules connected to those topics.';}
    function buildPrint(){const score=scores(),missed=autoQs().filter(q=>!rec(q.id).correct),teacher=questions.filter(q=>q.type==='teacher');const sectionRows=score.sections.map(s=>`<tr><td>${esc(s.skill)}</td><td>${s.correct}/${s.total}</td><td>${s.percent}%</td></tr>`).join('');const missedRows=missed.length?missed.map(q=>`<tr><td>${esc(q.id.toUpperCase())}</td><td>${esc(q.prompt)}</td><td>${esc(displayAnswer(q))}</td><td>${esc(q.answerText)}</td><td>${esc(rec(q.id).attempts)} attempt(s). ${esc(q.explanation)}</td></tr>`).join(''):`<tr><td colspan="5">No missed auto-graded questions.</td></tr>`;const teacherRows=teacher.map(q=>`<tr><td>${esc(q.id.toUpperCase())}</td><td>${esc(q.prompt)}</td><td>${esc(displayAnswer(q))}</td><td>${esc(q.answerText)}</td></tr>`).join('');document.getElementById('printReport').innerHTML=`<div class="print-doc"><div class="print-title"><h1>${esc(APP.title)}</h1><div class="print-grid small"><div><strong>Student:</strong> ${esc(state.student.name)}</div><div><strong>Class period:</strong> ${esc(state.student.period)}</div><div><strong>Date:</strong> ${esc(state.student.date)}</div><div><strong>Version:</strong> ${esc(APP.version)}</div><div><strong>Final score:</strong> ${score.score}/100</div><div><strong>Auto-graded questions:</strong> ${score.correct}/${score.total}</div></div></div><p><strong>Study summary:</strong> ${esc(studySummary(missed))}</p><div class="print-section"><h2>Section Scores</h2><table class="print-table"><thead><tr><th>Section</th><th>Correct</th><th>Score</th></tr></thead><tbody>${sectionRows}</tbody></table></div><div class="print-section"><h2>Missed Questions and Correct Answers</h2><table class="print-table"><thead><tr><th>#</th><th>Question</th><th>Student answer</th><th>Correct answer</th><th>Notes</th></tr></thead><tbody>${missedRows}</tbody></table></div><div class="print-section"><h2>Teacher-Review Responses</h2><table class="print-table"><thead><tr><th>#</th><th>Prompt</th><th>Student response</th><th>Review guide</th></tr></thead><tbody>${teacherRows}</tbody></table></div></div>`;}
    function savePdf(){if(!allDone())return;buildPrint();window.print();}
    render();
  </script>
</body>
</html>
