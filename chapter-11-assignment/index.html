ding:10px 12px;font-weight:700;color:#153f7d}.support-box div{border-top:1px solid var(--line);padding:10px 12px;display:grid;gap:6px}.checks{display:grid;gap:8px}.checks label{display:flex;align-items:flex-start;gap:10px;font-weight:500;padding:10px;border:1px solid var(--line);border-radius:7px;background:#fff}.checks input{width:22px;min-height:22px;margin-top:2px;flex:0 0 22px}.row{display:grid;grid-template-columns:1.2fr .8fr;gap:12px;border-bottom:1px solid var(--line);padding-bottom:10px}.remaining{margin:0;padding-left:22px}#printReport{display:none}

<body>
  <div class='shell'>
    <header>
      <div class='title'>
        <div><p class='eyebrow'>Foundations in Personal Finance</p><h1>Chapter 11 Housing Assignment</h1></div>
        <div class='header-actions'><div class='version' id='versionLabel'></div><button class='reset-btn' id='resetBtn' type='button'>Start Over</button></div>
      </div>
      <div><div class='progress-meta'><span id='pageLabel'>Student Information</span><span id='progressText'>0% complete</span></div><div class='track'><div id='bar'></div></div></div>

  <script>
    // Teacher edit area: change question text, choices, answers, hints, and explanations in this section.
    const APP={title:`Chapter 11 Housing Assignment`,version:`1.5`,storageKey:`chapter11HousingAssignmentV2`};
    const today=new Date().toISOString().slice(0,10);
    const teacherMin=20;
    const reminders={
      Foundations:`Good money habits come before big housing decisions: save, budget, avoid debt, live on less than you make, and be generous.`,
      Renting:`Renting can be wise. Keep rent at or below 25% of take-home pay and compare more than the nicest amenities.`,
      Living:`Cost of living means the cost of basic needs in an area. Look for words like cost, goods, services, standard of living, and area.`,
      Leasing:`A lease is a legal document. Read it before signing because it is enforceable by law.`,
      Mortgages:`A 15-year fixed-rate conventional mortgage keeps the rate set and usually costs much less interest than a 30-year mortgage.`,
      Ownership:`Homeownership can build equity, but buying before you are ready can create stress and crowd out other goals.`,
      Roommates:`Roommates can lower costs when everyone communicates, respects shared space, and acts considerately.`
    };
    const questions=[
      {id:`q1`,skill:`Foundations`,type:`twoBlank`,prompt:`Complete the reminder: It is best to develop good ____ ____ now instead of waiting until you are on your own.`,answers:[`money`,`habits`],answerText:`money habits`,hint:`The first word tells what kind of habits.`,explanation:`The phrase is money habits.`},
      {id:`q2`,skill:`Renting`,type:`select`,prompt:`Renting is a great option for many people.`,options:[`True`,`False`],answer:`True`,answerText:`True`,hint:`Renting can be a wise step before someone is ready to buy.`,explanation:`Renting can fit a person's budget and season of life.`},
      {id:`q3`,skill:`Renting`,type:`number`,prompt:`Your rent payment should total no more than what percent of your take-home pay?`,answer:25,tolerance:0,answerText:`25%`,hint:`The rent guideline is one quarter of take-home pay.`,explanation:`A safe rent guideline is at or below 25% of take-home pay.`},
      {id:`q4`,skill:`Mortgages`,type:`select`,prompt:`When you are ready to buy a house, which mortgage option fits the Chapter 11 guidance?`,options:[`15-year fixed-rate conventional mortgage`,`20-year VA loan`,`30-year fixed-rate mortgage`,`30-year equity loan`],answer:`15-year fixed-rate conventional mortgage`,answerText:`15-year fixed-rate conventional mortgage`,hint:`Look for a shorter payoff time and a rate that does not change.`,explanation:`A 15-year fixed-rate conventional mortgage keeps the rate stable and pays off faster.`},
      {id:`q5`,skill:`Living`,type:`keywords`,prompt:`In your own words, define cost of living. Use any key term related to the idea.`,answerText:`Any cost-of-living key term such as cost, goods, services, standard of living, or area.`,keywordGroups:[[`cost`,`costs`,`price`,`prices`,`expense`,`expenses`],[`goods`,`services`,`needs`,`basic`],[`standard`,`living`],[`area`,`city`,`community`,`region`,`place`],[`average`]],minMatches:1,hint:`Use one key term: cost, goods, services, standard of living, or area.`,explanation:`For this open wording, the answer is counted correct when it includes any cost-of-living key term.`},
      {id:`q6`,skill:`Renting`,type:`select`,prompt:`Making periodic payments to a landlord for the use of property is called what?`,options:[`Down payment`,`Buying`,`Renting or leasing`,`Security deposit`],answer:`Renting or leasing`,answerText:`Renting or leasing`,hint:`Someone else owns the property.`,explanation:`Renting or leasing means paying a landlord to use property.`},
      {id:`q7`,skill:`Ownership`,type:`select`,prompt:`Buying a house while you are in debt puts what at risk?`,options:[`Your home purchase`,`Your diet plan`,`Your school schedule`,`Your favorite amenities`],answer:`Your home purchase`,answerText:`Your home purchase`,hint:`Debt makes the house purchase less stable.`,explanation:`Debt can make a home purchase riskier.`},
      {id:`q8`,skill:`Living`,type:`select`,prompt:`Living on campus can help you ____ living on your own while off-campus living requires rent, utilities, and groceries.`,options:[`ease into`,`dive into`,`avoid`,`ignore`],answer:`ease into`,answerText:`ease into`,hint:`Campus living is presented as a gradual step.`,explanation:`Living on campus can help students ease into independence.`},
      {id:`q9`,skill:`Ownership`,type:`select`,prompt:`Your decision to rent or buy depends most on your ____.`,options:[`friends' opinions`,`financial situation`,`income tax bracket`,`feelings about paint colors`],answer:`financial situation`,answerText:`financial situation`,hint:`Focus on readiness and money.`,explanation:`Renting or buying should be based on financial readiness.`},
      {id:`q10`,skill:`Renting`,type:`select`,prompt:`Paying extra rent for what is not worth it if it keeps you from reaching financial goals?`,options:[`Amenities`,`Mortgages`,`Security deposits`,`Tax brackets`],answer:`Amenities`,answerText:`Amenities`,hint:`These are nice features, but they can cost extra.`,explanation:`Amenities are not worth extra rent if they block financial goals.`},
      {id:`q11`,skill:`Ownership`,type:`select`,prompt:`A house is an asset that typically will ____ in value over time.`,options:[`stay the same`,`decrease`,`disappear`,`increase`],answer:`increase`,answerText:`increase`,hint:`Think about a common long-term ownership advantage.`,explanation:`A home often increases in value over time.`},
      {id:`q12`,skill:`Ownership`,type:`select`,prompt:`You should buy a home even if you cannot afford it yet because renting is a waste of money.`,options:[`True`,`False`],answer:`False`,answerText:`False`,hint:`Renting can be valid. Buying too early can create stress.`,explanation:`Buying before you are ready can hurt other goals.`},
      {id:`q13`,skill:`Mortgages`,type:`select`,prompt:`The only time it is okay to borrow money if you cannot pay 100% in cash is for what?`,options:[`A car lease`,`Home improvement projects`,`Buying a home with a mortgage`,`Renting a home`],answer:`Buying a home with a mortgage`,answerText:`Buying a home with a mortgage`,hint:`This exception is tied to buying a home.`,explanation:`A mortgage for a home is treated differently from consumer debt when the buyer is ready.`},
      {id:`q14`,skill:`Leasing`,type:`keywords`,prompt:`What is a leasing contract? Use a key term from the reminder.`,answerText:`A legal document or contract for a renter or tenant to use property for a set time.`,keywordGroups:[[`legal`,`contract`,`document`,`lease`],[`renter`,`tenant`],[`property`,`home`,`apartment`],[`time`,`term`,`period`]],minMatches:1,hint:`Use one lease key term: legal document, contract, renter, tenant, property, or term.`,explanation:`A lease is a legal contract about using property for a set time.`},
      {id:`q15`,skill:`Foundations`,type:`checkbox`,prompt:`Select the money principles that stay the same after high school.`,options:[`save`,`budget`,`stay out of debt`,`live on less than you make`,`be generous`,`use debt to build wealth`,`spend more as income grows`,`ignore emergency savings`],answer:[`save`,`budget`,`stay out of debt`,`live on less than you make`,`be generous`],answerText:`save, budget, stay out of debt, live on less than you make, and be generous`,hint:`Choose principles that create stability and avoid debt.`,explanation:`The lasting principles are save, budget, avoid debt, live on less than you make, and be generous.`},
      {id:`q16`,skill:`Ownership`,type:`select`,prompt:`When you look at long-term costs, which is usually the better deal for a ready buyer?`,options:[`Homeownership`,`Renting`,`Leasing`,`Maintaining`],answer:`Homeownership`,answerText:`Homeownership`,hint:`Think long-term wealth building and equity.`,explanation:`Homeownership can build equity when the buyer is ready.`},
      {id:`q17`,skill:`Leasing`,type:`select`,prompt:`Once you sign a leasing contract, it is enforceable by law.`,options:[`True`,`False`],answer:`True`,answerText:`True`,hint:`A lease is a legal document.`,explanation:`A signed lease is enforceable.`},
      {id:`q18`,skill:`Mortgages`,type:`select`,prompt:`What type of interest rate is locked in and will not change for the life of the loan?`,options:[`15-year`,`Fixed-rate`,`Adjustable rate`,`Equity rate`],answer:`Fixed-rate`,answerText:`Fixed-rate`,hint:`The name tells you the rate stays set.`,explanation:`A fixed-rate loan keeps the same interest rate.`},
      {id:`q19`,skill:`Ownership`,type:`select`,prompt:`When someone spends so much income on homeownership costs that other goals suffer, they are ____.`,options:[`wealthy`,`house poor`,`wise homeowners`,`rent poor`],answer:`house poor`,answerText:`house poor`,hint:`This phrase describes a home payment crowding out the budget.`,explanation:`House poor means housing costs leave too little room for other goals.`},
      {id:`q20`,skill:`Mortgages`,type:`select`,prompt:`A fixed-rate mortgage has which kind of mortgage rate?`,options:[`A set rate for a set number of years`,`A high rate for many years`,`A good rate for 15 days`,`A 12% rate for 30 years`],answer:`A set rate for a set number of years`,answerText:`A set rate for a set number of years`,hint:`Fixed means set.`,explanation:`A fixed-rate mortgage has a set rate.`},
      {id:`q21`,skill:`Leasing`,type:`checkbox`,prompt:`Select the items a lease should contain.`,options:[`Property address`,`Rental term`,`Security deposit terms`,`Pet fees`,`Closest shopping malls`,`Restaurant list`],answer:[`Property address`,`Rental term`,`Security deposit terms`,`Pet fees`],answerText:`property address, rental term, security deposit terms, and pet fees`,hint:`Choose legal and payment details, not entertainment nearby.`,explanation:`A lease should include property, term, deposit, and fee details.`},
      {id:`q22`,skill:`Mortgages`,type:`select`,prompt:`Which type of loan is not secured by a government entity and usually has the best rate and term?`,options:[`FHA loan`,`VA loan`,`Family loan`,`Conventional loan`],answer:`Conventional loan`,answerText:`Conventional loan`,hint:`FHA and VA are connected to government programs.`,explanation:`A conventional loan is not secured by a government entity.`},
      {id:`q23`,skill:`Foundations`,type:`select`,prompt:`Learning about living costs before you need to cover them is an example of what?`,options:[`Taking personal responsibility`,`Poor money management`,`Being a consumer`,`Waiting to budget`],answer:`Taking personal responsibility`,answerText:`Taking personal responsibility`,hint:`This is a responsible action before independence.`,explanation:`Preparing for future living costs is personal responsibility.`},
      {id:`q24`,skill:`Mortgages`,type:`select`,prompt:`Which statement best defines mortgage principal?`,options:[`The amount borrowed that must be repaid to purchase a home`,`The largest amount you are legally allowed to borrow`,`The down payment needed to get a mortgage`,`The first payment you make on your new home`],answer:`The amount borrowed that must be repaid to purchase a home`,answerText:`The amount borrowed that must be repaid to purchase a home`,hint:`Principal is the borrowed amount.`,explanation:`Mortgage principal is the amount borrowed and repaid.`},
      {id:`q25`,skill:`Roommates`,type:`checkbox`,prompt:`Select the habits that make living with a roommate more peaceful while saving money.`,options:[`Communicate`,`Be respectful`,`Be considerate`,`Avoid talking about problems`,`Require the roommate to pay more rent`],answer:[`Communicate`,`Be respectful`,`Be considerate`],answerText:`communicate, be respectful, and be considerate`,hint:`Look for habits that help people solve problems and share space well.`,explanation:`Good roommates communicate, show respect, and act considerately.`},
      {id:`q26`,skill:`Ownership`,type:`select`,prompt:`After you hire a real estate agent, what is the next step in the home buying process?`,options:[`Close on your new home`,`Get a home inspection`,`Start looking at homes within your budget`,`Make an offer on a home`],answer:`Start looking at homes within your budget`,answerText:`Start looking at homes within your budget`,hint:`Before inspections and offers, find homes that fit the budget.`,explanation:`The next step is looking at homes within budget.`},
      {id:`q27`,skill:`Mortgages`,type:`select`,prompt:`It is impossible to get a mortgage without a credit score.`,options:[`True`,`False`],answer:`False`,answerText:`False`,hint:`There can be other ways to evaluate a borrower.`,explanation:`A mortgage is not impossible without a credit score, though readiness still matters.`},
      {id:`q28`,skill:`Ownership`,type:`select`,prompt:`Equity is the difference between what you still owe on your home and what it is worth.`,options:[`True`,`False`],answer:`True`,answerText:`True`,hint:`Equity compares value with remaining loan balance.`,explanation:`Equity is value minus what is still owed.`},
      {id:`q29`,skill:`Living`,type:`checkboxMin`,prompt:`Select at least three costs of living on your own.`,options:[`security deposit`,`sheets and towels`,`kitchen supplies`,`groceries`,`transportation`,`furniture`,`renter's insurance`,`utilities setup`,`first month's rent`,`luxury vacation`,`designer clothes`,`concert tickets`],answer:[`security deposit`,`sheets and towels`,`kitchen supplies`,`groceries`,`transportation`,`furniture`,`renter's insurance`,`utilities setup`,`first month's rent`],minCorrect:3,answerText:`Any three real living costs, such as security deposit, groceries, transportation, utilities setup, or first month's rent.`,hint:`Choose real move-in or monthly costs, not wants or entertainment.`,explanation:`Living on your own includes deposits, supplies, food, transportation, utilities, insurance, and rent.`},
      {id:`q30`,skill:`Renting`,type:`checkboxMin`,prompt:`Select at least three ways someone can save money on rent or living costs.`,options:[`compare locations`,`choose fewer amenities`,`look at older properties`,`find a roommate`,`compare internet options`,`conserve water and energy`,`shop secondhand for necessities`,`rent the newest luxury apartment`,`ignore utility usage`,`buy all new furniture`],answer:[`compare locations`,`choose fewer amenities`,`look at older properties`,`find a roommate`,`compare internet options`,`conserve water and energy`,`shop secondhand for necessities`],minCorrect:3,answerText:`Any three reasonable saving strategies, such as compare locations, choose fewer amenities, find a roommate, conserve utilities, or shop secondhand.`,hint:`Choose actions that lower recurring costs or setup costs.`,explanation:`Renters can save by comparing options, limiting extras, sharing costs, conserving utilities, and buying secondhand.`},
      {id:`q31`,skill:`Mortgages`,type:`teacher`,prompt:`Why is a 15-year fixed-rate mortgage better than a 30-year mortgage?`,minLength:teacherMin,answerText:`Teacher review: look for lower interest, faster payoff, and stable rate.`},
      {id:`q32`,skill:`Ownership`,type:`teacher`,prompt:`Explain how renting or buying a home connects with someone's ability to be generous.`,minLength:teacherMin,answerText:`Teacher review: look for budget readiness, financial goals, generosity, and avoiding buying too quickly.`},
      {id:`q33`,skill:`Ownership`,type:`teacher`,prompt:`Give advantages and disadvantages of renting and owning a home. Use examples from the chapter.`,minLength:teacherMin,answerText:`Teacher review: look for flexibility, costs, equity, maintenance, readiness, and long-term tradeoffs.`},
      {id:`q34`,skill:`Foundations`,type:`teacher`,prompt:`Explain how the Five Foundations can help with housing decisions after high school.`,minLength:teacherMin,answerText:`Teacher review: look for emergency savings, avoiding debt, paying cash when possible, and wise long-term planning.`}
    ];
    const practice=[
      {id:`p1`,type:`number`,prompt:`Practice: If take-home pay is $2,400, what is 25%?`,answer:600,hint:`Multiply 2400 by 0.25.`,explanation:`2400 x 0.25 = 600.`},
      {id:`p2`,type:`select`,prompt:`Practice: A signed lease is enforceable by law.`,options:[`True`,`False`],answer:`True`,hint:`A lease is a legal document.`,explanation:`A lease is enforceable after it is signed.`}
    ];
    // End teacher edit area.

    const qMap=Object.fromEntries(questions.map(q=>[q.id,q]));
    const pMap=Object.fromEntries(practice.map(p=>[p.id,p]));
    const pages=[{kind:`info`,section:`Start`,title:`Student Information`},{kind:`learn`,section:`Mini Lesson`,title:`Housing Decisions`,page:1},{kind:`practice`,section:`Guided Practice`,title:`Quick Warmups`,ids:[`p1`,`p2`]}];
    for(let i=0;i<questions.length;i+=2)pages.push({kind:`assignment`,section:`Assignment`,title:`Questions ${i+1}-${Math.min(i+2,questions.length)}`,qids:questions.slice(i,i+2).map(q=>q.id)});
    pages.push({kind:`review`,section:`Final Review`,title:`Final Review`});
    let state=loadState();

    function freshState(){return{appVersion:APP.version,page:0,student:{name:``,period:``,date:today},answers:{},records:{},practice:{},pdfCreated:false};}
    function loadState(){const fresh=freshState();try{const saved=JSON.parse(localStorage.getItem(APP.storageKey));if(!saved||saved.appVersion!==APP.version)return fresh;return Object.assign(fresh,saved,{student:Object.assign(fresh.student,saved.student||{}),answers:Object.assign({},saved.answers||{}),records:Object.assign({},saved.records||{}),practice:Object.assign({},saved.practice||{}),pdfCreated:!!saved.pdfCreated});}catch(e){return fresh;}}
    function saveState(){localStorage.setItem(APP.storageKey,JSON.stringify(state));}
    function resetAssignment(){if(state.pdfCreated)return;const ok=window.confirm(`Start over and erase all entered information for this assignment? This cannot be undone.`);if(!ok)return;localStorage.removeItem(APP.storageKey);state=freshState();render();window.scrollTo({top:0,behavior:`smooth`});}
    function normalize(v){return String(v==null?``:v).toLowerCase().replace(/[^a-z0-9% ]+/g,` `).replace(/\s+/g,` `).trim();}
    function esc(v){return String(v==null?``:v).replace(/[&<>']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;"}[ch]));}
    function fmt(n){const value=Math.round((Number(n)||0)*10)/10;return Number.isInteger(value)?String(value):value.toFixed(1);}
    function rec(id){if(!state.records[id])state.records[id]={attempts:0,locked:false,correct:false,score:0,feedback:``,message:``};return state.records[id];}
    function ans(id){return state.answers[id]==null?``:state.answers[id];}
    function setAns(id,v){state.answers[id]=v;saveState();updateHeader();updateNav();}
    function answerBlanks(q){const a=ans(q.id);return Array.isArray(a)?[a[0]||``,a[1]||``]:[``,``];}
    function setBlank(id,index,value){const parts=answerBlanks(qMap[id]);parts[index]=value;setAns(id,parts);}
    function teacherComplete(q){return normalize(ans(q.id)).length>=(q.minLength||teacherMin);}
    function infoDone(){return normalize(state.student.name)&&normalize(state.student.period)&&normalize(state.student.date);}
    function qDone(q){return q.type===`teacher`?teacherComplete(q):rec(q.id).locked;}
    function allDone(){return infoDone()&&questions.every(qDone);}
    function autoQs(){return questions.filter(q=>q.type!==`teacher`);}
    function teacherQs(){return questions.filter(q=>q.type===`teacher`);}
    function completion(){const required=3+questions.length;let done=0;if(normalize(state.student.name))done++;if(normalize(state.student.period))done++;if(normalize(state.student.date))done++;questions.forEach(q=>{if(qDone(q))done++;});return{done,required,percent:Math.round(done/required*100)};}
    function scores(){const auto=autoQs(),teacher=teacherQs();const autoEarned=auto.reduce((sum,q)=>sum+(rec(q.id).score||0),0);const teacherCompleted=teacher.filter(teacherComplete).length;const sections={};auto.forEach(q=>{sections[q.skill]||(sections[q.skill]={skill:q.skill,earned:0,total:0});sections[q.skill].total++;sections[q.skill].earned+=rec(q.id).score||0;});const arr=Object.values(sections);arr.forEach(s=>s.percent=Math.round((s.earned/s.total)*100));const finalEarned=autoEarned+teacherCompleted,finalTotal=auto.length+teacher.length;return{autoEarned,autoTotal:auto.length,autoScore:Math.round(autoEarned/auto.length*100),teacherCompleted,teacherTotal:teacher.length,finalEarned,finalTotal,finalScore:Math.round(finalEarned/finalTotal*100),sections:arr};}
    function weak(){return scores().sections.filter(s=>s.percent<80).sort((a,b)=>a.percent-b.percent);}
    function render(){state.page=Math.max(0,Math.min(state.page||0,pages.length-1));const page=pages[state.page];document.getElementById(`app`).innerHTML=`<section><div class='head'><p class='eyebrow'>${esc(page.section)}</p><h2>${esc(page.title)}</h2></div><div class='body'>${body(page)}</div><div class='nav'><button class='secondary' data-prev ${state.page===0?`disabled`:``}>Back</button><button data-next ${state.page===pages.length-1?`disabled`:``}>Next</button></div></section>`;handlers();updateHeader();updateNav();updateResetButton();}
    function body(page){if(page.kind===`info`)return infoPage();if(page.kind===`learn`)return learnPage();if(page.kind===`practice`)return practicePage(page);if(page.kind===`assignment`)return assignmentPage(page);return reviewPage();}
    function infoPage(){return`<div class='note'><strong>Before you begin</strong><span>This assignment saves progress in this browser. Objective questions lock after two checked attempts. If a question is open-worded, use the key terms named in the prompt.</span></div><div class='grid3'><label>Student name<input data-student='name' value='${esc(state.student.name)}' autocomplete='name'></label><label>Class period<input data-student='period' value='${esc(state.student.period)}'></label><label>Date<input type='date' data-student='date' value='${esc(state.student.date||today)}'></label></div><div class='tool-grid'><div class='tool-card'><strong>Two tries</strong><span>Use the hint before checking the second time.</span></div><div class='tool-card'><strong>Keyword questions</strong><span>For cost of living, any correct key term earns full credit.</span></div><div class='tool-card'><strong>Report</strong><span>Final review includes section scores, answers, Copy Answers, and Save as PDF.</span></div></div>`;}
    function learnPage(){return`<div class='note'><strong>Big idea</strong><span>Housing choices are financial choices. Choose the option that fits your current money situation and supports your goals.</span></div><div class='formulas'><div class='formula'><strong>Rent guideline</strong><span>Monthly rent should be no more than 25% of take-home pay.</span></div><div class='formula'><strong>Cost of living</strong><span>Average cost of basic goods and services needed for a standard of living in an area.</span></div><div class='formula'><strong>Lease</strong><span>A legal contract that lets a tenant use property for a period of time.</span></div></div><div class='grid2'><div class='mini'><h3>Mortgage reminder</h3><p>A 15-year fixed-rate conventional mortgage keeps the rate stable and helps pay off the home faster.</p></div><div class='mini'><h3>Ownership reminder</h3><p>Homeownership can build wealth, but buying before you are ready can make someone house poor.</p></div></div>`;}
    function practicePage(page){return`<div class='note'><strong>Guided practice</strong><span>Warmups do not affect the final score.</span></div><div class='grid2'>${page.ids.map(id=>practiceItem(pMap[id])).join(``)}</div>`;}
    function practiceItem(item){const saved=state.practice[item.id]||{answer:``,message:``,status:``};const control=item.type===`number`?`<input type='number' data-practice-answer='${item.id}' value='${esc(saved.answer)}'>`:`<select data-practice-answer='${item.id}'><option value=''>Choose...</option>${item.options.map(o=>`<option value='${esc(o)}' ${saved.answer===o?`selected`:``}>${esc(o)}</option>`).join(``)}</select>`;return`<article class='practice'><h3>${esc(item.prompt)}</h3>${control}<div class='actions'><button data-practice-check='${item.id}'>Check practice</button></div>${saved.message?`<div class='feedback ${esc(saved.status)}'>${esc(saved.message)}</div>`:``}</article>`;}
    function assignmentPage(page){const skill=qMap[page.qids[0]].skill;return`<div class='note'><strong>Reminder</strong><span>${esc(reminders[skill]||reminders.Foundations)}</span></div><div class='grid2'>${page.qids.map(id=>question(qMap[id])).join(``)}</div>`;}
    function answerFormat(q){if(q.type===`twoBlank`)return`Type the two missing words in order.`;if(q.type===`keywords`)return`Use any correct key term named in the hint or reminder.`;if(q.type===`checkboxMin`)return`Select at least ${q.minCorrect} correct choices and no incorrect choices.`;if(q.type===`checkbox`)return`Select all correct choices and no incorrect choices.`;if(q.type===`number`)return`Type a number only.`;return`Choose the best answer.`;}
    function supportPanel(q,r){const warning=!r.locked&&r.attempts===1?`<div class='final-warning'>Final graded try: review the hint before checking again. If this try is not correct, the problem locks as wrong.</div>`:``;const solution=r.locked?`<p><strong>Worked explanation:</strong> ${esc(q.explanation)}</p>`:``;return`${warning}<details class='support-box'><summary>I'm stuck - show a hint</summary><div><p><strong>Answer format:</strong> ${esc(answerFormat(q))}</p><p><strong>Hint:</strong> ${esc(q.hint)}</p>${solution}</div></details>`;}
    function question(q){if(q.type===`teacher`)return teacherQ(q);const r=rec(q.id);const statusClass=r.locked?(r.score>=1?`correct`:`incorrect`):``;const statusText=r.locked?(r.score>=1?`Correct`:`Locked wrong`):(r.attempts?`1 attempt used`:`2 attempts`);const pill=r.locked?(r.score>=1?`good`:`bad`):(r.attempts?`warn`:``);return`<article class='q ${statusClass}'><div class='qtop'><span class='num'>${esc(q.id.toUpperCase())}</span><span class='pill'>${esc(q.skill)}</span></div><h3>${esc(q.prompt)}</h3><div class='answer-format'>${esc(answerFormat(q))}</div>${control(q,r)}${supportPanel(q,r)}<div class='actions'><button data-check='${q.id}' ${r.locked?`disabled`:``}>Check answer</button><span class='pill ${pill}'>${esc(statusText)}</span></div>${r.message?`<div class='feedback ${esc(r.feedback)}'>${esc(r.message)}</div>`:``}</article>`;}
    function teacherQ(q){const a=ans(q.id);const complete=teacherComplete(q);return`<article class='q'><div class='qtop'><span class='num'>${esc(q.id.toUpperCase())}</span><span class='pill'>${esc(q.skill)}</span></div><h3>${esc(q.prompt)}</h3><textarea data-teacher='${q.id}'>${esc(a)}</textarea><div class='actions'><span class='pill ${complete?`warn`:``}' data-teacher-status='${q.id}'>${complete?`Teacher review needed`:`Response needed`}</span></div><div class='feedback hint' data-teacher-feedback='${q.id}'>${complete?`Teacher review needed. This response is included in the PDF.`:`Please write a complete response before continuing.`}</div></article>`;}
    function control(q,r){const v=ans(q.id),disabled=r.locked?`disabled`:``;if(q.type===`twoBlank`){const parts=answerBlanks(q);return`<div class='grid2'><label>Blank 1<input data-blank='${q.id}' data-index='0' value='${esc(parts[0])}' ${disabled}></label><label>Blank 2<input data-blank='${q.id}' data-index='1' value='${esc(parts[1])}' ${disabled}></label></div>`;}if(q.type===`select`)return`<select data-answer='${q.id}' ${disabled}><option value=''>Choose...</option>${q.options.map(o=>`<option value='${esc(o)}' ${v===o?`selected`:``}>${esc(o)}</option>`).join(``)}</select>`;if(q.type===`number`)return`<input type='number' data-answer='${q.id}' value='${esc(v)}' ${disabled}>`;if(q.type===`checkbox`||q.type===`checkboxMin`){const sel=Array.isArray(v)?v:[];return`<div class='checks'>${q.options.map(o=>`<label><input type='checkbox' data-choice='${q.id}' value='${esc(o)}' ${sel.includes(o)?`checked`:``} ${disabled}> <span>${esc(o)}</span></label>`).join(``)}</div>`;}return`<textarea data-answer='${q.id}' ${disabled}>${esc(v)}</textarea>`;}
    function reviewPage(){const complete=allDone(),score=scores(),missed=autoQs().filter(q=>rec(q.id).locked&&(rec(q.id).score||0)<1),w=weak();if(!complete)return`<div class='note'><strong>Almost there</strong><span>Finish the required items below before the final report tools appear.</span></div><ul class='remaining'>${remaining().map(x=>`<li>${esc(x)}</li>`).join(``)}</ul>`;return`<div class='review'><h3>Final Score</h3><p><strong>${score.finalScore}/100</strong> final score (${fmt(score.finalEarned)} of ${score.finalTotal} total points).</p><p><strong>${score.autoScore}/100</strong> auto-graded score (${fmt(score.autoEarned)} of ${score.autoTotal} objective points).</p><p class='muted'>Teacher-review responses earn completion credit here and are included in the PDF.</p><div class='actions'><button class='secondary' data-copy>Copy Answers</button><button class='success' data-print>Save as PDF</button></div></div><div class='grid2'><div class='review'><h3>Section Performance</h3>${score.sections.map(s=>`<div class='row'><span>${esc(s.skill)}</span><strong>${fmt(s.earned)}/${s.total} (${s.percent}%)</strong></div>`).join(``)}</div><div class='review'><h3>Study Focus</h3><p>${w.length?esc(w.map(x=>x.skill).join(`, `)):`No weak auto-graded skill areas appeared. Keep reviewing the written-response topics.`}</p><p><strong>Teacher-review completion:</strong> ${score.teacherCompleted}/${score.teacherTotal}</p></div></div><div class='review'><h3>Missed Questions</h3>${missed.length?missed.map(q=>`<p><strong>${esc(q.id.toUpperCase())}:</strong> ${esc(q.prompt)}<br><span class='muted'>Correct answer: ${esc(q.answerText)}</span></p>`).join(``):`<p>No missed auto-graded questions.</p>`}</div>`;}
    function remaining(){const list=[];if(!normalize(state.student.name))list.push(`Student name`);if(!normalize(state.student.period))list.push(`Class period`);if(!normalize(state.student.date))list.push(`Date`);questions.forEach(q=>{if(!qDone(q))list.push(q.id.toUpperCase()+`: `+(q.type===`teacher`?`Please write a complete response.`:q.prompt));});return list;}
    function handlers(){document.querySelector(`[data-prev]`)?.addEventListener(`click`,()=>move(-1));document.querySelector(`[data-next]`)?.addEventListener(`click`,()=>move(1));document.querySelector(`[data-print]`)?.addEventListener(`click`,savePdf);document.querySelector(`[data-copy]`)?.addEventListener(`click`,copyAnswers);document.querySelectorAll(`[data-student]`).forEach(i=>i.addEventListener(`input`,e=>{state.student[e.target.dataset.student]=e.target.value;saveState();updateHeader();updateNav();}));document.querySelectorAll(`[data-answer]`).forEach(i=>i.addEventListener(i.tagName===`SELECT`?`change`:`input`,e=>setAns(e.target.dataset.answer,e.target.value)));document.querySelectorAll(`[data-blank]`).forEach(i=>i.addEventListener(`input`,e=>setBlank(e.target.dataset.blank,Number(e.target.dataset.index),e.target.value)));document.querySelectorAll(`[data-choice]`).forEach(b=>b.addEventListener(`change`,e=>{const id=e.target.dataset.choice;const cur=Array.isArray(state.answers[id])?state.answers[id]:[];state.answers[id]=e.target.checked?[...cur,e.target.value]:cur.filter(v=>v!==e.target.value);saveState();updateHeader();updateNav();}));document.querySelectorAll(`[data-teacher]`).forEach(a=>a.addEventListener(`input`,e=>{setAns(e.target.dataset.teacher,e.target.value);updateTeacherStatus(e.target.dataset.teacher);}));document.querySelectorAll(`[data-check]`).forEach(b=>b.addEventListener(`click`,e=>checkQuestion(e.target.dataset.check)));document.querySelectorAll(`[data-practice-answer]`).forEach(i=>i.addEventListener(i.tagName===`SELECT`?`change`:`input`,e=>{const id=e.target.dataset.practiceAnswer;state.practice[id]=Object.assign(state.practice[id]||{}, {answer:e.target.value});saveState();}));document.querySelectorAll(`[data-practice-check]`).forEach(b=>b.addEventListener(`click`,e=>checkPractice(e.target.dataset.practiceCheck)));}
    function move(d){const next=state.page+d;if(next<0||next>=pages.length)return;state.page=next;saveState();render();window.scrollTo({top:0,behavior:`smooth`});}
    function updateHeader(){const page=pages[state.page],c=completion();document.getElementById(`versionLabel`).textContent=`Version ${APP.version}`;document.getElementById(`pageLabel`).textContent=page.section+`: `+page.title;document.getElementById(`progressText`).textContent=c.percent+`% complete`;document.getElementById(`bar`).style.width=c.percent+`%`;}
    function updateResetButton(){const btn=document.getElementById(`resetBtn`);if(!btn)return;btn.disabled=!!state.pdfCreated;btn.title=state.pdfCreated?`Start Over is disabled after Save as PDF has been used.`:`Erase saved progress and return to the beginning.`;btn.textContent=state.pdfCreated?`Start Over Disabled`:`Start Over`;}
    function updateNav(){const page=pages[state.page],btn=document.querySelector(`[data-next]`);if(!btn)return;let disabled=state.page===pages.length-1;if(page.kind===`info`&&!infoDone())disabled=true;if(page.kind===`assignment`&&!page.qids.every(id=>qDone(qMap[id])))disabled=true;btn.disabled=disabled;}
    function updateTeacherStatus(id){const q=qMap[id],complete=teacherComplete(q),status=document.querySelector(`[data-teacher-status='${id}']`),feedback=document.querySelector(`[data-teacher-feedback='${id}']`);if(status){status.textContent=complete?`Teacher review needed`:`Response needed`;status.className=`pill `+(complete?`warn`:``);}if(feedback){feedback.textContent=complete?`Teacher review needed. This response is included in the PDF.`:`Please write a complete response before continuing.`;}}
    function hasAnswer(q){const a=ans(q.id);if(q.type===`checkbox`||q.type===`checkboxMin`)return Array.isArray(a)&&a.length>0;if(q.type===`twoBlank`)return answerBlanks(q).some(v=>normalize(v));return normalize(a).length>0;}
    function checkQuestion(id){const q=qMap[id],r=rec(id);if(!q||r.locked)return;if(!hasAnswer(q)){r.feedback=`hint`;r.message=`Add an answer before checking.`;saveState();render();return;}const result=grade(q);r.attempts++;if(result.full){r.correct=true;r.score=1;r.locked=true;r.feedback=`correct`;r.message=`Correct. `+q.explanation;}else if(r.attempts>=2){r.correct=false;r.score=0;r.locked=true;r.feedback=`incorrect`;r.message=`Not quite. This problem is now locked as wrong. Correct answer: ${q.answerText}. ${q.explanation}`;}else{r.correct=false;r.score=0;r.feedback=`hint`;r.message=`Try again: `+firstHint(q,result);}saveState();render();}
    function firstHint(q,result){if(q.type===`twoBlank`&&result.correctCount>0)return`You have one of the two words. Check the other blank.`;if(q.type===`keywords`)return`Use one key term from the reminder, such as cost, goods, services, standard of living, or area.`;if((q.type===`checkbox`||q.type===`checkboxMin`)&&result.correctPicked>0)return`Some selected choices fit. Remove any choice that does not belong and add enough correct choices.`;return q.hint;}
    function grade(q){const a=ans(q.id);if(q.type===`twoBlank`)return gradeTwoBlank(q);if(q.type===`select`)return simpleGrade(a===q.answer);if(q.type===`number`)return simpleGrade(Math.abs(Number(a)-q.answer)<=(q.tolerance||0));if(q.type===`checkbox`||q.type===`checkboxMin`)return gradeCheckbox(q);if(q.type===`keywords`)return gradeKeywords(q);return simpleGrade(false);}
    function simpleGrade(full){return{score:full?1:0,full};}
    function gradeTwoBlank(q){const parts=answerBlanks(q).map(normalize);let correct=0;if(parts[0]===q.answers[0])correct++;if(parts[1]===q.answers[1])correct++;return{correctCount:correct,full:correct===2};}
    function gradeKeywords(q){const text=normalize(ans(q.id));const matches=q.keywordGroups.filter(group=>group.some(term=>text.includes(normalize(term)))).length;return{matches,full:matches>=q.minMatches};}
    function gradeCheckbox(q){const picked=Array.isArray(ans(q.id))?ans(q.id):[];const correct=new Set(q.answer);const correctPicked=picked.filter(v=>correct.has(v)).length;const wrongPicked=picked.filter(v=>!correct.has(v)).length;const needed=q.type===`checkboxMin`?(q.minCorrect||1):q.answer.length;const full=wrongPicked===0&&(q.type===`checkboxMin`?correctPicked>=needed:correctPicked===q.answer.length);return{full,correctPicked,wrongPicked};}
    function checkPractice(id){const item=pMap[id],saved=state.practice[id]||{answer:``},a=saved.answer;let correct=false;if(item.type===`number`)correct=Math.abs(Number(a)-item.answer)<=0;if(item.type===`select`)correct=a===item.answer;if(!normalize(a)){saved.status=`hint`;saved.message=`Try an answer first.`;}else if(correct){saved.status=`correct`;saved.message=`Correct. `+item.explanation;}else{saved.status=`hint`;saved.message=`Hint: `+item.hint;}state.practice[id]=saved;saveState();render();}
    function displayAnswer(q){const a=ans(q.id);if(q.type===`twoBlank`)return answerBlanks(q).join(` `);return Array.isArray(a)?a.join(`, `):(a||`No response`);}
    function studySummary(missed){const skills=[...new Set(missed.map(q=>q.skill))];if(!skills.length)return`This student showed strong readiness on the auto-graded Chapter 11 housing topics. Written responses should still be reviewed.`;return`This student should review ${skills.join(`, `)} topics. Missed questions connect with rent guidelines, mortgage types, leases, cost of living, or housing decision-making.`;}
    function answerReport(){const score=scores();return`${APP.title}\nStudent: ${state.student.name}\nPeriod: ${state.student.period}\nDate: ${state.student.date}\nFinal Score: ${score.finalScore}/100\n\n`+questions.map(q=>`${q.id.toUpperCase()} (${q.skill})\nPrompt: ${q.prompt}\nStudent answer: ${displayAnswer(q)}\nResult: ${q.type===`teacher`?(teacherComplete(q)?`Teacher review response complete`:`Incomplete`):(rec(q.id).score?`Correct`:`Incorrect`)}\nCorrect/guide: ${q.answerText}\n`).join(`\n`);}
    async function copyAnswers(){const text=answerReport();try{await navigator.clipboard.writeText(text);alert(`Answers copied.`);}catch(e){const box=document.createElement(`textarea`);box.value=text;document.body.appendChild(box);box.select();document.execCommand(`copy`);box.remove();alert(`Answers copied.`);}}
    function buildPrint(){const score=scores(),missed=autoQs().filter(q=>(rec(q.id).score||0)<1),teacher=teacherQs(),weakNames=weak().map(s=>s.skill);const sectionRows=score.sections.map(s=>`<tr><td>${esc(s.skill)}</td><td>${fmt(s.earned)}/${s.total}</td><td>${s.percent}%</td></tr>`).join(``);const missedRows=missed.length?missed.map(q=>`<tr><td>${esc(q.id.toUpperCase())}</td><td>${esc(q.prompt)}</td><td>${esc(displayAnswer(q))}</td><td>${esc(q.answerText)}</td><td>${esc(q.explanation)}</td></tr>`).join(``):`<tr><td colspan='5'>No missed auto-graded questions.</td></tr>`;const allRows=questions.map(q=>`<tr><td>${esc(q.id.toUpperCase())}</td><td>${esc(q.skill)}</td><td>${esc(displayAnswer(q))}</td><td>${esc(q.type===`teacher`?`Teacher review`:((rec(q.id).score||0)?`Correct`:`Incorrect`))}</td></tr>`).join(``);const teacherRows=teacher.map(q=>`<tr><td>${esc(q.id.toUpperCase())}</td><td>${esc(q.prompt)}</td><td>${esc(displayAnswer(q))}</td><td>${esc(q.answerText)}</td></tr>`).join(``);document.getElementById(`printReport`).innerHTML=`<div class='print-doc'><div class='print-title'><h1>${esc(APP.title)}</h1><div class='print-grid small'><div><strong>Student:</strong> ${esc(state.student.name)}</div><div><strong>Class period:</strong> ${esc(state.student.period)}</div><div><strong>Date:</strong> ${esc(state.student.date)}</div><div><strong>Version:</strong> ${esc(APP.version)}</div><div><strong>Final score:</strong> ${score.finalScore}/100</div><div><strong>Auto-graded score:</strong> ${score.autoScore}/100</div></div></div><p><strong>Study summary:</strong> ${esc(studySummary(missed))}</p><div class='print-section'><h2>Missed Skills</h2><p>${weakNames.length?esc(weakNames.join(`, `)):`No weak auto-graded skill areas appeared.`}</p></div><div class='print-section'><h2>Section Scores</h2><table class='print-table'><thead><tr><th>Section</th><th>Credit</th><th>Score</th></tr></thead><tbody>${sectionRows}</tbody></table></div><div class='print-section'><h2>Missed Questions and Correct Answers</h2><table class='print-table'><thead><tr><th>#</th><th>Question</th><th>Student answer</th><th>Correct answer</th><th>Notes</th></tr></thead><tbody>${missedRows}</tbody></table></div><div class='print-section'><h2>Final Answers</h2><table class='print-table'><thead><tr><th>#</th><th>Section</th><th>Student answer</th><th>Result</th></tr></thead><tbody>${allRows}</tbody></table></div><div class='print-section'><h2>Teacher-Review Responses</h2><table class='print-table'><thead><tr><th>#</th><th>Prompt</th><th>Student response</th><th>Review guide</th></tr></thead><tbody>${teacherRows}</tbody></table></div></div>`;}
    function savePdf(){if(!allDone())return;state.pdfCreated=true;saveState();updateResetButton();buildPrint();window.print();}
    document.getElementById(`resetBtn`).addEventListener(`click`,resetAssignment);
    render();
  </script>
</body>
</html>
