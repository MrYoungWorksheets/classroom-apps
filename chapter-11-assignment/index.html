<!doctype html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Chapter 11 Housing Assignment</title>
  <style>
    :root {
      --ink:#17202a; --muted:#607080; --paper:#fff; --bg:#eef3f8; --line:#d6e0ea;
      --blue:#2457a6; --blue2:#dce9ff; --green:#21805b; --green2:#ddf4ea;
      --gold:#946200; --gold2:#fff1c7; --red:#b23b3b; --red2:#ffe2e2; --soft:#f7f9fc;
      --shadow:0 12px 30px rgba(24,44,68,.12);
    }
    *{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--ink);background:linear-gradient(180deg,#f7fbff,var(--bg));font-size:18px;line-height:1.45}
    button,input,select,textarea{font:inherit}.shell{width:min(1080px,calc(100% - 28px));margin:auto;padding:20px 0 28px}
    header,.card{background:var(--paper);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)}header{padding:18px;display:grid;gap:12px}
    .title{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap}.eyebrow{color:var(--blue);font-weight:700;text-transform:uppercase;font-size:.8rem;letter-spacing:.08em;margin:0 0 4px}
    h1,h2,h3{margin:0;line-height:1.18;letter-spacing:0}h1{font-size:clamp(1.45rem,2vw,2rem)}h2{font-size:clamp(1.25rem,1.7vw,1.65rem)}h3{font-size:1.05rem}.version,.muted{color:var(--muted)}
    .progress-meta{display:flex;justify-content:space-between;gap:12px;color:var(--muted);font-size:.94rem}.track{height:12px;border-radius:99px;background:#e7edf4;overflow:hidden;border:1px solid var(--line)}#bar{height:100%;width:0;background:linear-gradient(90deg,var(--blue),var(--green));transition:width .18s}
    .card{margin-top:18px;overflow:hidden}.head{padding:18px;border-bottom:1px solid var(--line);background:#fbfdff}.body{padding:18px;display:grid;gap:16px}.nav{display:flex;justify-content:space-between;gap:12px;padding:16px 18px;border-top:1px solid var(--line);background:#fbfdff}
    .grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.formulas{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    label{display:grid;gap:7px;font-weight:700}input,select,textarea{width:100%;border:1px solid #b9c8d8;border-radius:7px;padding:11px 12px;background:#fff;color:var(--ink);min-height:48px}textarea{min-height:120px;resize:vertical}input:disabled,select:disabled,textarea:disabled{background:#edf2f7;color:#526170;opacity:1}
    .note{background:var(--blue2);border:1px solid #bdd2f4;border-radius:8px;padding:14px;display:grid;gap:8px}.mini,.q,.practice,.review{border:1px solid var(--line);border-radius:8px;background:var(--soft);padding:15px;display:grid;gap:12px}.formula{border:1px solid var(--line);border-left:5px solid var(--green);border-radius:8px;background:#fff;padding:13px;display:grid;gap:5px;min-height:112px}.formula strong,.mini strong{color:#153f7d}
    .q.correct{border-color:#8acaae;background:#f5fff9}.q.partial{border-color:#efce75;background:#fffaf0}.q.incorrect{border-color:#efaaa7;background:#fff7f7}.qtop{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}.num{color:var(--muted);font-weight:700;font-size:.95rem}.pill{display:inline-flex;align-items:center;min-height:30px;border-radius:99px;padding:4px 10px;background:#eaf0f6;color:#314558;font-size:.84rem;font-weight:700}.good{background:var(--green2);color:#14573d}.warn{background:var(--gold2);color:#604000}.bad{background:var(--red2);color:#7b2525}
    .actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}button{border:0;border-radius:7px;min-height:46px;padding:10px 15px;color:#fff;background:var(--blue);font-weight:700;cursor:pointer}button.secondary{background:#526170}button.success{background:var(--green)}button:disabled{background:#a8b4c0;cursor:not-allowed}
    .feedback{border-radius:7px;padding:11px 12px;border:1px solid transparent;font-size:.96rem}.feedback.hint{background:var(--gold2);border-color:#efce75;color:#604000}.feedback.correct{background:var(--green2);border-color:#9fd8bd;color:#14573d}.feedback.incorrect{background:var(--red2);border-color:#efa6a6;color:#742323}
    .checks{display:grid;gap:8px}.checks label{display:flex;align-items:flex-start;gap:10px;font-weight:500;padding:10px;border:1px solid var(--line);border-radius:7px;background:#fff}.checks input{width:22px;min-height:22px;margin-top:2px;flex:0 0 22px}
    .row{display:grid;grid-template-columns:1.2fr .8fr;gap:12px;border-bottom:1px solid var(--line);padding-bottom:10px}.remaining{margin:0;padding-left:22px}#printReport{display:none}
    @media(max-width:780px){body{font-size:17px}.grid2,.grid3,.formulas,.row{grid-template-columns:1fr}header,.head,.body,.nav{padding:14px}}
    @media print{@page{margin:.55in}body{background:#fff;font-size:12pt;color:#111}.shell{display:none!important}#printReport{display:block!important}.print-doc{display:grid;gap:14px}.print-title{border-bottom:2px solid #111;padding-bottom:8px}.print-title h1{font-size:18pt;margin-bottom:4px}.print-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px 18px}.print-section{break-inside:avoid}.print-section h2{font-size:14pt;border-bottom:1px solid #999;padding-bottom:4px;margin-bottom:6px}.print-table{width:100%;border-collapse:collapse}.print-table th,.print-table td{border:1px solid #999;padding:5px;text-align:left;vertical-align:top}.small{font-size:10.5pt}}
  </style>
</head>
<body>
  <div class='shell'>
    <header>
      <div class='title'><div><p class='eyebrow'>Foundations in Personal Finance</p><h1>Chapter 11 Housing Assignment</h1></div><div class='version'>Version 1.1</div></div>
      <div><div class='progress-meta'><span id='pageLabel'>Student Information</span><span id='progressText'>0% complete</span></div><div class='track'><div id='bar'></div></div></div>
    </header>
    <main class='card' id='app'></main>
  </div>
  <section id='printReport' aria-hidden='true'></section>

  <script>
    // Single-file classroom app. Progress is saved in this browser only.
    const APP={title:'Chapter 11 Housing Assignment',version:'1.1',storageKey:'chapter11HousingAssignmentV1'};
    const today=new Date().toISOString().slice(0,10);
    const teacherMin=20;
    const reminders={
      Foundations:`Good money habits come before big housing decisions: save, budget, avoid debt, live on less than you make, and be generous.`,
      Renting:`Renting can be wise. Keep rent at or below 25% of take-home pay and compare more than the nicest amenities.`,
      Living:`Living on your own includes setup costs, monthly bills, transportation, food, supplies, and renter's insurance.`,
      Leasing:`A lease is a legal document. Read it before signing because it is enforceable by law.`,
      Mortgages:`A 15-year fixed-rate conventional mortgage keeps the rate set and usually costs much less interest than a 30-year mortgage.`,
      Ownership:`Homeownership can build equity, but buying before you are ready can create stress and crowd out other goals.`,
      Roommates:`Roommates can lower costs when everyone communicates, respects shared space, and acts considerately.`
    };

    // Question data controls grading, hints, explanations, and PDF reporting.
    const questions=[
      {id:'q1',skill:'Foundations',type:'twoBlank',prompt:`Complete the reminder: It is best to develop good ____ ____ now instead of waiting until you are on your own.`,answers:['money','habits'],answerText:'money habits',hint:`The answer is two words. The first word tells what kind of habits.`,explanation:`The full phrase is money habits. This means building responsible habits with saving, budgeting, and avoiding debt before living on your own.`},
      {id:'q2',skill:'Renting',type:'select',prompt:`Renting is a great option for many people.`,options:['True','False'],answer:'True',answerText:'True',hint:`Think about whether renting can be a wise step before someone is ready to buy.`,explanation:`Renting can be a responsible choice when it fits a person's budget and season of life.`},
      {id:'q3',skill:'Renting',type:'number',prompt:`Your rent payment should total no more than what percent of your take-home pay?`,answer:25,tolerance:0,answerText:'25%',hint:`The rent guideline is one quarter of take-home pay.`,explanation:`A safe rent guideline is to keep rent at or below 25% of take-home pay.`},
      {id:'q4',skill:'Mortgages',type:'select',prompt:`When you are ready to buy a house, which mortgage option fits the Chapter 11 home-buying guidance?`,options:['15-year fixed-rate conventional mortgage','20-year VA loan','30-year fixed-rate mortgage','30-year equity loan'],answer:'15-year fixed-rate conventional mortgage',answerText:'15-year fixed-rate conventional mortgage',hint:`Look for the option with a shorter payoff time and a rate that does not change.`,explanation:`A 15-year fixed-rate conventional mortgage keeps the interest rate stable and helps pay off the home faster.`},
      {id:'q5',skill:'Living',type:'keywords',prompt:`In your own words, define cost of living.`,answerText:'The average cost of basic goods and services needed to maintain a standard of living in an area.',keywordGroups:[['average'],['cost','costs'],['basic','goods','services'],['standard','living'],['area','community','region']],minMatches:3,hint:`A stronger definition should include average costs, basic goods or services, and maintaining a standard of living.`,explanation:`Cost of living means the average cost of basic goods and services needed to maintain a standard of living in an area.`},
      {id:'q6',skill:'Renting',type:'select',prompt:`Making periodic payments to a landlord for the use of property is called what?`,options:['Down payment','Buying','Renting or leasing','Security deposit'],answer:'Renting or leasing',answerText:'Renting or leasing',hint:`This is the housing option where someone else owns the property.`,explanation:`Renting or leasing means paying a landlord for the use of property.`},
      {id:'q7',skill:'Ownership',type:'select',prompt:`Buying a house while you are in debt puts what at risk?`,options:['Your home purchase','Your diet plan','Your school schedule','Your favorite amenities'],answer:'Your home purchase',answerText:'Your home purchase',hint:`Debt makes the house purchase less stable.`,explanation:`Debt can make a home purchase riskier because more of the budget is already committed.`},
      {id:'q8',skill:'Living',type:'select',prompt:`Living on campus can help you ____ living on your own while off-campus living requires paying rent, utilities, and groceries.`,options:['ease into','dive into','avoid','ignore'],answer:'ease into',answerText:'ease into',hint:`Campus living is presented as a gradual step.`,explanation:`Living on campus can help students ease into independence before handling all housing bills on their own.`},
      {id:'q9',skill:'Ownership',type:'select',prompt:`Your decision to rent or buy depends most on your ____.`,options:[`friends' opinions`,'financial situation','income tax bracket','feelings about paint colors'],answer:'financial situation',answerText:'financial situation',hint:`Focus on readiness and money, not pressure from other people.`,explanation:`Renting or buying should be based on a person's financial situation and readiness.`},
      {id:'q10',skill:'Renting',type:'select',prompt:`Paying extra rent for what is not worth it if it keeps you from reaching financial goals?`,options:['Amenities','Mortgages','Security deposits','Tax brackets'],answer:'Amenities',answerText:'Amenities',hint:`These are nice features, but they can cost extra each month.`,explanation:`Amenities can be helpful, but they are not worth extra rent if they block important financial goals.`},
      {id:'q11',skill:'Ownership',type:'select',prompt:`A house is an asset that typically will ____ in value over time.`,options:['stay the same','decrease','disappear','increase'],answer:'increase',answerText:'increase in value',hint:`Think about a common long-term ownership advantage.`,explanation:`A home often increases in value over time, which is one reason ownership can build wealth.`},
      {id:'q12',skill:'Ownership',type:'select',prompt:`You should buy a home even if you cannot afford it yet because renting is a waste of money.`,options:['True','False'],answer:'False',answerText:'False',hint:`Renting can be a valid option, and buying too early can create money stress.`,explanation:`Buying before you are financially ready can make it harder to reach other goals.`},
      {id:'q13',skill:'Mortgages',type:'select',prompt:`The only time it is okay to borrow money if you cannot pay 100% in cash is for what?`,options:['A car lease','Home improvement projects','Buying a home with a mortgage','Renting a home'],answer:'Buying a home with a mortgage',answerText:'Buying a home with a mortgage',hint:`This exception is tied to buying a home.`,explanation:`A mortgage for a home is treated differently from consumer debt when the buyer is financially ready.`},
      {id:'q14',skill:'Leasing',type:'keywords',prompt:`What is a leasing contract?`,answerText:'A legal document that allows a renter or tenant to use property for a period of time.',keywordGroups:[['legal','contract','document'],['renter','tenant'],['property','home','apartment'],['period','time','term']],minMatches:3,hint:`A complete answer should mention a contract or legal document, the renter or tenant, property use, and a period of time.`,explanation:`A lease is a legal document that lets a renter or tenant use property for a set period of time.`},
      {id:'q15',skill:'Foundations',type:'checkbox',prompt:`Select the money principles that stay the same after high school.`,options:['save','budget','stay out of debt','live on less than you make','be generous','use debt to build wealth','spend more as income grows','invest before budgeting','ignore emergency savings'],answer:['save','budget','stay out of debt','live on less than you make','be generous'],answerText:'save, budget, stay out of debt, live on less than you make, and be generous',hint:`Choose principles that keep money stable and avoid choices built on debt or overspending.`,explanation:`The lasting principles are to save, budget, stay out of debt, live on less than you make, and be generous.`},
      {id:'q16',skill:'Ownership',type:'select',prompt:`When you look at long-term costs, which is usually the better deal?`,options:['Homeownership','Renting','Leasing','Maintaining'],answer:'Homeownership',answerText:'Homeownership',hint:`Think long-term wealth building and equity.`,explanation:`Over the long term, homeownership can build equity and increase net worth when the buyer is ready.`},
      {id:'q17',skill:'Leasing',type:'select',prompt:`Once you sign a leasing contract, it is enforceable by law.`,options:['True','False'],answer:'True',answerText:'True',hint:`A lease is a legal document.`,explanation:`A signed lease is enforceable, so it should be read carefully before signing.`},
      {id:'q18',skill:'Mortgages',type:'select',prompt:`What type of interest rate is locked in and will not change for the life of the loan?`,options:['15-year','Fixed-rate','Adjustable rate','Equity rate'],answer:'Fixed-rate',answerText:'Fixed-rate',hint:`The name tells you that the rate stays set.`,explanation:`A fixed-rate loan keeps the same interest rate for the life of the loan.`},
      {id:'q19',skill:'Ownership',type:'select',prompt:`When someone spends so much income on homeownership costs that other goals suffer, they are ____.`,options:['wealthy','house poor','wise homeowners','rent poor'],answer:'house poor',answerText:'House poor',hint:`This phrase describes owning a home that crowds out the rest of the budget.`,explanation:`A person is house poor when housing costs leave too little room for other financial goals.`},
      {id:'q20',skill:'Mortgages',type:'select',prompt:`A fixed-rate mortgage has which kind of mortgage rate?`,options:['A set rate for a set number of years','A high rate for a large amount of years','A good rate for 15 days','A 12% rate for 30 years'],answer:'A set rate for a set number of years',answerText:'A set rate for a set number of years',hint:`Fixed means set.`,explanation:`A fixed-rate mortgage has a set rate for a set number of years.`},
      {id:'q21',skill:'Leasing',type:'checkbox',prompt:`Select the items a lease should contain.`,options:['Property address','Rental term','Security deposit terms','Pet fees','Closest shopping malls','Your credit card only','Restaurant list'],answer:['Property address','Rental term','Security deposit terms','Pet fees'],answerText:'property address, rental term, security deposit terms, and pet fees',hint:`Choose the legal and payment details, not nearby entertainment or payment-only rules.`,explanation:`A lease should include important rental details such as the property address, rental term, security deposit terms, and pet fees.`},
      {id:'q22',skill:'Mortgages',type:'select',prompt:`Which type of loan is not secured by a government entity and usually has the best rate and term?`,options:['FHA loan','VA loan','Family loan','Conventional loan'],answer:'Conventional loan',answerText:'Conventional loan',hint:`FHA and VA loans are connected to government programs. This answer is the non-government loan type.`,explanation:`A conventional loan is not secured by a government entity and usually has better rate and term options for qualified buyers.`},
      {id:'q23',skill:'Foundations',type:'select',prompt:`Learning about living costs before you need to cover them and creating good money habits are examples of what?`,options:['Taking personal responsibility','Poor money management','Being a consumer','Waiting to budget'],answer:'Taking personal responsibility',answerText:'Taking personal responsibility',hint:`This is the responsible action before independence.`,explanation:`Preparing for future living costs is a way to take personal responsibility.`},
      {id:'q24',skill:'Mortgages',type:'select',prompt:`Which statement best defines mortgage principal?`,options:['The amount borrowed that must be repaid to purchase a home','The largest amount of money you are legally allowed to borrow','The down payment needed to get a mortgage','The first payment you make on your new home'],answer:'The amount borrowed that must be repaid to purchase a home',answerText:'The amount borrowed that must be repaid to purchase a home',hint:`Principal is the borrowed amount, not interest, a down payment, or the first payment.`,explanation:`Mortgage principal is the amount borrowed that must be repaid to purchase a home.`},
      {id:'q25',skill:'Roommates',type:'checkbox',prompt:`Select the habits that make living with a roommate more peaceful while saving money.`,options:['Communicate','Be respectful','Be considerate','Avoid talking about problems','Require the roommate to pay more rent','Assume a best friend is always the best roommate'],answer:['Communicate','Be respectful','Be considerate'],answerText:'communicate, be respectful, and be considerate',hint:`Look for habits that help people solve problems and share space well.`,explanation:`Roommates are more likely to work well together when they communicate, show respect, and act considerately.`},
      {id:'q26',skill:'Ownership',type:'select',prompt:`After you hire a real estate agent, what is the next step in the home buying process?`,options:['Close on your new home','Get a home inspection','Start looking at homes within your budget','Make an offer on a home'],answer:'Start looking at homes within your budget',answerText:'Start looking at homes within your budget',hint:`Before inspections and offers, you need homes that fit the budget.`,explanation:`After hiring an agent, the next step is to start looking at homes within your budget.`},
      {id:'q27',skill:'Mortgages',type:'select',prompt:`It is impossible to get a mortgage without a credit score.`,options:['True','False'],answer:'False',answerText:'False',hint:`Think about whether there can be another way to evaluate a borrower.`,explanation:`A mortgage is not impossible without a credit score, though the buyer still has to show financial readiness.`},
      {id:'q28',skill:'Ownership',type:'select',prompt:`Equity is the difference between what you still owe on your home and what it is worth.`,options:['True','False'],answer:'True',answerText:'True',hint:`Equity compares value with the remaining loan balance.`,explanation:`Equity is the difference between a home's value and what is still owed on it.`},
      {id:'q29',skill:'Living',type:'checkbox',prompt:`Select at least three costs of living on your own.`,options:['security deposit','sheets and towels','kitchen supplies','cleaning supplies','groceries','transportation','furniture',`renter's insurance`,'utilities setup',`first month's rent`,'luxury vacation','designer clothes','concert tickets','video game subscription'],answer:['security deposit','sheets and towels','kitchen supplies','cleaning supplies','groceries','transportation','furniture',`renter's insurance`,'utilities setup',`first month's rent`],minCorrect:3,answerText:`security deposit, sheets and towels, kitchen supplies, cleaning supplies, groceries, transportation, furniture, renter's insurance, utilities setup, and first month's rent`,hint:`Select real move-in or monthly living costs, not wants or entertainment.`,explanation:`Living on your own includes move-in costs, supplies, food, transportation, utilities, insurance, and rent.`},
      {id:'q30',skill:'Renting',type:'checkbox',prompt:`Select at least three ways someone can save money on rent or living costs.`,options:['compare locations','choose fewer amenities','sign a longer lease','look at older properties','find a roommate','compare internet options','conserve water and energy','shop secondhand for necessities','rent the newest luxury apartment','ignore utility usage','buy all new furniture','choose the most expensive internet plan'],answer:['compare locations','choose fewer amenities','sign a longer lease','look at older properties','find a roommate','compare internet options','conserve water and energy','shop secondhand for necessities'],minCorrect:3,answerText:'compare locations, choose fewer amenities, sign a longer lease, look at older properties, find a roommate, compare internet options, conserve water and energy, and shop secondhand for necessities',hint:`Choose actions that lower recurring housing costs or reduce setup expenses.`,explanation:`Renters can save money by comparing options, limiting extra amenities, using roommates wisely, conserving utilities, and shopping secondhand.`},
      {id:'q31',skill:'Mortgages',type:'teacher',prompt:`Why is a 15-year fixed-rate mortgage better than a 30-year mortgage?`,minLength:teacherMin,answerText:'Teacher review: look for interest over time, faster payoff, and the fixed rate staying stable.'},
      {id:'q32',skill:'Ownership',type:'teacher',prompt:`Explain how renting or buying a home is connected with someone's ability to be generous.`,minLength:teacherMin,answerText:'Teacher review: look for budget readiness, financial goals, generosity, and avoiding buying too quickly.'},
      {id:'q33',skill:'Ownership',type:'teacher',prompt:`Give advantages and disadvantages of renting and owning a home. Use examples from the chapter.`,minLength:teacherMin,answerText:'Teacher review: look for examples from both renting and owning, including costs, maintenance, equity, flexibility, and responsibility.'},
      {id:'q34',skill:'Foundations',type:'teacher',prompt:`Why is it important to do The Five Foundations in order?`,minLength:teacherMin,answerText:'Teacher review: look for purpose, emergency fund, avoiding debt, generosity, building wealth, and readiness for future housing decisions.'}
    ];

    const practiceItems=[
      {id:'p1',type:'number',prompt:'Take-home pay is $3,200 per month. What is the maximum rent using the 25% guideline?',answer:800,hint:'Multiply 3,200 by 0.25.',explanation:'$3,200 x 0.25 = $800.'},
      {id:'p2',type:'select',prompt:'Which student is more ready to rent?',options:['Student A: rent is 40% of take-home pay and no emergency fund','Student B: rent is 22% of take-home pay and has a budget'],answer:'Student B: rent is 22% of take-home pay and has a budget',hint:'Look for a lower rent percentage and a plan.',explanation:'Student B keeps rent under 25% and has a budget.'},
      {id:'p3',type:'select',prompt:'Which term means home value minus what is still owed?',options:['Equity','Principal','Lease','Amenity'],answer:'Equity',hint:'This term grows as value rises or the loan balance falls.',explanation:'Equity is the difference between value and what is owed.'},
      {id:'p4',type:'select',prompt:'Which document should be read before signing because it is enforceable by law?',options:['Lease','Restaurant list','Shopping map','Paint sample'],answer:'Lease',hint:'This is the legal rental contract.',explanation:'A lease is a legal contract.'}
    ];

    const qMap=Object.fromEntries(questions.map(q=>[q.id,q]));
    const pMap=Object.fromEntries(practiceItems.map(p=>[p.id,p]));
    const pages=[
      {kind:'info',section:'Start',title:'Student Information'},
      {kind:'learn',section:'Learn',title:'Housing Choices and Budget Reminders',page:1},
      {kind:'learn',section:'Learn',title:'Leases, Mortgages, and Ownership Terms',page:2},
      {kind:'practice',section:'Guided Practice',title:'Budget and Readiness Check',ids:['p1','p2']},
      {kind:'practice',section:'Guided Practice',title:'Terms You Need Before the Assignment',ids:['p3','p4']}
    ];
    for(let i=0;i<questions.length;i+=2){pages.push({kind:'assignment',section:'Assignment',title:'Assignment Questions '+(i+1)+'-'+Math.min(i+2,questions.length),qids:questions.slice(i,i+2).map(q=>q.id)});}
    pages.push({kind:'review',section:'Final Review',title:'Final Review'});

    let state=loadState();

    function loadState(){const fresh={page:0,student:{name:'',period:'',date:today},answers:{},records:{},practice:{}};try{const saved=JSON.parse(localStorage.getItem(APP.storageKey));return Object.assign(fresh,saved||{},{student:Object.assign(fresh.student,saved&&saved.student?saved.student:{}),answers:Object.assign({},saved&&saved.answers?saved.answers:{}),records:Object.assign({},saved&&saved.records?saved.records:{}),practice:Object.assign({},saved&&saved.practice?saved.practice:{})});}catch(e){return fresh;}}
    function saveState(){localStorage.setItem(APP.storageKey,JSON.stringify(state));}
    function normalize(v){return String(v==null?'':v).toLowerCase().replace(/[^a-z0-9% ]+/g,' ').replace(/\s+/g,' ').trim();}
    const htmlMap={'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;'};
    function esc(v){return String(v==null?'':v).replace(/[&<>']/g,ch=>htmlMap[ch]);}
    function fmt(n){const value=Math.round((Number(n)||0)*10)/10;return Number.isInteger(value)?String(value):value.toFixed(1);}
    function rec(id){if(!state.records[id])state.records[id]={attempts:0,locked:false,correct:false,score:0,feedback:'',message:''};const r=state.records[id];if(typeof r.score!=='number')r.score=r.correct?1:0;if(typeof r.attempts!=='number')r.attempts=0;if(typeof r.locked!=='boolean')r.locked=false;return r;}
    function ans(id){return state.answers[id]==null?'':state.answers[id];}
    function setAns(id,v){state.answers[id]=v;saveState();updateHeader();updateNav();}
    function answerBlanks(q){const a=ans(q.id);if(Array.isArray(a))return [a[0]||'',a[1]||''];if(typeof a==='string'){const parts=normalize(a).split(' ');return [parts[0]||'',parts[1]||''];}return ['',''];}
    function setBlank(id,index,value){const q=qMap[id];const parts=answerBlanks(q);parts[index]=value;setAns(id,parts);}
    function teacherComplete(q){return normalize(ans(q.id)).length>=(q.minLength||teacherMin);}
    function infoDone(){return normalize(state.student.name)&&normalize(state.student.period)&&normalize(state.student.date);}
    function qDone(q){return q.type==='teacher'?teacherComplete(q):rec(q.id).locked;}
    function allDone(){return infoDone()&&questions.every(qDone);}
    function completion(){const required=3+questions.length;let done=0;if(normalize(state.student.name))done++;if(normalize(state.student.period))done++;if(normalize(state.student.date))done++;questions.forEach(q=>{if(qDone(q))done++;});return{done,required,percent:Math.round(done/required*100)};}
    function autoQs(){return questions.filter(q=>q.type!=='teacher');}
    function teacherQs(){return questions.filter(q=>q.type==='teacher');}
    function scores(){const auto=autoQs();const teacher=teacherQs();const autoEarned=auto.reduce((sum,q)=>sum+(rec(q.id).score||0),0);const teacherCompleted=teacher.filter(teacherComplete).length;const sections={};auto.forEach(q=>{sections[q.skill]||(sections[q.skill]={skill:q.skill,earned:0,total:0});sections[q.skill].total++;sections[q.skill].earned+=rec(q.id).score||0;});const arr=Object.values(sections);arr.forEach(s=>s.percent=Math.round((s.earned/s.total)*100));const finalEarned=autoEarned+teacherCompleted;const finalTotal=auto.length+teacher.length;return{autoEarned,autoTotal:auto.length,autoScore:Math.round((autoEarned/auto.length)*100),teacherCompleted,teacherTotal:teacher.length,finalEarned,finalTotal,finalScore:Math.round((finalEarned/finalTotal)*100),sections:arr};}
    function weak(){return scores().sections.filter(s=>s.percent<80).sort((a,b)=>a.percent-b.percent);}

    function render(){state.page=Math.max(0,Math.min(state.page||0,pages.length-1));const page=pages[state.page];document.getElementById('app').innerHTML=`<section><div class='head'><p class='eyebrow'>${esc(page.section)}</p><h2>${esc(page.title)}</h2></div><div class='body'>${body(page)}</div><div class='nav'><button class='secondary' data-prev ${state.page===0?'disabled':''}>Back</button><button data-next ${state.page===pages.length-1?'disabled':''}>Next</button></div></section>`;handlers();updateHeader();updateNav();}
    function body(page){if(page.kind==='info')return infoPage();if(page.kind==='learn')return learn(page.page);if(page.kind==='practice')return practicePage(page);if(page.kind==='assignment')return assignmentPage(page);return reviewPage();}
    function infoPage(){return `<div class='note'><strong>Before you begin</strong><span>This assignment saves your work on this Chromebook browser. Fill in the fields below, then move through the learning, practice, assignment, and review pages.</span></div><div class='grid3'><label>Student name<input data-student='name' value='${esc(state.student.name)}' autocomplete='name'></label><label>Class period<input data-student='period' value='${esc(state.student.period)}'></label><label>Date<input type='date' data-student='date' value='${esc(state.student.date||today)}'></label></div>`;}
    function learn(which){return which===1?`<div class='note'><strong>Big idea</strong><span>Housing choices are financial choices. The goal is to make the wise choice for your current money situation.</span></div><div class='formulas'><div class='formula'><strong>Rent guideline</strong><span>Monthly rent should be no more than 25% of take-home pay.</span></div><div class='formula'><strong>Cost of living</strong><span>The average cost of basic goods and services needed for a standard of living.</span></div><div class='formula'><strong>Living on your own</strong><span>Plan for deposits, supplies, groceries, transportation, utilities, insurance, and first month's rent.</span></div></div><div class='grid2'><div class='mini'><h3>Example</h3><p>If take-home pay is $2,800, the rent guideline is $2,800 x 0.25 = $700 or less.</p></div><div class='mini'><h3>Reminder</h3><p>Amenities are nice, but paying extra for them is not worth it if they block your financial goals.</p></div></div>`:`<div class='note'><strong>Terms that matter</strong><span>Read contracts carefully, compare long-term costs, and know the mortgage terms before you buy.</span></div><div class='formulas'><div class='formula'><strong>Lease</strong><span>A legal document that allows a renter to use property for a period of time.</span></div><div class='formula'><strong>Principal</strong><span>The amount borrowed that must be repaid to purchase a home.</span></div><div class='formula'><strong>Equity</strong><span>Home value minus what is still owed on the home.</span></div></div><div class='grid2'><div class='mini'><h3>Mortgage reminder</h3><p>A 15-year fixed-rate conventional mortgage keeps the rate stable and helps pay off the home faster.</p></div><div class='mini'><h3>Ownership reminder</h3><p>Homeownership can build wealth, but buying before you are ready can make someone house poor.</p></div></div>`;}
    function practicePage(page){return `<div class='note'><strong>Guided practice</strong><span>Try these warmups before the graded assignment. They do not affect the final score.</span></div><div class='grid2'>${page.ids.map(id=>practiceItem(pMap[id])).join('')}</div>`;}
    function practiceItem(item){const saved=state.practice[item.id]||{answer:'',message:'',status:''};const control=item.type==='number'?`<input type='number' data-practice-answer='${item.id}' value='${esc(saved.answer)}'>`:`<select data-practice-answer='${item.id}'><option value=''>Choose...</option>${item.options.map(o=>`<option value='${esc(o)}' ${saved.answer===o?'selected':''}>${esc(o)}</option>`).join('')}</select>`;return `<article class='practice'><h3>${esc(item.prompt)}</h3>${control}<div class='actions'><button data-practice-check='${item.id}'>Check practice</button></div>${saved.message?`<div class='feedback ${esc(saved.status)}'>${esc(saved.message)}</div>`:''}</article>`;}
    function assignmentPage(page){const skill=qMap[page.qids[0]].skill;return `<div class='note'><strong>Reminder</strong><span>${esc(reminders[skill]||reminders.Foundations)}</span></div><div class='grid2'>${page.qids.map(id=>question(qMap[id])).join('')}</div>`;}
    function question(q){if(q.type==='teacher')return teacherQ(q);const r=rec(q.id);const statusClass=r.locked?(r.score>=1?'correct':(r.score>0?'partial':'incorrect')):'';const statusText=r.locked?(r.score>=1?'Correct':(r.score>0?'Partial credit':'Locked')):(r.attempts?'1 attempt used':'2 attempts');const pill=r.locked?(r.score>=1?'good':(r.score>0?'warn':'bad')):(r.attempts?'warn':'');return `<article class='q ${statusClass}'><div class='qtop'><span class='num'>${esc(q.id.toUpperCase())}</span><span class='pill'>${esc(q.skill)}</span></div><h3>${esc(q.prompt)}</h3>${control(q,r)}<div class='actions'><button data-check='${q.id}' ${r.locked?'disabled':''}>Check answer</button><span class='pill ${pill}'>${esc(statusText)}</span></div>${r.message?`<div class='feedback ${esc(r.feedback)}'>${esc(r.message)}</div>`:''}</article>`;}
    function teacherQ(q){const a=ans(q.id);const complete=teacherComplete(q);return `<article class='q'><div class='qtop'><span class='num'>${esc(q.id.toUpperCase())}</span><span class='pill'>${esc(q.skill)}</span></div><h3>${esc(q.prompt)}</h3><textarea data-teacher='${q.id}'>${esc(a)}</textarea><div class='actions'><span class='pill ${complete?'warn':''}' data-teacher-status='${q.id}'>${complete?'Teacher review needed':'Response needed'}</span></div><div class='feedback hint' data-teacher-feedback='${q.id}'>${complete?'Teacher review needed. This response will be included in the PDF.':'Please write a complete response before continuing.'}</div></article>`;}
    function control(q,r){const v=ans(q.id),disabled=r.locked?'disabled':'';if(q.type==='twoBlank'){const parts=answerBlanks(q);return `<div class='grid2'><label>Blank 1<input data-blank='${q.id}' data-index='0' value='${esc(parts[0])}' ${disabled}></label><label>Blank 2<input data-blank='${q.id}' data-index='1' value='${esc(parts[1])}' ${disabled}></label></div>`;}if(q.type==='select')return `<select data-answer='${q.id}' ${disabled}><option value=''>Choose...</option>${q.options.map(o=>`<option value='${esc(o)}' ${v===o?'selected':''}>${esc(o)}</option>`).join('')}</select>`;if(q.type==='number')return `<input type='number' data-answer='${q.id}' value='${esc(v)}' ${disabled}>`;if(q.type==='checkbox'){const sel=Array.isArray(v)?v:[];return `<div class='checks'>${q.options.map(o=>`<label><input type='checkbox' data-choice='${q.id}' value='${esc(o)}' ${sel.includes(o)?'checked':''} ${disabled}> <span>${esc(o)}</span></label>`).join('')}</div>`;}return `<textarea data-answer='${q.id}' ${disabled}>${esc(v)}</textarea>`;}
    function reviewPage(){const complete=allDone(),score=scores(),missed=autoQs().filter(q=>rec(q.id).locked&&(rec(q.id).score||0)<1),w=weak();if(!complete)return `<div class='note'><strong>Almost there</strong><span>Finish the required items below before the Save as PDF button appears.</span></div><ul class='remaining'>${remaining().map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`;return `<div class='review'><h3>Final Score</h3><p><strong>${score.finalScore}/100</strong> final score (${fmt(score.finalEarned)} of ${score.finalTotal} total points).</p><p><strong>${score.autoScore}/100</strong> auto-graded score (${fmt(score.autoEarned)} of ${score.autoTotal} objective points).</p><p class='muted'>Teacher-review responses earn completion credit here and are included in the PDF for your teacher to review.</p><div class='actions'><button class='success' data-print>Save as PDF</button></div></div><div class='grid2'><div class='review'><h3>Auto-Graded Section Performance</h3>${score.sections.map(s=>`<div class='row'><span>${esc(s.skill)}</span><strong>${fmt(s.earned)}/${s.total} (${s.percent}%)</strong></div>`).join('')}</div><div class='review'><h3>Study Focus</h3><p>${w.length?esc(w.map(x=>x.skill).join(', ')):'No weak auto-graded skill areas appeared. Keep reviewing the written-response topics.'}</p><p><strong>Teacher-review completion:</strong> ${score.teacherCompleted}/${score.teacherTotal}</p></div></div><div class='review'><h3>Missed or Partial-Credit Questions</h3>${missed.length?missed.map(q=>`<p><strong>${esc(q.id.toUpperCase())}:</strong> ${esc(q.prompt)}<br><span class='muted'>Correct answer: ${esc(q.answerText)}</span></p>`).join(''):'<p>No missed auto-graded questions.</p>'}</div>`;}
    function remaining(){const list=[];if(!normalize(state.student.name))list.push('Student name');if(!normalize(state.student.period))list.push('Class period');if(!normalize(state.student.date))list.push('Date');questions.forEach(q=>{if(!qDone(q))list.push(q.id.toUpperCase()+': '+(q.type==='teacher'?'Please write a complete response before continuing.':q.prompt));});return list;}

    function handlers(){
      document.querySelector('[data-prev]')?.addEventListener('click',()=>move(-1));document.querySelector('[data-next]')?.addEventListener('click',()=>move(1));document.querySelector('[data-print]')?.addEventListener('click',savePdf);
      document.querySelectorAll('[data-student]').forEach(i=>i.addEventListener('input',e=>{state.student[e.target.dataset.student]=e.target.value;saveState();updateHeader();updateNav();}));
      document.querySelectorAll('[data-answer]').forEach(i=>i.addEventListener(i.tagName==='SELECT'?'change':'input',e=>setAns(e.target.dataset.answer,e.target.value)));
      document.querySelectorAll('[data-blank]').forEach(i=>i.addEventListener('input',e=>setBlank(e.target.dataset.blank,Number(e.target.dataset.index),e.target.value)));
      document.querySelectorAll('[data-choice]').forEach(b=>b.addEventListener('change',e=>{const id=e.target.dataset.choice;const cur=Array.isArray(state.answers[id])?state.answers[id]:[];state.answers[id]=e.target.checked?[...cur,e.target.value]:cur.filter(v=>v!==e.target.value);saveState();updateHeader();updateNav();}));
      document.querySelectorAll('[data-teacher]').forEach(a=>a.addEventListener('input',e=>{setAns(e.target.dataset.teacher,e.target.value);updateTeacherStatus(e.target.dataset.teacher);}));
      document.querySelectorAll('[data-check]').forEach(b=>b.addEventListener('click',e=>checkQuestion(e.target.dataset.check)));
      document.querySelectorAll('[data-practice-answer]').forEach(i=>i.addEventListener(i.tagName==='SELECT'?'change':'input',e=>{const id=e.target.dataset.practiceAnswer;state.practice[id]=Object.assign(state.practice[id]||{},{answer:e.target.value});saveState();}));
      document.querySelectorAll('[data-practice-check]').forEach(b=>b.addEventListener('click',e=>checkPractice(e.target.dataset.practiceCheck)));
    }
    function move(d){const next=state.page+d;if(next<0||next>=pages.length)return;state.page=next;saveState();render();window.scrollTo({top:0,behavior:'smooth'});}
    function updateHeader(){const page=pages[state.page],c=completion();document.getElementById('pageLabel').textContent=page.section+': '+page.title;document.getElementById('progressText').textContent=c.percent+'% complete';document.getElementById('bar').style.width=c.percent+'%';}
    function updateNav(){const page=pages[state.page],btn=document.querySelector('[data-next]');if(!btn)return;let disabled=state.page===pages.length-1;if(page.kind==='info'&&!infoDone())disabled=true;if(page.kind==='assignment'&&!page.qids.every(id=>qDone(qMap[id])))disabled=true;btn.disabled=disabled;}
    function updateTeacherStatus(id){const q=qMap[id],complete=teacherComplete(q),status=document.querySelector(`[data-teacher-status='${id}']`),feedback=document.querySelector(`[data-teacher-feedback='${id}']`);if(status){status.textContent=complete?'Teacher review needed':'Response needed';status.className='pill '+(complete?'warn':'');}if(feedback){feedback.textContent=complete?'Teacher review needed. This response will be included in the PDF.':'Please write a complete response before continuing.';}}
    function hasAnswer(q){const a=ans(q.id);if(q.type==='checkbox')return Array.isArray(a)&&a.length>0;if(q.type==='twoBlank')return answerBlanks(q).some(v=>normalize(v));return normalize(a).length>0;}

    function checkQuestion(id){const q=qMap[id],r=rec(id);if(!q||r.locked)return;if(!hasAnswer(q)){r.feedback='hint';r.message='Add an answer before checking.';saveState();render();return;}const result=grade(q);r.attempts++;if(result.full){r.correct=true;r.score=1;r.locked=true;r.feedback='correct';r.message='Correct. '+q.explanation;}else if(r.attempts>=2){r.correct=false;r.score=result.score;r.locked=true;r.feedback=result.score>0?'hint':'incorrect';r.message=(result.score>0?'Partial credit. ':'Not quite. ')+'Correct answer: '+q.answerText+'. '+q.explanation;}else{r.correct=false;r.score=0;r.feedback='hint';r.message='Try again: '+firstHint(q,result);}saveState();render();}
    function firstHint(q,result){if(q.type==='twoBlank'&&result.score>0)return 'You have one of the two words. The first word tells what kind of habits.';if(q.type==='keywords'&&result.score>0)return 'You are on the right track. Add more of the important ideas from the reminder.';if(q.type==='checkbox'&&result.score>0)return 'You selected at least one helpful choice. Review the list and remove choices that do not fit.';return q.hint;}
    function grade(q){const a=ans(q.id);if(q.type==='twoBlank')return gradeTwoBlank(q);if(q.type==='select')return simpleGrade(a===q.answer);if(q.type==='number')return simpleGrade(Math.abs(Number(a)-q.answer)<=(q.tolerance||0));if(q.type==='text')return simpleGrade(normalize(a)===normalize(q.answer));if(q.type==='checkbox')return gradeCheckbox(q);if(q.type==='keywords')return gradeKeywords(q);return simpleGrade(false);}
    function simpleGrade(full){return{score:full?1:0,full};}
    function gradeTwoBlank(q){const parts=answerBlanks(q).map(normalize);let correct=0;if(parts[0]===q.answers[0])correct++;if(parts[1]===q.answers[1])correct++;if(q.id==='q1'&&correct===0&&parts.includes('habits'))correct=.5;const score=correct/2;return{score,full:score>=1};}
    function gradeKeywords(q){const text=normalize(ans(q.id));const matches=q.keywordGroups.filter(group=>group.some(term=>text.includes(normalize(term)))).length;const score=Math.min(1,matches/q.minMatches);return{score,full:matches>=q.minMatches,matches};}
    function gradeCheckbox(q){const picked=Array.isArray(ans(q.id))?ans(q.id):[];const correct=new Set(q.answer);const correctPicked=picked.filter(v=>correct.has(v)).length;const wrongPicked=picked.filter(v=>!correct.has(v)).length;const needed=q.minCorrect||q.answer.length;const full=(q.minCorrect?correctPicked>=needed:correctPicked===q.answer.length)&&wrongPicked===0;const score=Math.max(0,Math.min(1,correctPicked/needed)-wrongPicked*.25);return{score,full,correctPicked,wrongPicked};}
    function checkPractice(id){const item=pMap[id],saved=state.practice[id]||{answer:''},a=saved.answer;let correct=false;if(item.type==='number')correct=Math.abs(Number(a)-item.answer)<=0;if(item.type==='select')correct=a===item.answer;if(!normalize(a)){saved.status='hint';saved.message='Try an answer first.';}else if(correct){saved.status='correct';saved.message='Correct. '+item.explanation;}else{saved.status='hint';saved.message='Hint: '+item.hint;}state.practice[id]=saved;saveState();render();}
    function displayAnswer(q){const a=ans(q.id);if(q.type==='twoBlank')return answerBlanks(q).join(' ');return Array.isArray(a)?a.join(', '):(a||'No response');}
    function studySummary(missed){const skills=[...new Set(missed.map(q=>q.skill))];if(!skills.length)return 'This student showed strong readiness on the auto-graded Chapter 11 housing topics. Written responses should still be reviewed for clear explanations about mortgages, generosity, renting versus owning, and the Five Foundations.';return 'This student should review '+skills.join(', ')+' topics. The missed or partial-credit questions point to skills connected with rent guidelines, mortgage types, leases, cost of living, or housing decision-making.';}
    function buildPrint(){const score=scores(),missed=autoQs().filter(q=>(rec(q.id).score||0)<1),teacher=teacherQs(),weakNames=weak().map(s=>s.skill);const sectionRows=score.sections.map(s=>`<tr><td>${esc(s.skill)}</td><td>${fmt(s.earned)}/${s.total}</td><td>${s.percent}%</td></tr>`).join('');const missedRows=missed.length?missed.map(q=>`<tr><td>${esc(q.id.toUpperCase())}</td><td>${esc(q.prompt)}</td><td>${esc(displayAnswer(q))}</td><td>${esc(q.answerText)}</td><td>${fmt(rec(q.id).score)}/1 credit. ${esc(q.explanation)}</td></tr>`).join(''):`<tr><td colspan='5'>No missed auto-graded questions.</td></tr>`;const teacherRows=teacher.map(q=>`<tr><td>${esc(q.id.toUpperCase())}</td><td>${esc(q.prompt)}</td><td>${esc(displayAnswer(q))}</td><td>${esc(q.answerText)}</td></tr>`).join('');document.getElementById('printReport').innerHTML=`<div class='print-doc'><div class='print-title'><h1>${esc(APP.title)}</h1><div class='print-grid small'><div><strong>Student:</strong> ${esc(state.student.name)}</div><div><strong>Class period:</strong> ${esc(state.student.period)}</div><div><strong>Date:</strong> ${esc(state.student.date)}</div><div><strong>Version:</strong> ${esc(APP.version)}</div><div><strong>Final score:</strong> ${score.finalScore}/100</div><div><strong>Auto-graded score:</strong> ${score.autoScore}/100</div><div><strong>Objective credit:</strong> ${fmt(score.autoEarned)}/${score.autoTotal}</div><div><strong>Teacher-review completion:</strong> ${score.teacherCompleted}/${score.teacherTotal}</div></div></div><p><strong>Study summary:</strong> ${esc(studySummary(missed))}</p><div class='print-section'><h2>Missed Skills</h2><p>${weakNames.length?esc(weakNames.join(', ')):'No weak auto-graded skill areas appeared.'}</p></div><div class='print-section'><h2>Section Scores</h2><table class='print-table'><thead><tr><th>Section</th><th>Credit</th><th>Score</th></tr></thead><tbody>${sectionRows}</tbody></table></div><div class='print-section'><h2>Missed Questions and Correct Answers</h2><table class='print-table'><thead><tr><th>#</th><th>Question</th><th>Student answer</th><th>Correct answer</th><th>Notes</th></tr></thead><tbody>${missedRows}</tbody></table></div><div class='print-section'><h2>Teacher-Review Responses</h2><table class='print-table'><thead><tr><th>#</th><th>Prompt</th><th>Student response</th><th>Review guide</th></tr></thead><tbody>${teacherRows}</tbody></table></div></div>`;}
    function savePdf(){if(!allDone())return;buildPrint();window.print();}
    render();
  </script>
</body>
</html>
