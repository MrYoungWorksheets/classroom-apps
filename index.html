<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mr. Young&rsquo;s Classroom Apps</title>
  <style>
    :root {
      --bg: #eef4fa;
      --paper: #ffffff;
      --ink: #17202a;
      --muted: #5f6f7f;
      --blue: #2457a6;
      --blue-dark: #173e78;
      --green: #1f7a55;
      --gold: #8a6400;
      --red: #a33d3d;
      --line: #d5e1ed;
      --soft: #f6f9fc;
      --shadow: 0 12px 28px rgba(24, 44, 68, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background-color: #101820;
      background-image: url('assets/bg-main.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      font-size: 18px;
      line-height: 1.45;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: rgba(0, 0, 0, 0.62);
    }

    main {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0;
      position: relative;
      z-index: 1;
    }

    .hero,
    .course-column,
    .links-panel {
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(213, 225, 237, 0.9);
      border-radius: 8px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(2px);
    }

    .hero {
      padding: 24px;
      margin-bottom: 18px;
      display: grid;
      gap: 16px;
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(1.7rem, 3vw, 2.45rem);
      letter-spacing: 0;
      line-height: 1.15;
    }

    h2 {
      font-size: 1.35rem;
    }

    h3 {
      font-size: 1.05rem;
    }

    .subtitle,
    .muted {
      color: var(--muted);
    }

    .subtitle {
      margin-top: 8px;
    }

    .header-info {
      display: grid;
      gap: 6px;
      min-width: 240px;
      color: var(--muted);
      font-size: 0.96rem;
    }

    .header-info a {
      color: var(--blue-dark);
      font-weight: 700;
    }

    .section-block {
      margin-top: 18px;
    }

    .dashboard-layout {
      margin-top: 18px;
      display: grid;
      grid-template-columns: minmax(190px, 240px) minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .section-title {
      margin: 0 0 12px;
    }

    .section-block > .section-title {
      color: #ffffff;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.55);
    }

    .course-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .course-column {
      padding: 18px;
      display: grid;
      gap: 14px;
      align-content: start;
      background:
        linear-gradient(rgba(255, 255, 255, 0.94), rgba(255, 255, 255, 0.94)),
        url('assets/bg-main.jpg') center / cover no-repeat;
    }

    .course-column:nth-child(1) {
      background:
        linear-gradient(rgba(255, 255, 255, 0.93), rgba(255, 255, 255, 0.93)),
        url('assets/bg-finance.jpg') center / cover no-repeat;
    }

    .course-column:nth-child(2),
    .course-column:nth-child(3) {
      background:
        linear-gradient(rgba(255, 255, 255, 0.93), rgba(255, 255, 255, 0.93)),
        url('assets/bg-alg2.jpg') center / cover no-repeat;
    }

    .assignment-list {
      display: grid;
      gap: 12px;
    }

    .assignment-card {
      border: 1px solid #c7d8ea;
      background: rgba(246, 249, 252, 0.97);
      border-radius: 8px;
      padding: 15px;
      display: grid;
      gap: 10px;
    }

    .card-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .status {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      min-height: 28px;
      padding: 4px 10px;
      font-size: 0.84rem;
      font-weight: 700;
      background: #e8eef6;
      color: #33475b;
    }

    .status.upcoming {
      background: #e7f0ff;
      color: var(--blue-dark);
    }

    .status.due-today {
      background: #fff0c2;
      color: var(--gold);
    }

    .status.past-due {
      background: #ffe0e0;
      color: var(--red);
    }

    .launch-link,
    .useful-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      border-radius: 7px;
      padding: 10px 14px;
      color: #ffffff;
      background: var(--blue);
      text-decoration: none;
      font-weight: 700;
    }

    .launch-link:hover,
    .launch-link:focus,
    .useful-link:hover,
    .useful-link:focus {
      background: var(--blue-dark);
      outline: none;
    }

    .empty-note {
      border: 1px dashed #c5d4e4;
      color: var(--muted);
      background: rgba(250, 252, 255, 0.96);
      border-radius: 8px;
      padding: 14px;
    }

    .links-panel {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .links-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .sidebar-links .links-grid {
      grid-template-columns: 1fr;
    }

    .sidebar-links .useful-link {
      min-height: 40px;
      padding: 8px 10px;
      font-size: 0.93rem;
    }

    .useful-link {
      background: #526170;
      text-align: center;
    }

    @media (max-width: 920px) {
      .dashboard-layout {
        grid-template-columns: 1fr;
      }

      .course-grid {
        grid-template-columns: 1fr;
      }

      .links-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .sidebar-links .links-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      body {
        font-size: 17px;
      }

      main {
        padding: 18px 0;
      }

      .hero,
      .course-column,
      .links-panel {
        padding: 16px;
      }
    }
  </style>
  <script>
    // ===== EDIT ASSIGNMENT DATA HERE =====
    // Financial Math assignments
    const financialMathAssignments = [
      {
        title: 'Chapter 11 Housing Assignment',
        description: 'Renting, home buying, leases, mortgages, cost of living, and housing decisions.',
        link: '/classroom-apps/chapter-11-assignment/',
        dueDate: '2026-04-27'
      }
    ];

    // Algebra 2 Regular assignments
    const algebra2RegularAssignments = [
      {
        title: 'Direct and Inverse Variation',
        description: 'Practice identifying, writing, and solving direct and inverse variation relationships.',
        link: 'algebra-2-regular-direct-inverse-variation/',
        dueDate: '2026-05-01'
      },
      {
        title: 'Logarithms Full Review',
        description: 'Review solving exponential and logarithmic equations, rewriting logarithmic expressions, tables, graphs, domain, and range.',
        link: 'algebra-2-regular-logarithms-review/',
        dueDate: '2026-04-28'
      }
    ];

    // Algebra 2 Honors assignments
    const algebra2HonorsAssignments = [
      {
        title: 'Chapter 11 Part 2 Review',
        description: 'Rational functions, asymptotes, holes, variation, parent functions, and transformations.',
        link: 'algebra-2-honors-ch11-part-2-review/',
        dueDate: '2026-04-28'
      }
    ];

    const courseSections = [
      { title: 'Financial Math', assignments: financialMathAssignments },
      { title: 'Algebra 2 Regular', assignments: algebra2RegularAssignments },
      { title: 'Algebra 2 Honors', assignments: algebra2HonorsAssignments }
    ];

    const usefulLinks = [
      { title: 'Desmos', link: 'https://www.desmos.com/calculator' },
      { title: 'DeltaMath', link: 'https://www.deltamath.com/' },
      { title: 'ClassLink', link: '#' },
      { title: 'Google Classroom', link: 'https://classroom.google.com/' },
      { title: 'Calculator tools', link: '#' },
      {
        title: 'Audio Math Visualizer',
        description: 'Upload an MP3 or WAV file and watch math-inspired visuals react to the sound.',
        link: 'audio-math-visualizer/'
      }
    ];
    // ===== END EDITABLE DATA =====

    function localDateFromInput(dateText) {
      const parts = dateText.split('-').map(Number);
      return new Date(parts[0], parts[1] - 1, parts[2]);
    }

    function startOfToday() {
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate());
    }

    function formatDate(dateText) {
      return localDateFromInput(dateText).toLocaleDateString(undefined, {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
    }

    function assignmentStatus(dueDate) {
      const today = startOfToday().getTime();
      const due = localDateFromInput(dueDate).getTime();
      if (due > today) return { label: 'Upcoming', className: 'upcoming' };
      if (due === today) return { label: 'Due Today', className: 'due-today' };
      return { label: 'Past Due', className: 'past-due' };
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>\"']/g, character => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[character]));
    }

    function renderAssignments() {
      const container = document.getElementById('assignmentColumns');
      container.innerHTML = courseSections.map(section => {
        const cards = section.assignments.length
          ? section.assignments.map(assignment => {
              const status = assignmentStatus(assignment.dueDate);
              const pastDueTitle = status.className === 'past-due' ? ' (Past Due!)' : '';
              return `
                <article class="assignment-card">
                  <h3>${escapeHtml(assignment.title)}${pastDueTitle}</h3>
                  <p class="muted">${escapeHtml(assignment.description)}</p>
                  <div class="card-meta">
                    <span>Due: ${escapeHtml(formatDate(assignment.dueDate))}</span>
                    <span class="status ${status.className}">${status.label}</span>
                  </div>
                  <a class="launch-link" href="${escapeHtml(assignment.link)}" target="_blank" rel="noopener noreferrer">Launch Assignment</a>
                </article>
              `;
            }).join('')
          : '<p class="empty-note">No assignments posted yet.</p>';

        return `
          <section class="course-column" aria-label="${escapeHtml(section.title)} assignments">
            <h3>${escapeHtml(section.title)}</h3>
            <div class="assignment-list">${cards}</div>
          </section>
        `;
      }).join('');
    }

    function renderUsefulLinks() {
      document.getElementById('usefulLinks').innerHTML = usefulLinks.map(item => (
        `<a class="useful-link" href="${escapeHtml(item.link)}" target="_blank" rel="noopener noreferrer" title="${escapeHtml(item.description || item.title)}" aria-label="${escapeHtml(item.description || item.title)}">${escapeHtml(item.title)}</a>`
      )).join('');
    }

    function renderToday() {
      const today = new Date();
      document.getElementById('todayText').textContent = 'Today: ' + today.toLocaleDateString(undefined, {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderToday();
      renderAssignments();
      renderUsefulLinks();
    });
  </script>
</head>
<body>
  <main>
    <header class="hero" aria-labelledby="page-title">
      <div class="hero-top">
        <div>
          <h1 id="page-title">Mr. Young&rsquo;s Classroom Apps</h1>
          <p class="subtitle">Choose your class and launch the assignment you need.</p>
        </div>
        <div class="header-info" aria-label="Teacher contact and date">
          <span id="todayText">Today</span>
          <a href="mailto:ryoung@rfisd.us" target="_blank" rel="noopener noreferrer">ryoung@rfisd.us</a>
        </div>
      </div>
    </header>

    <div class="dashboard-layout">
      <aside class="links-panel sidebar-links" aria-labelledby="links-title">
        <div>
          <h2 class="section-title" id="links-title">Useful Links</h2>
          <p class="muted">Quick tools for classwork and practice.</p>
        </div>
        <div class="links-grid" id="usefulLinks"></div>
      </aside>

      <section class="section-block assignments-panel" aria-labelledby="assignments-title">
        <h2 class="section-title" id="assignments-title">Assignments</h2>
        <div class="course-grid" id="assignmentColumns"></div>
      </section>
    </div>
  </main>
</body>
</html>
