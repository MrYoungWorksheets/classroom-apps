  <script>
    // Teacher edit area: update topics, prompts, answers, hints, and explanations here.
    const ASSIGNMENT={course:`Algebra 2 Honors`,title:`Chapter 11 Part 2 Review: Rational Functions and Variation`,version:`1.2`,storageKey:`a2h-ch11-part2-review-v2`,teacherReviewPoints:1};
    const TOPICS=[
      {title:`Vertical Asymptotes`,skill:`vertical asymptotes after simplification`,notes:[`Vertical asymptotes come from x-values that make the simplified denominator equal zero.`,`A canceled factor creates a hole, not a vertical asymptote.`],walk:{problem:`Find the vertical asymptotes of f(x)=[(x-3)(x+2)]/[(x+2)(x-1)(x+4)].`,steps:[`Cancel the common factor (x+2), so x=-2 is a hole.`,`The remaining denominator is (x-1)(x+4).`,`Vertical asymptotes are x=1 and x=-4.`]},question:{id:`q1`,mode:`unorderedNumbers`,prompt:`For f(x)=[(x+1)(x-4)]/[(x-4)(x+5)(x-2)], enter the two vertical asymptotes after simplification.`,format:`Type the two x-values only. Order does not matter.`,fields:[{key:`va1`,label:`Vertical asymptote 1`,kind:`number`,placeholder:`x =`},{key:`va2`,label:`Vertical asymptote 2`,kind:`number`,placeholder:`x =`}],answers:[-5,2],hint:`Cancel the common factor first. The canceled zero is a hole.`,correctFeedback:`Correct.`,solution:`Cancel (x-4). The remaining denominator is (x+5)(x-2), so x=-5 and x=2.`}},
      {title:`Horizontal Asymptotes by Leading Terms`,skill:`horizontal asymptotes from leading terms`,notes:[`For large x-values, the highest-degree terms control the end behavior.`,`If degrees match, use the ratio of leading coefficients.`],walk:{problem:`Find the horizontal asymptote of h(x)=(8x^4-3x+1)/(2x^4+5x^2-7).`,steps:[`Use leading terms: 8x^4/2x^4.`,`The ratio is 4.`,`Horizontal asymptote: y=4.`]},question:{id:`q2`,mode:`fields`,prompt:`Find the horizontal asymptote of h(x)=(9x^3-4x+1)/(3x^3+8). Enter the y-value.`,format:`Type the y-value only.`,fields:[{key:`ha`,label:`Horizontal asymptote y =`,kind:`number`,answer:3,placeholder:`y =`}],hint:`Compare 9x^3 and 3x^3.`,correctFeedback:`Correct.`,solution:`9x^3/3x^3=3, so y=3.`}},
      {title:`Horizontal Asymptotes by Degree Comparison`,skill:`horizontal asymptotes from degree comparison`,notes:[`Numerator degree less than denominator degree gives y=0.`,`Equal degrees use leading coefficient ratio.`,`Numerator degree greater than denominator degree gives no horizontal asymptote.`],walk:{problem:`Decide the horizontal asymptote for p(x)=(5x^4-1)/(x^2+6).`,steps:[`Numerator degree 4 is greater than denominator degree 2.`,`There is no horizontal asymptote.`]},question:{id:`q3`,mode:`fields`,prompt:`For r(x)=(4x^2-7)/(2x^3+1), choose the horizontal asymptote.`,format:`Choose one.`,fields:[{key:`choice`,label:`Horizontal asymptote`,kind:`select`,answer:`y = 0`,options:[``,`y = 0`,`y = 2`,`y = 4`,`No horizontal asymptote`]}],hint:`Compare degrees: numerator degree 2 and denominator degree 3.`,correctFeedback:`Correct.`,solution:`The denominator degree is larger, so the horizontal asymptote is y=0.`}},
      {title:`Holes and Removable Discontinuities`,skill:`holes and removable discontinuities`,notes:[`A hole happens when the same factor cancels from numerator and denominator.`,`The canceled factor gives the x-coordinate of the hole.`,`Plug that x-value into the simplified function to find y.`],walk:{problem:`Find the hole of f(x)=[(x+1)(x-4)]/[(x+1)(x+3)].`,steps:[`The common factor (x+1) cancels, so x=-1.`,`The simplified function is (x-4)/(x+3).`,`At x=-1, y=-5/2.`]},question:{id:`q4`,mode:`fields`,prompt:`Find the hole of f(x)=[(x-3)(x+2)]/[(x-3)(x-5)]. Enter the x- and y-values.`,format:`Fractions like -5/2 or decimals like -2.5 are accepted.`,fields:[{key:`x`,label:`Hole x-value`,kind:`number`,answer:3,placeholder:`x =`},{key:`y`,label:`Hole y-value`,kind:`number`,answer:-2.5,placeholder:`y =`}],hint:`The canceled factor gives x. Then use the simplified function for y.`,correctFeedback:`Correct.`,solution:`Cancel (x-3), so x=3. Then (x+2)/(x-5) gives 5/-2=-2.5.`}},
      {title:`Direct Variation`,skill:`direct variation equations`,notes:[`Direct variation has form y=kx.`,`The constant of variation is k=y/x.`],walk:{problem:`If y varies directly with x and y=10 when x=4, find k.`,steps:[`Use y=kx.`,`10=4k.`,`k=10/4=2.5.`]},question:{id:`q5`,mode:`fields`,prompt:`y varies directly with x. If y=18 when x=6, what is k?`,format:`Type the value of k only.`,fields:[{key:`k`,label:`k`,kind:`number`,answer:3,placeholder:`k =`}],hint:`For direct variation, divide y by x.`,correctFeedback:`Correct.`,solution:`k=18/6=3.`}},
      {title:`Inverse Variation`,skill:`inverse variation equations`,notes:[`Inverse variation has form y=k/x.`,`The constant of variation is k=xy.`],walk:{problem:`If y varies inversely with x and y=12 when x=3, find k.`,steps:[`Use y=k/x.`,`12=k/3.`,`k=36.`]},question:{id:`q6`,mode:`fields`,prompt:`y varies inversely with x. If y=7 when x=5, what is k?`,format:`Type the value of k only.`,fields:[{key:`k`,label:`k`,kind:`number`,answer:35,placeholder:`k =`}],hint:`For inverse variation, multiply x and y.`,correctFeedback:`Correct.`,solution:`k=5*7=35.`}},
      {title:`Parent Function f(x)=1/x`,skill:`features of f(x)=1/x`,notes:[`f(x)=1/x has vertical asymptote x=0 and horizontal asymptote y=0.`,`The domain and range both exclude 0.`],walk:{problem:`Describe the parent function f(x)=1/x.`,steps:[`Division by zero is not allowed, so x=0 is the vertical asymptote.`,`As x gets large, y approaches 0, so y=0 is the horizontal asymptote.`]},graph:`oneOverX`,question:{id:`q7`,mode:`fields`,prompt:`Complete the key features of f(x)=1/x.`,format:`Type 0 for each asymptote and choose the matching domain and range.`,fields:[{key:`va`,label:`Vertical asymptote x =`,kind:`number`,answer:0,placeholder:`x =`},{key:`ha`,label:`Horizontal asymptote y =`,kind:`number`,answer:0,placeholder:`y =`},{key:`domain`,label:`Domain`,kind:`select`,answer:`all real x except 0`,options:[``,`all real x except 0`,`all real x`,`x > 0`,`x < 0`]},{key:`range`,label:`Range`,kind:`select`,answer:`all real y except 0`,options:[``,`all real y except 0`,`all real y`,`y > 0`,`y < 0`]}],hint:`Both asymptotes are axes. Division by zero explains the domain.`,correctFeedback:`Correct.`,solution:`VA x=0, HA y=0, domain all real x except 0, range all real y except 0.`}},
      {title:`Parent Function f(x)=1/x^2`,skill:`features of f(x)=1/x^2`,notes:[`f(x)=1/x^2 is always positive except where undefined.`,`It has vertical asymptote x=0 and horizontal asymptote y=0.`,`The range is y>0.`],walk:{problem:`Describe f(x)=1/x^2.`,steps:[`x=0 is not allowed.`,`Because x^2 is positive for nonzero x, y is positive.`,`Range is y>0.`]},graph:`oneOverXSquared`,question:{id:`q8`,mode:`fields`,prompt:`Complete the key features of f(x)=1/x^2.`,format:`Use dropdowns for domain and range.`,fields:[{key:`va`,label:`Vertical asymptote x =`,kind:`number`,answer:0,placeholder:`x =`},{key:`ha`,label:`Horizontal asymptote y =`,kind:`number`,answer:0,placeholder:`y =`},{key:`domain`,label:`Domain`,kind:`select`,answer:`all real x except 0`,options:[``,`all real x except 0`,`all real x`,`x > 0`,`x < 0`]},{key:`range`,label:`Range`,kind:`select`,answer:`y > 0`,options:[``,`all real y except 0`,`all real y`,`y > 0`,`y < 0`]}],hint:`The squared denominator makes outputs positive, but x=0 is still not allowed.`,correctFeedback:`Correct.`,solution:`VA x=0, HA y=0, domain all real x except 0, range y>0.`}},
      {title:`Transformations of Rational Parent Functions`,skill:`rational parent transformations`,notes:[`The form a/(x-h)+k shifts f(x)=1/x right h and up k.`,`The vertical asymptote is x=h and the horizontal asymptote is y=k.`,`A negative a reflects the graph over the x-axis.`],walk:{problem:`Describe g(x)=2/(x-3)+4.`,steps:[`h=3, so the graph shifts right 3 and has vertical asymptote x=3.`,`k=4, so it shifts up 4 and has horizontal asymptote y=4.`,`a=2 creates a vertical stretch.`]},question:{id:`q9`,mode:`fields`,prompt:`For g(x)=-3/(x+2)-5, choose the transformation facts.`,format:`Use the form a/(x-h)+k.`,fields:[{key:`va`,label:`Vertical asymptote`,kind:`select`,answer:`x = -2`,options:[``,`x = -2`,`x = 2`,`x = -5`,`x = 5`]},{key:`ha`,label:`Horizontal asymptote`,kind:`select`,answer:`y = -5`,options:[``,`y = -2`,`y = 2`,`y = -5`,`y = 5`]},{key:`reflect`,label:`Reflection`,kind:`select`,answer:`reflected over the x-axis`,options:[``,`reflected over the x-axis`,`reflected over the y-axis`,`no reflection`]}],hint:`Rewrite x+2 as x-(-2). The outside -5 is k. The negative numerator reflects over the x-axis.`,correctFeedback:`Correct.`,solution:`x+2 means h=-2, so VA x=-2. k=-5, so HA y=-5. The negative coefficient reflects over the x-axis.`}}
    ];
    const REFLECTION={prompt:`Choose one rational function or variation topic you missed or found difficult. Explain the first step you will check next time.`,minLength:20};
    // End teacher edit area.

    const PAGES=[{type:`student`}].concat(TOPICS.map((_,i)=>({type:`topic`,topicIndex:i})),[{type:`reflection`},{type:`review`}]);
    let state=loadState();
    function freshState(){return{appVersion:ASSIGNMENT.version,page:0,student:{name:``,period:``,date:new Date().toISOString().slice(0,10)},answers:{},teacherReview:{reflection:``},pdfCreated:false};}
    function loadState(){const fresh=freshState();try{const saved=JSON.parse(localStorage.getItem(ASSIGNMENT.storageKey));if(!saved||saved.appVersion!==ASSIGNMENT.version)return fresh;return Object.assign(fresh,saved,{student:Object.assign(fresh.student,saved.student||{}),answers:Object.assign({},saved.answers||{}),teacherReview:Object.assign(fresh.teacherReview,saved.teacherReview||{})});}catch(e){return fresh;}}
    function saveState(){localStorage.setItem(ASSIGNMENT.storageKey,JSON.stringify(state));}
    function escapeHtml(value){return String(value??``).replace(/[&<>']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;"}[ch]));}
    function escapeAttr(value){return escapeHtml(value).replace(/"/g,`&quot;`);}
    function formatDate(dateText){if(!dateText)return``;const p=dateText.split(`-`).map(Number);return new Date(p[0],p[1]-1,p[2]).toLocaleDateString(undefined,{year:`numeric`,month:`long`,day:`numeric`});}
    function getQuestionRecord(q){if(!state.answers[q.id])state.answers[q.id]={values:{},attempts:0,locked:false,correct:false,score:0,feedback:``,feedbackType:``};return state.answers[q.id];}
    function renderApp(){if(state.page<0||state.page>=PAGES.length)state.page=0;const page=PAGES[state.page],app=document.getElementById(`app`);if(page.type===`student`)app.innerHTML=renderStudentPage();if(page.type===`topic`)app.innerHTML=renderTopicPage(TOPICS[page.topicIndex],page.topicIndex);if(page.type===`reflection`)app.innerHTML=renderReflectionPage();if(page.type===`review`)app.innerHTML=renderReviewPage();renderNav();if(page.type===`reflection`)updateTeacherStatus();}
    function renderStudentPage(){return`<div class='short-page'><h2>Student Information</h2><p class='meta'>Progress saves in this browser. Each auto-graded topic locks after two checked attempts. If it is not correct by then, it is permanently wrong for the report.</p><div class='info-grid'><div><label for='studentName'>Student name</label><input id='studentName' type='text' autocomplete='name' value='${escapeAttr(state.student.name)}' oninput='updateStudent(&quot;name&quot;,this.value)'></div><div><label for='classPeriod'>Class period</label><input id='classPeriod' type='text' value='${escapeAttr(state.student.period)}' oninput='updateStudent(&quot;period&quot;,this.value)'></div><div><label for='studentDate'>Date</label><input id='studentDate' type='date' value='${escapeAttr(state.student.date)}' oninput='updateStudent(&quot;date&quot;,this.value)'></div></div><div class='tool-grid'><div class='tool-card'><strong>Factor first</strong><span>For rational functions, simplify before deciding asymptotes and holes.</span></div><div class='tool-card'><strong>Second try warning</strong><span>After one miss, use the hint before the final graded try.</span></div><div class='tool-card'><strong>Report tools</strong><span>Final review includes section scores, Copy Answers, and Save as PDF.</span></div></div></div>`;}
    function renderTopicPage(topic,index){const q=topic.question,rec=getQuestionRecord(q);return`<article><div class='note-band'><h2>${index+1}. ${escapeHtml(topic.title)}</h2><ul>${topic.notes.map(note=>`<li>${escapeHtml(note)}</li>`).join(``)}</ul></div><div class='topic-grid'><section class='panel walkthrough'><h3>Walkthrough</h3><p><span class='formula'>${escapeHtml(topic.walk.problem)}</span></p><ol>${topic.walk.steps.map(step=>`<li>${escapeHtml(step)}</li>`).join(``)}</ol>${topic.graph?renderGraph(topic.graph):``}</section><section class='panel you-try'><h3>You Try</h3><p>${escapeHtml(q.prompt)}</p><div class='answer-format'>${escapeHtml(q.format)}</div>${renderQuestionFields(q,rec)}${supportPanel(q,rec)}<div class='actions'><div class='small-note'>Attempts used: ${rec.attempts} of 2</div>${rec.locked?``:`<button class='btn' type='button' onclick='checkQuestion(&quot;${q.id}&quot;)'>Check Answer</button>`}</div>${rec.feedback?`<div class='feedback ${rec.feedbackType}'>${escapeHtml(rec.feedback)}</div>`:``}</section></div></article>`;}
    function supportPanel(q,rec){const warning=!rec.locked&&rec.attempts===1?`<div class='final-warning'>Final graded try: review the hint before checking again. A second incorrect check locks the whole problem as wrong.</div>`:``;const solution=rec.locked?`<p><strong>Worked explanation:</strong> ${escapeHtml(q.solution)}</p>`:``;return`${warning}<details class='support-box'><summary>I'm stuck - show a hint</summary><div><p><strong>Hint:</strong> ${escapeHtml(q.hint)}</p>${solution}</div></details>`;}
    function renderGraph(kind){const path=kind===`oneOverXSquared`?`M55 45 C95 65,115 170,205 190 M255 190 C345 170,365 65,405 45`:`M55 185 C115 150,150 108,205 45 M255 185 C310 120,345 80,405 45`;return`<div class='graph-card'><svg viewBox='0 0 460 240' role='img' aria-label='Parent rational graph'><rect width='460' height='240' fill='#fff'></rect><line x1='35' y1='120' x2='425' y2='120' stroke='#5c677d' stroke-width='2'></line><line x1='230' y1='25' x2='230' y2='215' stroke='#5c677d' stroke-width='2'></line><line x1='230' y1='25' x2='230' y2='215' stroke='#b3261e' stroke-width='2' stroke-dasharray='7 6'></line><line x1='35' y1='120' x2='425' y2='120' stroke='#b3261e' stroke-width='2' stroke-dasharray='7 6'></line><path d='${path}' fill='none' stroke='#2457a6' stroke-width='4' stroke-linecap='round'></path><text x='238' y='40' fill='#b3261e' font-size='14'>x=0</text><text x='360' y='112' fill='#b3261e' font-size='14'>y=0</text></svg></div>`;}
    function renderQuestionFields(q,rec){const single=q.fields.length===1?` single`:``;return`<div class='field-grid${single}'>${q.fields.map((field,index)=>renderField(q,field,index,rec)).join(``)}</div>`;}
    function renderField(q,field,index,rec){const key=field.key||`field${index}`,value=rec.values[key]||``,disabled=rec.locked?`disabled`:``;if(field.kind===`select`)return`<div><label for='${q.id}-${key}'>${escapeHtml(field.label)}</label><select id='${q.id}-${key}' ${disabled} onchange='setQuestionValue(&quot;${q.id}&quot;,&quot;${key}&quot;,this.value)'>${field.options.map(option=>`<option value='${escapeAttr(option)}' ${option===value?`selected`:``}>${option?escapeHtml(option):`Choose one`}</option>`).join(``)}</select></div>`;return`<div><label for='${q.id}-${key}'>${escapeHtml(field.label)}</label><input id='${q.id}-${key}' type='text' inputmode='decimal' ${disabled} value='${escapeAttr(value)}' placeholder='${escapeAttr(field.placeholder||``)}' oninput='setQuestionValue(&quot;${q.id}&quot;,&quot;${key}&quot;,this.value)'><div class='field-help'>Fractions like -5/2 or decimals like -2.5 are accepted.</div></div>`;}
    function renderReflectionPage(){return`<div class='short-page'><h2>Final Reflection</h2><p>${escapeHtml(REFLECTION.prompt)}</p><label for='reflectionText'>Teacher-review response</label><textarea id='reflectionText' oninput='updateTeacherReview(this.value)'>${escapeHtml(state.teacherReview.reflection)}</textarea><div id='teacherStatus' class='feedback hint'>Please write a complete response before continuing.</div><p class='small-note'>This is completion credit and is included in the PDF for teacher review.</p></div>`;}
    function renderReviewPage(){const scores=calculateScores(),complete=allComplete();return`<div><h2>Final Review</h2><p class='meta'>Review your score and information before saving or copying answers.</p><div class='review-grid'><section class='panel'><h3>Current Score</h3><div class='score-big'>${scores.finalScore}/100</div><p>Auto-graded: ${scores.autoEarned} / ${TOPICS.length}</p><p>Teacher-review completion: ${scores.teacherEarned} / ${ASSIGNMENT.teacherReviewPoints}</p></section><section class='panel'><h3>Student</h3><p><strong>Name:</strong> ${escapeHtml(state.student.name||`Not entered`)}</p><p><strong>Period:</strong> ${escapeHtml(state.student.period||`Not entered`)}</p><p><strong>Date:</strong> ${escapeHtml(formatDate(state.student.date)||`Not entered`)}</p></section></div><div class='status-list' style='margin-top:16px;'>${scores.sections.map(s=>`<div class='status-card'><strong>${escapeHtml(s.title)}</strong><span>${s.earned} / 1</span></div>`).join(``)}</div><div class='note-band' style='margin-top:16px;'><h3>Study Summary</h3><p>${escapeHtml(studySummary(scores.missedSkills))}</p></div><div class='actions'><p class='small-note'>${complete?`Ready for Copy Answers or PDF.`:`Complete every required page before final tools appear.`}</p>${complete?`<button class='btn secondary' type='button' onclick='copyAnswers()'>Copy Answers</button><button class='btn print' type='button' onclick='saveAsPdf()'>Save as PDF</button>`:``}</div></div>`;}
    function getQuestionRecord(q){if(!state.answers[q.id])state.answers[q.id]={values:{},attempts:0,locked:false,correct:false,score:0,feedback:``,feedbackType:``};return state.answers[q.id];}
    function updateStudent(field,value){state.student[field]=value;saveState();renderNav();}
    function setQuestionValue(qid,key,value){const q=findQuestion(qid),rec=getQuestionRecord(q);if(rec.locked)return;rec.values[key]=value;saveState();renderNav();}
    function allFieldsFilled(q,values){return q.fields.every((field,index)=>String(values[field.key||`field${index}`]||``).trim().length>0);}
    function parseMathNumber(value){let text=String(value||``).trim().toLowerCase().replace(/\s+/g,``).replace(/,/g,``).replace(/^[xyk]=/,``);if(/^-?\d+(\.\d+)?\/-?\d+(\.\d+)?$/.test(text)){const p=text.split(`/`).map(Number);if(p[1]!==0)return p[0]/p[1];}const n=Number(text);return Number.isFinite(n)?n:NaN;}
    function nearlyEqual(a,b,tolerance=.02){return Number.isFinite(a)&&Math.abs(a-b)<=tolerance;}
    function checkQuestion(qid){const q=findQuestion(qid),rec=getQuestionRecord(q);if(rec.locked)return;if(!allFieldsFilled(q,rec.values)){rec.feedback=`Complete each blank before checking your answer.`;rec.feedbackType=`hint`;saveState();renderApp();return;}const grade=gradeQuestion(q,rec.values);rec.attempts+=1;if(grade.full){rec.locked=true;rec.correct=true;rec.score=1;rec.feedback=q.correctFeedback;rec.feedbackType=`correct`;}else if(rec.attempts<2){rec.feedback=grade.correctCount>0?`Some parts are on track. Hint: ${q.hint}`:q.hint;rec.feedbackType=`hint`;}else{rec.locked=true;rec.correct=false;rec.score=0;rec.feedback=`Not quite. This problem is now locked as wrong. ${q.solution}`;rec.feedbackType=`locked`;}saveState();renderApp();}
    function gradeQuestion(q,values){if(q.mode===`unorderedNumbers`){const nums=q.fields.map((field,index)=>parseMathNumber(values[field.key||`field${index}`]));const used=new Array(q.answers.length).fill(false);let correctCount=0;nums.forEach(num=>{const idx=q.answers.findIndex((answer,i)=>!used[i]&&nearlyEqual(num,answer));if(idx>=0){used[idx]=true;correctCount++;}});return{correctCount,total:q.answers.length,full:correctCount===q.answers.length};}let correctCount=0;q.fields.forEach((field,index)=>{const key=field.key||`field${index}`,value=values[key];if(field.kind===`number`&&nearlyEqual(parseMathNumber(value),field.answer))correctCount++;if(field.kind===`select`&&value===field.answer)correctCount++;});return{correctCount,total:q.fields.length,full:correctCount===q.fields.length};}
    function findQuestion(qid){const topic=TOPICS.find(t=>t.question.id===qid);if(!topic)throw new Error(`Question not found: `+qid);return topic.question;}
    function updateTeacherReview(value){state.teacherReview.reflection=value;saveState();updateTeacherStatus();renderNav();}
    function teacherReviewComplete(){return String(state.teacherReview.reflection||``).trim().length>=REFLECTION.minLength;}
    function updateTeacherStatus(){const box=document.getElementById(`teacherStatus`);if(!box)return;if(teacherReviewComplete()){box.className=`feedback review`;box.textContent=`Teacher review needed. This response will be included in the PDF.`;}else{box.className=`feedback hint`;box.textContent=`Please write a complete response before continuing.`;}}
    function questionComplete(topic){return getQuestionRecord(topic.question).locked;}
    function studentInfoComplete(){return Boolean(String(state.student.name||``).trim()&&String(state.student.period||``).trim()&&String(state.student.date||``).trim());}
    function allComplete(){return studentInfoComplete()&&TOPICS.every(questionComplete)&&teacherReviewComplete();}
    function canAdvance(){const page=PAGES[state.page];if(page.type===`student`)return studentInfoComplete();if(page.type===`topic`)return questionComplete(TOPICS[page.topicIndex]);if(page.type===`reflection`)return teacherReviewComplete();return false;}
    function renderNav(){const backBtn=document.getElementById(`backBtn`),nextBtn=document.getElementById(`nextBtn`),pageLabel=document.getElementById(`pageLabel`),completionLabel=document.getElementById(`completionLabel`),progressFill=document.getElementById(`progressFill`);const progress=Math.round((state.page/(PAGES.length-1))*100);pageLabel.textContent=`Page ${state.page+1} of ${PAGES.length}`;completionLabel.textContent=`${progress}% complete`;progressFill.style.width=`${progress}%`;backBtn.disabled=state.page===0;nextBtn.style.visibility=PAGES[state.page].type===`review`?`hidden`:`visible`;nextBtn.disabled=!canAdvance();document.getElementById(`versionPill`).textContent=`Version ${ASSIGNMENT.version}`;}
    function goBack(){if(state.page>0){state.page-=1;saveState();renderApp();}}
    function goNext(){if(!canAdvance())return;if(state.page<PAGES.length-1){state.page+=1;saveState();renderApp();window.scrollTo({top:0,behavior:`smooth`});}}
    function calculateScores(){const sections=TOPICS.map(topic=>{const rec=getQuestionRecord(topic.question);return{title:topic.title,skill:topic.skill,earned:Number(rec.score||0),max:1};});const autoEarned=sections.reduce((sum,s)=>sum+s.earned,0);const teacherEarned=teacherReviewComplete()?ASSIGNMENT.teacherReviewPoints:0;const finalScore=Math.round(((autoEarned+teacherEarned)/(TOPICS.length+ASSIGNMENT.teacherReviewPoints))*100);const missedSkills=sections.filter(s=>s.earned<s.max).map(s=>s.skill);return{sections,autoEarned,teacherEarned,finalScore,missedSkills};}
    function joinList(items){if(!items.length)return``;if(items.length===1)return items[0];if(items.length===2)return`${items[0]} and ${items[1]}`;return`${items.slice(0,-1).join(`, `)}, and ${items[items.length-1]}`;}
    function studySummary(missedSkills){if(!missedSkills.length)return`This student is showing strong readiness across rational functions, asymptotes, holes, parent functions, transformations, and variation equations.`;return`This student should review ${joinList(missedSkills)}. A helpful next step is to redo those walkthroughs, factor before choosing asymptotes, and show the setup for variation equations before calculating k.`;}
    function studentAnswerText(q){const rec=getQuestionRecord(q);return q.fields.map((field,index)=>`${field.label}: ${escapeHtml(rec.values[field.key||`field${index}`]||`blank`)}`).join(`; `);}
    function correctAnswerText(q){if(q.mode===`unorderedNumbers`)return q.answers.map(answer=>`x = ${answer}`).join(` and `);return q.fields.map(field=>`${field.label} ${field.answer}`).join(`; `);}
    function answerReport(){const scores=calculateScores();return`${ASSIGNMENT.title}\nStudent: ${state.student.name}\nPeriod: ${state.student.period}\nDate: ${state.student.date}\nFinal Score: ${scores.finalScore}/100\n\n`+TOPICS.map(topic=>{const q=topic.question,rec=getQuestionRecord(q);return`${topic.title}\nStudent answer: ${studentAnswerText(q)}\nResult: ${rec.score?`Correct`:`Incorrect`}\nCorrect/guide: ${correctAnswerText(q)}\n`;}).join(`\n`)+`\nReflection: ${state.teacherReview.reflection}`;}
    async function copyAnswers(){const text=answerReport();try{await navigator.clipboard.writeText(text);alert(`Answers copied.`);}catch(e){const box=document.createElement(`textarea`);box.value=text;document.body.appendChild(box);box.select();document.execCommand(`copy`);box.remove();alert(`Answers copied.`);}}
    function saveAsPdf(){if(!allComplete())return;buildPrintReport();state.pdfCreated=true;saveState();setTimeout(()=>window.print(),100);}
    function buildPrintReport(){const scores=calculateScores();document.getElementById(`printReport`).innerHTML=`<div class='print-page'><h1>${escapeHtml(ASSIGNMENT.title)}</h1><p><strong>Course:</strong> ${escapeHtml(ASSIGNMENT.course)}</p><p><strong>Student:</strong> ${escapeHtml(state.student.name)} &nbsp; <strong>Period:</strong> ${escapeHtml(state.student.period)} &nbsp; <strong>Date:</strong> ${escapeHtml(formatDate(state.student.date))}</p><p><strong>Version:</strong> ${escapeHtml(ASSIGNMENT.version)} &nbsp; <strong>Final Score:</strong> ${scores.finalScore}/100</p><div class='summary-box'><strong>Study Summary:</strong> ${escapeHtml(studySummary(scores.missedSkills))}</div><h2>Score Breakdown</h2><table><thead><tr><th>Section</th><th>Score</th><th>Skill</th></tr></thead><tbody>${scores.sections.map(s=>`<tr><td>${escapeHtml(s.title)}</td><td>${s.earned} / ${s.max}</td><td>${escapeHtml(s.skill)}</td></tr>`).join(``)}<tr><td>Teacher-Review Reflection</td><td>${scores.teacherEarned} / ${ASSIGNMENT.teacherReviewPoints}</td><td>mathematical explanation</td></tr></tbody></table><h2>Missed Skills</h2><p>${scores.missedSkills.length?escapeHtml(joinList(scores.missedSkills)):`No missed auto-graded skills.`}</p><h2>Independent Answers</h2><table><thead><tr><th>Topic</th><th>Student Answer</th><th>Score</th><th>Correct Answer When Needed</th></tr></thead><tbody>${TOPICS.map(topic=>{const rec=getQuestionRecord(topic.question),needsAnswer=rec.score<1;return`<tr><td>${escapeHtml(topic.title)}</td><td>${studentAnswerText(topic.question)}</td><td>${rec.score} / 1</td><td>${needsAnswer?escapeHtml(correctAnswerText(topic.question)):`Correct`}</td></tr>`;}).join(``)}</tbody></table><h2>Teacher-Review Response</h2><p><strong>Prompt:</strong> ${escapeHtml(REFLECTION.prompt)}</p><p>${escapeHtml(state.teacherReview.reflection)}</p></div>`;document.getElementById(`printReport`).setAttribute(`aria-hidden`,`false`);}
    function startCompletelyOver(){if(state.pdfCreated)return;const ok=window.confirm(`Start completely over? This erases saved work in this browser.`);if(!ok)return;localStorage.removeItem(ASSIGNMENT.storageKey);state=freshState();renderApp();}
    document.getElementById(`backBtn`).addEventListener(`click`,goBack);document.getElementById(`nextBtn`).addEventListener(`click`,goNext);document.getElementById(`resetBtn`).addEventListener(`click`,startCompletelyOver);renderApp();
  </script>
</body>
