field-grid.single{grid-template-columns:1fr}label{display:block;font-weight:700;margin-bottom:6px}input[type='text'],input[type='date'],input[type='number'],select,textarea{width:100%;border:1px solid #b8c3d4;border-radius:8px;padding:11px 12px;background:#fff;color:var(--ink);min-height:48px}textarea{min-height:140px;resize:vertical}input:disabled,select:disabled,textarea:disabled{background:#edf2f7;color:#526170}.topic-stack{display:grid;gap:16px}.note-band,.panel,.tool-card,.problem-card{border:1px solid var(--line);border-radius:8px;padding:16px}.note-band{background:var(--soft);border-left:6px solid var(--brand)}.panel,.tool-card,.problem-card{background:#fff}.walkthrough{background:#fbfcff}.you-try{background:#fffdfa;border-color:#e8d9ab}.note-band ul,.walkthrough ol{margin:8px 0 0 22px;padding:0}.formula,.answer-format,.final-warning{display:block;font-weight:700;background:#f3f6fb;border:1px solid #dbe4f2;border-radius:7px;padding:10px 12px;margin:8px 0;overflow-x:auto}.answer-format{background:#eef6ff;border-color:#c7dcf6;color:var(--brand-dark);font-weight:700}.final-warning{background:var(--gold2);border-color:#f0d28a;color:var(--amber)}.problem-list{display:grid;gap:14px}.problem-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}.problem-number{font-weight:800;color:var(--brand-dark)}.problem-prompt{font-weight:700}.math{font-family:Georgia,'Times New Roman',serif;font-size:1.08em}.table-wrap{overflow-x:auto;margin:10px 0}.data-table{border-collapse:collapse;min-width:420px;background:#fff}.data-table th,.data-table td{border:1px solid #7d8798;padding:8px 14px;text-align:center}.support-box{border:1px solid var(--line);border-radius:8px;background:#fff;overflow:hidden;margin-top:10px}.support-box[hidden]{display:none}.support-box div{padding:10px 12px}.btn{border:0;border-radius:8px;padding:12px 18px;min-height:48px;cursor:pointer;background:var(--brand);color:#fff;font-weight:700}.btn:hover:not(:disabled){background:var(--brand-dark)}.btn.secondary{background:#edf2f8;color:var(--ink);border:1px solid #cbd5e1}.btn.print{background:var(--green)}.btn.reset{background:#fff0ee;color:var(--red);border:1px solid #f1b8b3}.btn:disabled{opacity:.45;cursor:not-allowed}.tiny-btn{min-height:38px;padding:8px 12px}.feedback{margin-top:12px;padding:12px;border-radius:8px;border:1px solid var(--line);background:#f7f9fc}.feedback.correct{background:#edf8f1;border-color:#b8dfc5;color:#155c34}.feedback.hint{background:#fff8e7;border-color:#f0d28a;color:var(--amber)}.feedback.locked{background:#fff0ee;border-color:#f1b8b3;color:var(--red)}.feedback.review{background:#edf8f1;border-color:#b8dfc5;color:#155c34}.status-card{border:1px solid var(--line);border-radius:8px;padding:12px;background:#fff}.status-card strong{display:block;margin-bottom:4px}.score-big{font-size:2.25rem;font-weight:800;margin:8px 0}#printReport{display:none}

<body>
  <main class='app-shell'>
    <header class='topbar'>
      <div class='title-row'><div><h1>Direct and Inverse Variation</h1><p class='meta'>Algebra 2 Regular - classifying variation, reading tables, writing inverse variation equations, and solving applications</p></div><div class='header-tools'><div class='pill' id='versionPill'></div><button class='btn reset' id='resetBtn' type='button'>Start Completely Over</button></div></div>
      <div class='progress-wrap' aria-label='Assignment progress'><div class='progress-label'><span id='pageLabel'>Page 1</span><span id='completionLabel'>0% complete</span></div><div class='progress-track'><div class='progress-fill' id='progressFill'></div></div></div>
    </header>
    <section class='page' id='app' aria-live='polite'></section>
    <nav class='nav-actions' aria-label='Page navigation'><button class='btn secondary' id='backBtn' type='button'>Back</button><button class='btn' id='nextBtn' type='button'>Next</button></nav>
  </main>
  <section id='printReport' aria-hidden='true'></section>

  <script>
    // Teacher edit area: update section notes, questions, answers, hints, and explanations here.
    const ASSIGNMENT={course:'Algebra 2 Regular',title:'Direct and Inverse Variation',version:'1.0',storageKey:'a2r-direct-inverse-variation-v1',teacherReviewPoints:2};
    const CHOICES=['','Direct Variation','Inverse Variation','Neither'];
    const SECTIONS=[
      {type:'vocab',title:'Vocabulary + Concept Reminder',skill:'vocabulary and concept reminder',notes:['Inverse variation means one variable increases while the other decreases in a way that keeps the product constant.','The inverse variation form is y = a/x, where a is not 0.','The constant of variation is the number a. You can find it with a = xy.'],example:'If y = 12/x, then a = 12. When x doubles, y is cut in half so that xy stays 12.'},
      {type:'auto',title:'Classification: Direct / Inverse / Neither',skill:'classifying variation equations',notes:['Direct variation can be written y = kx, so y/x is constant and the graph goes through the origin.','Inverse variation can be written y = a/x, so xy is constant and a is not 0.','If it cannot be written in either form, choose Neither.'],example:'Example: 4xy = 20 becomes xy = 5, so it is inverse variation.',problems:[
        {id:'c1',n:'1',kind:'select',prompt:'3xy = 1',answer:'Inverse Variation',hint:'Try solving for y. Inverse variation has y = a/x or xy = a.',explanation:'3xy = 1 gives xy = 1/3, so y = 1/(3x). This is inverse variation.'},
        {id:'c2',n:'2',kind:'select',prompt:'5/x = y',answer:'Inverse Variation',hint:'The variable x is in the denominator.',explanation:'y = 5/x is already in inverse variation form.'},
        {id:'c3',n:'3',kind:'select',prompt:'x + 11 = y',answer:'Neither',hint:'Direct variation must look like y = kx with no added constant.',explanation:'y = x + 11 has an added 11, so it is neither direct nor inverse variation.'},
        {id:'c4',n:'4',kind:'select',prompt:'x + y = -2',answer:'Neither',hint:'Solve for y and check whether it becomes y = kx or y = a/x.',explanation:'x + y = -2 gives y = -x - 2. The -2 means it is neither.'},
        {id:'c5',n:'5',kind:'select',prompt:'(4/5)x = y',answer:'Direct Variation',hint:'Direct variation has y equal to a number times x.',explanation:'y = (4/5)x is direct variation with k = 4/5.'},
        {id:'c6',n:'6',kind:'select',prompt:'x - 8y = 1',answer:'Neither',hint:'Solve for y before classifying.',explanation:'x - 8y = 1 gives y = (1/8)x - 1/8, so it is neither.'},
        {id:'c7',n:'7',kind:'select',prompt:'x/7 = y',answer:'Direct Variation',hint:'Rewrite x/7 as (1/7)x.',explanation:'y = (1/7)x is direct variation.'},
        {id:'c8',n:'8',kind:'select',prompt:'6xy = 0',answer:'Neither',hint:'Inverse variation needs xy = a where a is not 0.',explanation:'6xy = 0 gives xy = 0. Since inverse variation requires a not equal to 0, this is neither.'},
        {id:'c9',n:'9',kind:'select',prompt:'y/(9x) = 1',answer:'Direct Variation',hint:'Multiply both sides by 9x.',explanation:'y/(9x) = 1 gives y = 9x, so it is direct variation.'}
      ]},
      {type:'auto',title:'Tables Analysis',skill:'classifying variation from tables',notes:['For direct variation, y/x stays the same for every column.','For inverse variation, xy stays the same for every column.','If neither test stays constant, choose Neither.'],example:'If x is 2, 4, 8 and y is 12, 6, 3, then xy is always 24, so the table is inverse variation.',problems:[
        {id:'t10',n:'10',kind:'table',answer:'Neither',hint:'Check y/x and xy for every column.',explanation:'The y-values are x^2, so y/x is not constant and xy is not constant. This is neither.',table:{x:['2','4','6','8','10'],y:['4','16','36','64','100']}},
        {id:'t11',n:'11',kind:'table',answer:'Inverse Variation',hint:'Multiply each x-value by its y-value.',explanation:'Each product xy equals 5, so the table shows inverse variation.',table:{x:['1','5','8','20','50'],y:['5','1','0.625','0.25','0.1']}},
        {id:'t12',n:'12',kind:'table',answer:'Direct Variation',hint:'Divide y by x for each column.',explanation:'Each ratio y/x equals 0.25, so the table shows direct variation.',table:{x:['2','5','8.4','12','15'],y:['0.5','1.25','2.1','3','3.75']}}
      ]},
      {type:'auto',title:'Write Equation from Values (Inverse Variation)',skill:'writing inverse variation equations',notes:['When x and y vary inversely, use y = a/x.','Find the constant with a = xy.','After writing the equation, substitute x = 5 to find y.'],example:'If x = 4 and y = 6, then a = 24, so y = 24/x. When x = 5, y = 24/5 = 4.8.',problems:[
        {id:'e13',n:'13',kind:'equation',given:'x = 2, y = 2',a:4,y:0.8,yText:'4/5 or 0.8',equationText:'y = 4/x',hint:'Multiply the given x and y to find a, then use y = a/x.',explanation:'a = 2(2) = 4, so y = 4/x. When x = 5, y = 4/5 = 0.8.'},
        {id:'e14',n:'14',kind:'equation',given:'x = 6, y = 3',a:18,y:3.6,yText:'18/5 or 3.6',equationText:'y = 18/x',hint:'The constant is a = xy.',explanation:'a = 6(3) = 18, so y = 18/x. When x = 5, y = 18/5 = 3.6.'},
        {id:'e15',n:'15',kind:'equation',given:'x = 20, y = 7/20',a:7,y:1.4,yText:'7/5 or 1.4',equationText:'y = 7/x',hint:'20 times 7/20 gives the constant.',explanation:'a = 20(7/20) = 7, so y = 7/x. When x = 5, y = 7/5 = 1.4.'},
        {id:'e16',n:'16',kind:'equation',given:'x = 10/9, y = 3/2',a:5/3,y:1/3,yText:'1/3 or 0.333...',equationText:'y = (5/3)/x',hint:'Multiply fractions straight across to find a.',explanation:'a = (10/9)(3/2) = 5/3, so y = (5/3)/x. When x = 5, y = 1/3.'}
      ]},
      {type:'auto',title:'Real-World Applications',skill:'solving inverse variation applications',notes:['Real-world inverse variation often says one quantity is inversely proportional to another.','Find the constant by multiplying the two paired values.','Use the constant to solve for the unknown value.'],example:'If time varies inversely with workers and 6 workers take 10 days, then a = 60 worker-days. With 12 workers, t = 60/12 = 5 days.',problems:[
        {id:'w17',n:'17',kind:'word',prompt:'When temperature is held constant, the volume V of a gas is inversely proportional to the pressure P. A pressure of 32 pounds per square inch results in a volume of 20 cubic feet. What is the pressure if the volume becomes 10 cubic feet?',unknownLabel:'Pressure when V = 10',unit:'psi',constantLabel:'PV constant',constant:640,answer:64,hint:'Because pressure and volume vary inversely, multiply P and V to find the constant.',explanation:'PV = 32(20) = 640. If V = 10, then P = 640/10 = 64 psi.'},
        {id:'w18',n:'18',kind:'word',prompt:'The time t in days that it takes to harvest a field varies inversely with the number n of farm workers. A farmer can harvest his crop in 20 days with 7 farm workers. How long will it take if he hires 10 farm workers?',unknownLabel:'Time with 10 workers',unit:'days',constantLabel:'tn constant',constant:140,answer:14,hint:'Multiply days by workers to get the constant, then divide by 10 workers.',explanation:'tn = 20(7) = 140. With 10 workers, t = 140/10 = 14 days.'}
      ]},
      {type:'reflection',title:'Reflection (Teacher Review)',skill:'reflection and study planning',notes:['This final response is reviewed by your teacher.','Choose one skill that felt tricky and name the first step you will check next time.'],example:'Example: I will check whether y/x or xy is constant before choosing the variation type.'}
    ];
    const REFLECTION={prompt:'Choose one direct or inverse variation skill and explain the first step you will check next time.',minLength:20};
    // End teacher edit area.

    const PAGES=[{type:'student'},...SECTIONS.map((section,index)=>({type:'section',sectionIndex:index})),{type:'review'}];
    const AUTO_PROBLEMS=SECTIONS.filter(s=>s.type==='auto').flatMap(s=>s.problems.map(p=>Object.assign({sectionTitle:s.title,skill:s.skill},p)));
    let state=loadState();
    function freshState(){return{appVersion:ASSIGNMENT.version,page:0,student:{name:'',period:'',date:new Date().toISOString().slice(0,10)},answers:{},teacherReview:{inverse:'',constant:'',reflection:''},pdfCreated:false};}
    function loadState(){const fresh=freshState();try{const saved=JSON.parse(localStorage.getItem(ASSIGNMENT.storageKey));if(!saved||saved.appVersion!==ASSIGNMENT.version)return fresh;return Object.assign(fresh,saved,{student:Object.assign(fresh.student,saved.student||{}),answers:Object.assign({},saved.answers||{}),teacherReview:Object.assign(fresh.teacherReview,saved.teacherReview||{})});}catch(e){return fresh;}}
    function saveState(){localStorage.setItem(ASSIGNMENT.storageKey,JSON.stringify(state));}
    function escapeHtml(value){return String(value??'').replace(/[&<>']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;'}[ch]));}
    function escapeAttr(value){return escapeHtml(value).replace(/"/g,'&quot;');}
    function formatDate(dateText){if(!dateText)return'';const p=dateText.split('-').map(Number);return new Date(p[0],p[1]-1,p[2]).toLocaleDateString(undefined,{year:'numeric',month:'long',day:'numeric'});}
    function record(id){if(!state.answers[id])state.answers[id]={values:{},attempts:0,locked:false,correct:false,score:0,feedback:'',feedbackType:'',hintOpen:false};return state.answers[id];}
    function findProblem(id){const p=AUTO_PROBLEMS.find(item=>item.id===id);if(!p)throw new Error('Problem not found: '+id);return p;}
    function renderApp(){if(state.page<0||state.page>=PAGES.length)state.page=0;const page=PAGES[state.page],app=document.getElementById('app');if(page.type==='student')app.innerHTML=renderStudentPage();if(page.type==='section')app.innerHTML=renderSectionPage(SECTIONS[page.sectionIndex],page.sectionIndex);if(page.type==='review')app.innerHTML=renderReviewPage();renderNav();if(page.type==='section')updateTeacherStatus();}
    function renderStudentPage(){return`<div class='short-page'><h2>Student Information</h2><p class='meta'>Progress saves in this browser. Each graded worksheet problem gets two checked attempts. Attempt 1 gives a hint; attempt 2 locks that problem with an explanation.</p><div class='info-grid'><div><label for='studentName'>Student name</label><input id='studentName' type='text' autocomplete='name' value='${escapeAttr(state.student.name)}' oninput='updateStudent("name",this.value)'></div><div><label for='classPeriod'>Class period</label><input id='classPeriod' type='text' value='${escapeAttr(state.student.period)}' oninput='updateStudent("period",this.value)'></div><div><label for='studentDate'>Date</label><input id='studentDate' type='date' value='${escapeAttr(state.student.date)}' oninput='updateStudent("date",this.value)'></div></div><div class='tool-grid'><div class='tool-card'><strong>Direct test</strong><span>Check whether y/x stays constant or the equation is y = kx.</span></div><div class='tool-card'><strong>Inverse test</strong><span>Check whether xy stays constant or the equation is y = a/x.</span></div><div class='tool-card'><strong>Answer formats</strong><span>Fractions like 7/5 and decimals like 1.4 are both accepted when equivalent.</span></div></div></div>`;}
    function renderSectionPage(section,index){if(section.type==='vocab')return renderVocab(section,index);if(section.type==='reflection')return renderReflection(section,index);return`<article class='topic-stack'><section class='note-band'><h2>${index+1}. ${section.title}</h2><ul>${section.notes.map(note=>`<li>${note}</li>`).join('')}</ul></section><section class='panel walkthrough'><h3>Guided Example</h3><p>${section.example}</p></section><section class='panel you-try'><h3>You Try</h3><div class='answer-format'>Use the controls below. You have two checked attempts for each problem.</div><div class='problem-list'>${section.problems.map(renderProblem).join('')}</div></section></article>`;}
    function renderVocab(section,index){return`<article class='topic-stack'><section class='note-band'><h2>${index+1}. ${section.title}</h2><ul>${section.notes.map(note=>`<li>${note}</li>`).join('')}</ul></section><section class='panel walkthrough'><h3>Guided Example</h3><p>${section.example}</p><div class='formula'>Inverse variation: y = a/x, a != 0. Constant of variation: a = xy.</div></section><section class='panel you-try'><h3>You Try: Vocabulary</h3><p>In your own words, write the meaning of each vocabulary term.</p><div class='field-grid'><div><label for='vocabInverse'>inverse variation</label><textarea id='vocabInverse' oninput='updateTeacherReview("inverse",this.value)'>${escapeHtml(state.teacherReview.inverse)}</textarea></div><div><label for='vocabConstant'>constant of variation</label><textarea id='vocabConstant' oninput='updateTeacherReview("constant",this.value)'>${escapeHtml(state.teacherReview.constant)}</textarea></div></div><button class='btn secondary tiny-btn' type='button' onclick='toggleTeacherHint("vocabHint")'>I'm Stuck</button><div id='vocabHint' class='support-box' hidden><div>Try this: inverse variation keeps the product xy constant. The constant of variation is the number that stays the same.</div></div><div id='teacherStatus' class='feedback hint'>Write both definitions to complete this teacher-review section.</div></section></article>`;}
    function renderReflection(section,index){return`<article class='topic-stack'><section class='note-band'><h2>${index+1}. ${section.title}</h2><ul>${section.notes.map(note=>`<li>${note}</li>`).join('')}</ul></section><section class='panel walkthrough'><h3>Guided Example</h3><p>${section.example}</p></section><section class='panel you-try'><h3>You Try: Reflection</h3><p>${REFLECTION.prompt}</p><label for='reflectionText'>Teacher-review response</label><textarea id='reflectionText' oninput='updateTeacherReview("reflection",this.value)'>${escapeHtml(state.teacherReview.reflection)}</textarea><button class='btn secondary tiny-btn' type='button' onclick='toggleTeacherHint("reflectionHint")'>I'm Stuck</button><div id='reflectionHint' class='support-box' hidden><div>Choose one: classifying equations, checking tables, finding a, writing y = a/x, or solving a word problem. Then name your first check.</div></div><div id='teacherStatus' class='feedback hint'>Write a complete response before continuing.</div></section></article>`;}
    function renderProblem(p){const rec=record(p.id);return`<div class='problem-card'><div class='problem-head'><div><span class='problem-number'>${p.n}.</span> ${problemPrompt(p)}</div><div class='small-note'>Attempts used: ${rec.attempts} of 2</div></div>${renderInputs(p,rec)}<button class='btn secondary tiny-btn' type='button' onclick='showHint("${p.id}")' ${rec.locked?'disabled':''}>I'm Stuck</button>${rec.hintOpen||rec.locked?`<div class='support-box'><div><strong>Hint:</strong> ${p.hint}${rec.locked?`<p><strong>Explanation:</strong> ${p.explanation}</p>`:''}</div></div>`:''}<div class='actions'><button class='btn' type='button' onclick='checkProblem("${p.id}")' ${rec.locked?'disabled':''}>Check Answer</button></div>${rec.feedback?`<div class='feedback ${rec.feedbackType}'>${rec.feedback}</div>`:''}</div>`;}
    function problemPrompt(p){if(p.kind==='table')return`<span class='problem-prompt'>What type of variation is shown?</span>${renderDataTable(p.table)}`;if(p.kind==='equation')return`<span class='problem-prompt'>Given ${p.given}, write an inverse variation equation and find y when x = 5.</span>`;if(p.kind==='word')return`<span class='problem-prompt'>${p.prompt}</span>`;return`<span class='math problem-prompt'>${p.prompt}</span>`;}
    function renderDataTable(table){return`<div class='table-wrap'><table class='data-table'><tr><th>x</th>${table.x.map(v=>`<td>${v}</td>`).join('')}</tr><tr><th>y</th>${table.y.map(v=>`<td>${v}</td>`).join('')}</tr></table></div>`;}
    function renderInputs(p,rec){if(p.kind==='select'||p.kind==='table')return`<div class='field-grid single'><div><label for='${p.id}-type'>Variation type</label><select id='${p.id}-type' ${rec.locked?'disabled':''} onchange='setValue("${p.id}","type",this.value)'>${CHOICES.map(choice=>`<option value='${choice}' ${rec.values.type===choice?'selected':''}>${choice||'Choose one'}</option>`).join('')}</select><div class='field-help'>Choices: Direct Variation, Inverse Variation, or Neither.</div></div></div>`;if(p.kind==='equation')return`<div class='field-grid'><div><label for='${p.id}-a'>constant a</label><input id='${p.id}-a' type='text' inputmode='decimal' ${rec.locked?'disabled':''} value='${escapeAttr(rec.values.a||'')}' placeholder='Example: 18 or 5/3' oninput='setValue("${p.id}","a",this.value)'></div><div><label for='${p.id}-eq'>equation</label><input id='${p.id}-eq' type='text' ${rec.locked?'disabled':''} value='${escapeAttr(rec.values.eq||'')}' placeholder='Example: y = 18/x' oninput='setValue("${p.id}","eq",this.value)'></div><div><label for='${p.id}-y'>y when x = 5</label><input id='${p.id}-y' type='text' inputmode='decimal' ${rec.locked?'disabled':''} value='${escapeAttr(rec.values.y||'')}' placeholder='Example: 3.6 or 18/5' oninput='setValue("${p.id}","y",this.value)'></div></div><div class='answer-format'>Answer format: a = number, equation like y = a/x, final y as a number or fraction.</div>`;return`<div class='field-grid'><div><label for='${p.id}-rel'>Relationship</label><select id='${p.id}-rel' ${rec.locked?'disabled':''} onchange='setValue("${p.id}","rel",this.value)'>${CHOICES.map(choice=>`<option value='${choice}' ${rec.values.rel===choice?'selected':''}>${choice||'Choose one'}</option>`).join('')}</select></div><div><label for='${p.id}-constant'>${p.constantLabel}</label><input id='${p.id}-constant' type='text' inputmode='decimal' ${rec.locked?'disabled':''} value='${escapeAttr(rec.values.constant||'')}' placeholder='constant' oninput='setValue("${p.id}","constant",this.value)'></div><div><label for='${p.id}-answer'>${p.unknownLabel}</label><input id='${p.id}-answer' type='text' inputmode='decimal' ${rec.locked?'disabled':''} value='${escapeAttr(rec.values.answer||'')}' placeholder='number only' oninput='setValue("${p.id}","answer",this.value)'></div></div><div class='answer-format'>Answer format: choose inverse variation, type the constant, then type the unknown number in ${p.unit}.</div>`;}
    function updateStudent(field,value){state.student[field]=value;saveState();renderNav();}
    function updateTeacherReview(field,value){state.teacherReview[field]=value;saveState();updateTeacherStatus();renderNav();}
    function setValue(id,key,value){const rec=record(id);if(rec.locked)return;rec.values[key]=value;saveState();renderNav();}
    function showHint(id){const rec=record(id);rec.hintOpen=true;saveState();renderApp();}
    function toggleTeacherHint(id){const el=document.getElementById(id);if(el)el.hidden=!el.hidden;}
    function checkProblem(id){const p=findProblem(id),rec=record(id);if(rec.locked)return;if(!isFilled(p,rec.values)){rec.feedback='Complete each answer box for this problem before checking.';rec.feedbackType='hint';saveState();renderApp();return;}const ok=grade(p,rec.values);rec.attempts+=1;if(ok){rec.locked=true;rec.correct=true;rec.score=1;rec.feedback='Correct.';rec.feedbackType='correct';}else if(rec.attempts<2){rec.hintOpen=true;rec.feedback='Not quite yet. Use the hint, then try once more.';rec.feedbackType='hint';}else{rec.locked=true;rec.correct=false;rec.score=0;rec.hintOpen=true;rec.feedback='Not quite. This problem is now locked as wrong. '+p.explanation;rec.feedbackType='locked';}saveState();renderApp();}
    function isFilled(p,v){if(p.kind==='select'||p.kind==='table')return Boolean(v.type);if(p.kind==='equation')return Boolean(String(v.a||'').trim()&&String(v.eq||'').trim()&&String(v.y||'').trim());return Boolean(v.rel&&String(v.constant||'').trim()&&String(v.answer||'').trim());}
    function grade(p,v){if(p.kind==='select'||p.kind==='table')return v.type===p.answer;if(p.kind==='equation')return closeNumber(v.a,p.a,.001)&&equationMatches(v.eq,p.a)&&closeNumber(v.y,p.y,.01);return v.rel==='Inverse Variation'&&closeNumber(v.constant,p.constant,.01)&&closeNumber(v.answer,p.answer,.01);}
    function parseNumber(value){let text=String(value||'').trim().toLowerCase().replaceAll(',','').replaceAll(' ','');text=text.replace(/(psi|days|day|cubicfeet|feet|ft|workers|worker)/g,'');['x=','y=','a=','k=','p=','v=','t=','n='].forEach(prefix=>{if(text.startsWith(prefix))text=text.slice(prefix.length);});if(text.includes('/')){const parts=text.split('/').map(Number);if(parts.length===2&&Number.isFinite(parts[0])&&Number.isFinite(parts[1])&&parts[1]!==0)return parts[0]/parts[1];}const n=Number(text);return Number.isFinite(n)?n:NaN;}
    function closeNumber(value,answer,tol){const n=parseNumber(value);return Number.isFinite(n)&&Math.abs(n-answer)<=tol;}
    function equationMatches(value,a){let text=String(value||'').toLowerCase().replaceAll(' ','').replaceAll('÷','/');text=text.replaceAll('−','-');if(text.startsWith('a='))return closeNumber(text.slice(2),a,.001);if(text.includes('xy=')||text.includes('yx=')){const right=text.split('=')[1];return closeNumber(right,a,.001);}if(text.includes('=xy')||text.includes('=yx')){const left=text.split('=')[0];return closeNumber(left,a,.001);}if(!text.startsWith('y='))return false;let expr=text.slice(2).replace(/(\d|\))x/g,'$1*x').replace(/x(\d|\()/g,'x*$1');expr=expr.replace(/[^0-9x+\-*/().]/g,'');if(!expr||!expr.includes('x'))return false;try{for(const x of [2,5,9]){const y=Function('x','return '+expr)(x);if(!Number.isFinite(y)||Math.abs(y-(a/x))>.01)return false;}return true;}catch(e){return false;}}
    function studentInfoComplete(){return Boolean(String(state.student.name||'').trim()&&String(state.student.period||'').trim()&&String(state.student.date||'').trim());}
    function vocabComplete(){return String(state.teacherReview.inverse||'').trim().length>=12&&String(state.teacherReview.constant||'').trim().length>=12;}
    function reflectionComplete(){return String(state.teacherReview.reflection||'').trim().length>=REFLECTION.minLength;}
    function sectionComplete(section){if(section.type==='vocab')return vocabComplete();if(section.type==='reflection')return reflectionComplete();return section.problems.every(p=>record(p.id).locked);}
    function canAdvance(){const page=PAGES[state.page];if(page.type==='student')return studentInfoComplete();if(page.type==='section')return sectionComplete(SECTIONS[page.sectionIndex]);return false;}
    function allComplete(){return studentInfoComplete()&&SECTIONS.every(sectionComplete);}
    function updateTeacherStatus(){const box=document.getElementById('teacherStatus');if(!box)return;const page=PAGES[state.page];let complete=false;if(page.type==='section'){const section=SECTIONS[page.sectionIndex];complete=section.type==='vocab'?vocabComplete():section.type==='reflection'?reflectionComplete():false;}box.className=complete?'feedback review':'feedback hint';box.textContent=complete?'Teacher review needed. This section counts as complete and will be included in the PDF.':'Keep writing until this teacher-review section is complete.';}
    function renderNav(){const backBtn=document.getElementById('backBtn'),nextBtn=document.getElementById('nextBtn'),pageLabel=document.getElementById('pageLabel'),completionLabel=document.getElementById('completionLabel'),progressFill=document.getElementById('progressFill');const progress=Math.round((state.page/(PAGES.length-1))*100);pageLabel.textContent=`Page ${state.page+1} of ${PAGES.length}`;completionLabel.textContent=`${progress}% complete`;progressFill.style.width=`${progress}%`;backBtn.disabled=state.page===0;nextBtn.style.visibility=PAGES[state.page].type==='review'?'hidden':'visible';nextBtn.disabled=!canAdvance();document.getElementById('versionPill').textContent=`Version ${ASSIGNMENT.version}`;}
    function goBack(){if(state.page>0){state.page-=1;saveState();renderApp();}}
    function goNext(){if(!canAdvance())return;if(state.page<PAGES.length-1){state.page+=1;saveState();renderApp();window.scrollTo({top:0,behavior:'smooth'});}}
    function calculateScores(){const sections=AUTO_PROBLEMS.map(p=>({title:`${p.sectionTitle} #${p.n}`,skill:p.skill,earned:Number(record(p.id).score||0),max:1}));const autoEarned=sections.reduce((sum,s)=>sum+s.earned,0);const vocabEarned=vocabComplete()?1:0,reflectionEarned=reflectionComplete()?1:0;const teacherEarned=vocabEarned+reflectionEarned;const total=AUTO_PROBLEMS.length+ASSIGNMENT.teacherReviewPoints;const finalScore=Math.round(((autoEarned+teacherEarned)/total)*100);const missedSkills=sections.filter(s=>s.earned<s.max).map(s=>s.title);return{sections,autoEarned,vocabEarned,reflectionEarned,teacherEarned,total,finalScore,missedSkills};}
    function renderReviewPage(){const scores=calculateScores(),complete=allComplete();return`<div><h2>Final Review</h2><p class='meta'>Review your score and information before saving or copying answers.</p><div class='review-grid'><section class='panel'><h3>Current Score</h3><div class='score-big'>${scores.finalScore}/100</div><p>Auto-graded: ${scores.autoEarned} / ${AUTO_PROBLEMS.length}</p><p>Teacher-review completion: ${scores.teacherEarned} / ${ASSIGNMENT.teacherReviewPoints}</p></section><section class='panel'><h3>Student</h3><p><strong>Name:</strong> ${escapeHtml(state.student.name||'Not entered')}</p><p><strong>Period:</strong> ${escapeHtml(state.student.period||'Not entered')}</p><p><strong>Date:</strong> ${escapeHtml(formatDate(state.student.date)||'Not entered')}</p></section></div><div class='status-list' style='margin-top:16px;'>${scores.sections.map(s=>`<div class='status-card'><strong>${s.title}</strong><span>${s.earned} / 1</span></div>`).join('')}<div class='status-card'><strong>Vocabulary Teacher Review</strong><span>${scores.vocabEarned} / 1</span></div><div class='status-card'><strong>Reflection Teacher Review</strong><span>${scores.reflectionEarned} / 1</span></div></div><div class='note-band' style='margin-top:16px;'><h3>Missed Skills</h3><p>${scores.missedSkills.length?escapeHtml(scores.missedSkills.join(', ')):'No missed auto-graded problems.'}</p></div><div class='actions'><p class='small-note'>${complete?'Ready for Copy Answers or PDF.':'Complete every required page before final tools appear.'}</p>${complete?`<button class='btn secondary' type='button' onclick='copyAnswers()'>Copy Answers</button><button class='btn print' type='button' onclick='saveAsPdf()'>Save as PDF</button>`:''}</div></div>`;}
    function responseText(p){const rec=record(p.id),v=rec.values;if(p.kind==='select'||p.kind==='table')return v.type||'blank';if(p.kind==='equation')return`a: ${v.a||'blank'}; equation: ${v.eq||'blank'}; y when x=5: ${v.y||'blank'}`;return`relationship: ${v.rel||'blank'}; constant: ${v.constant||'blank'}; answer: ${v.answer||'blank'} ${p.unit}`;}
    function correctText(p){if(p.kind==='select'||p.kind==='table')return p.answer;if(p.kind==='equation')return`a = ${niceNumber(p.a)}, ${p.equationText}, y = ${p.yText}`;return`Inverse Variation; ${p.constantLabel} = ${p.constant}; ${p.unknownLabel} = ${p.answer} ${p.unit}`;}
    function niceNumber(n){if(Math.abs(n-5/3)<.0001)return'5/3';if(Math.abs(n-1/3)<.0001)return'1/3';return String(n);}
    function joinList(items){return items.length?items.join(', '):'No missed auto-graded problems.';}
    function answerReport(){const scores=calculateScores();return`${ASSIGNMENT.title}\nStudent: ${state.student.name}\nPeriod: ${state.student.period}\nDate: ${state.student.date}\nFinal Score: ${scores.finalScore}/100\nMissed Skills: ${joinList(scores.missedSkills)}\n\nVocabulary\ninverse variation: ${state.teacherReview.inverse}\nconstant of variation: ${state.teacherReview.constant}\n\n`+AUTO_PROBLEMS.map(p=>`${p.sectionTitle} #${p.n}\nStudent answer: ${responseText(p)}\nResult: ${record(p.id).score?'Correct':'Incorrect'}\nCorrect/guide: ${correctText(p)}\n`).join('\n')+`\nReflection: ${state.teacherReview.reflection}`;}
    async function copyAnswers(){const text=answerReport();try{await navigator.clipboard.writeText(text);alert('Answers copied.');}catch(e){const box=document.createElement('textarea');box.value=text;document.body.appendChild(box);box.select();document.execCommand('copy');box.remove();alert('Answers copied.');}}
    function saveAsPdf(){if(!allComplete())return;buildPrintReport();state.pdfCreated=true;saveState();setTimeout(()=>window.print(),100);}
    function buildPrintReport(){const scores=calculateScores();document.getElementById('printReport').innerHTML=`<div class='print-page'><h1>${ASSIGNMENT.title}</h1><div class='summary-box'><strong>Missed Skills:</strong> ${escapeHtml(joinList(scores.missedSkills))}</div><p><strong>Course:</strong> ${escapeHtml(ASSIGNMENT.course)}</p><p><strong>Student:</strong> ${escapeHtml(state.student.name)} &nbsp; <strong>Period:</strong> ${escapeHtml(state.student.period)} &nbsp; <strong>Date:</strong> ${escapeHtml(formatDate(state.student.date))}</p><p><strong>Version:</strong> ${escapeHtml(ASSIGNMENT.version)} &nbsp; <strong>Final Score:</strong> ${scores.finalScore}/100</p><h2>Score Breakdown</h2><table><thead><tr><th>Section</th><th>Score</th><th>Skill</th></tr></thead><tbody>${scores.sections.map(s=>`<tr><td>${s.title}</td><td>${s.earned} / ${s.max}</td><td>${escapeHtml(s.skill)}</td></tr>`).join('')}<tr><td>Vocabulary Teacher Review</td><td>${scores.vocabEarned} / 1</td><td>vocabulary explanation</td></tr><tr><td>Reflection Teacher Review</td><td>${scores.reflectionEarned} / 1</td><td>study planning</td></tr></tbody></table><h2>Vocabulary Responses</h2><p><strong>inverse variation:</strong> ${escapeHtml(state.teacherReview.inverse)}</p><p><strong>constant of variation:</strong> ${escapeHtml(state.teacherReview.constant)}</p><h2>All Student Answers</h2><table><thead><tr><th>Problem</th><th>Student Answer</th><th>Score</th><th>Correct Answer When Needed</th></tr></thead><tbody>${AUTO_PROBLEMS.map(p=>`<tr><td>${p.sectionTitle} #${p.n}</td><td>${escapeHtml(responseText(p))}</td><td>${record(p.id).score} / 1</td><td>${record(p.id).score?'Correct':escapeHtml(correctText(p))}</td></tr>`).join('')}</tbody></table><h2>Teacher-Review Reflection</h2><p><strong>Prompt:</strong> ${escapeHtml(REFLECTION.prompt)}</p><p>${escapeHtml(state.teacherReview.reflection)}</p></div>`;document.getElementById('printReport').setAttribute('aria-hidden','false');}
    function startCompletelyOver(){if(state.pdfCreated)return;const ok=window.confirm('Start completely over? This erases saved work in this browser.');if(!ok)return;localStorage.removeItem(ASSIGNMENT.storageKey);state=freshState();renderApp();}
    document.getElementById('backBtn').addEventListener('click',goBack);document.getElementById('nextBtn').addEventListener('click',goNext);document.getElementById('resetBtn').addEventListener('click',startCompletelyOver);renderApp();
  </script>
</body>
